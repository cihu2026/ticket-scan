name: Fix Iansui font loading
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/fix-iansui-font.yml'
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix font loading order
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          imp = "@import url('https://fonts.googleapis.com/css2?family=Iansui&display=swap');"
          s = s.replace(imp, '')
          s = s.replace('<style>', '<style>'+imp, 1)
          force = 'button,button *,input,select,textarea,option{font-family:"Iansui","Noto Sans TC","Microsoft JhengHei",sans-serif!important}'
          if force not in s:
              s = s.replace('</style>', force+'</style>', 1)
          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Fix Iansui font on ticket scan buttons" || exit 0
          git push
