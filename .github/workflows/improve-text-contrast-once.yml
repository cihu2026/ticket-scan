name: Improve ticket scan text contrast once
on:
  push:
    branches: [main]
    paths: ['.github/workflows/improve-text-contrast-once.yml']
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Improve text contrast
        shell: python
        run: |
          from pathlib import Path
          p = Path('index.html')
          text = p.read_text(encoding='utf-8')
          marker = '/* HIGH CONTRAST TEXT PATCH */'
          css = r'''
          /* HIGH CONTRAST TEXT PATCH */
          :root{--strong-text:#ffffff;--soft-text:#eef2ff;--button-text:#ffffff;--dark-button-text:#111827}
          body{color:var(--strong-text)!important}
          h1,.title,.status,.rec,.rec b,#choice{color:var(--strong-text)!important;text-shadow:0 1px 2px rgba(0,0,0,.45)}
          .sub,.note,.time,.tile span,.tile small,.rec small{color:var(--soft-text)!important;opacity:1!important}
          button,.themeBtn,.keys button,.clear,.btn,.sign button{opacity:1!important;filter:none!important;text-shadow:0 1px 2px rgba(0,0,0,.4)}
          .themeBtn,.keys button,.clear{background:rgba(15,23,42,.58)!important;color:#fff!important;border-color:rgba(255,255,255,.5)!important}
          .themeBtn.on{background:linear-gradient(135deg,#f8fafc,#cbd5e1)!important;color:#111827!important;text-shadow:none!important;border-color:#fff!important}
          .start,.btn{color:#111827!important;text-shadow:none!important}
          .minus{color:#fff!important;background:linear-gradient(180deg,#db2777,#9d174d)!important}
          .plus,.send2{color:#052e16!important;text-shadow:none!important;background:linear-gradient(180deg,#bbf7d0,#4ade80)!important}
          input{color:#fff!important;background:rgba(15,23,42,.58)!important;border-color:rgba(255,255,255,.55)!important}
          input::placeholder{color:#e5e7eb!important;opacity:1!important}
          .box,.tile,.rec,#choice{background-color:rgba(15,23,42,.34)}

          body[data-theme="labubu"],body[data-theme="usagi"],body[data-theme="snoopy"]{
            --strong-text:#111827;--soft-text:#334155;
          }
          body[data-theme="labubu"] h1,body[data-theme="labubu"] .title,body[data-theme="labubu"] .status,body[data-theme="labubu"] .rec,body[data-theme="labubu"] .rec b,body[data-theme="labubu"] #choice,
          body[data-theme="usagi"] h1,body[data-theme="usagi"] .title,body[data-theme="usagi"] .status,body[data-theme="usagi"] .rec,body[data-theme="usagi"] .rec b,body[data-theme="usagi"] #choice,
          body[data-theme="snoopy"] h1,body[data-theme="snoopy"] .title,body[data-theme="snoopy"] .status,body[data-theme="snoopy"] .rec,body[data-theme="snoopy"] .rec b,body[data-theme="snoopy"] #choice{
            color:#111827!important;text-shadow:none!important;
          }
          body[data-theme="labubu"] .sub,body[data-theme="labubu"] .note,body[data-theme="labubu"] .time,body[data-theme="labubu"] .tile span,body[data-theme="labubu"] .tile small,body[data-theme="labubu"] .rec small,
          body[data-theme="usagi"] .sub,body[data-theme="usagi"] .note,body[data-theme="usagi"] .time,body[data-theme="usagi"] .tile span,body[data-theme="usagi"] .tile small,body[data-theme="usagi"] .rec small,
          body[data-theme="snoopy"] .sub,body[data-theme="snoopy"] .note,body[data-theme="snoopy"] .time,body[data-theme="snoopy"] .tile span,body[data-theme="snoopy"] .tile small,body[data-theme="snoopy"] .rec small{
            color:#334155!important;opacity:1!important;
          }
          body[data-theme="labubu"] .box,body[data-theme="labubu"] .tile,body[data-theme="labubu"] .rec,body[data-theme="labubu"] #choice,
          body[data-theme="usagi"] .box,body[data-theme="usagi"] .tile,body[data-theme="usagi"] .rec,body[data-theme="usagi"] #choice,
          body[data-theme="snoopy"] .box,body[data-theme="snoopy"] .tile,body[data-theme="snoopy"] .rec,body[data-theme="snoopy"] #choice{
            background:rgba(255,255,255,.72)!important;border-color:rgba(15,23,42,.22)!important;
          }
          body[data-theme="labubu"] input,body[data-theme="usagi"] input,body[data-theme="snoopy"] input{
            color:#111827!important;background:rgba(255,255,255,.88)!important;border-color:rgba(15,23,42,.3)!important;
          }
          body[data-theme="labubu"] input::placeholder,body[data-theme="usagi"] input::placeholder,body[data-theme="snoopy"] input::placeholder{color:#475569!important}
          '''
          if marker not in text:
              text = text.replace('</style>', css + '\n</style>', 1)
              p.write_text(text, encoding='utf-8')
      - name: Remove workflow and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/improve-text-contrast-once.yml
          git add index.html
          git commit -m "Improve text contrast across ticket scan themes" || exit 0
          git push