name: Patch theme text colors

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/patch-stitch-text.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch theme text colors only
        shell: python
        run: |
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          marker = '/* THEME DARK TEXT PATCH */'
          patch = r'''
          /* THEME DARK TEXT PATCH */
          body{--themeText:#171a3d;--themeMuted:#3f456e}
          body[data-theme="stitch"]{--themeText:#10233f;--themeMuted:#334e68}
          body[data-theme="labubu"]{--themeText:#3f291e;--themeMuted:#664735}
          body[data-theme="usagi"]{--themeText:#4b2142;--themeMuted:#704266}
          body[data-theme="snoopy"]{--themeText:#172033;--themeMuted:#3f4d63}

          body,
          body h1,
          body button,
          body input,
          body .box,
          body .title,
          body .status,
          body .rec,
          body .rec b,
          body .tile,
          body .tile b,
          body #choice,
          body .clear,
          body .themeBtn,
          body .countHead b,
          body .historyHead,
          body .head{color:var(--themeText)!important}

          body .eyebrow,
          body .sub,
          body .note,
          body .time,
          body .tile span,
          body .tile small,
          body .rec small,
          body input::placeholder{color:var(--themeMuted)!important}
          '''

          if marker in text:
              start = text.index(marker)
              end = text.index('</style>', start)
              text = text[:start] + patch + text[end:]
          else:
              text = text.replace('</style>', patch + '</style>', 1)

          path.write_text(text, encoding='utf-8')

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "各主題改用對應深色文字"
          git push
