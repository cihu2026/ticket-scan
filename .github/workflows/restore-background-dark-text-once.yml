name: Restore backgrounds and dark text once
on:
  push:
    branches: [main]
    paths: ['.github/workflows/restore-background-dark-text-once.yml']
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch ticket scan colors
        shell: python
        run: |
          from pathlib import Path
          import re

          p = Path('index.html')
          text = p.read_text(encoding='utf-8')
          marker = '/* DARK TEXT KEEP ORIGINAL BACKGROUNDS */'
          css = r'''
          /* DARK TEXT KEEP ORIGINAL BACKGROUNDS */
          body, h1, .title, .note, .time, .status, .rec, .rec b, .rec small,
          .tile, .tile span, .tile b, .tile small, #choice, .clear, .themeBtn,
          input, input::placeholder, button, button *{
            color:#1f2937 !important;
          }
          .eyebrow,.sub,.note,.time,.rec small,.tile span,.tile small,input::placeholder{
            color:#374151 !important;
          }
          .plus,.send2{
            color:#111827 !important;
          }
          .minus,.btn,.start,.keys button,.themeBtn{
            color:#1f2937 !important;
          }
          .sign button{
            opacity:1 !important;
            filter:none !important;
          }
          .themeBtn.on{
            color:#111827 !important;
          }
          '''

          if marker in text:
              text = re.sub(r'/\* DARK TEXT KEEP ORIGINAL BACKGROUNDS \*/.*?(?=</style>)', css.strip()+'\n', text, flags=re.S)
          else:
              text = text.replace('</style>', css + '\n</style>', 1)

          # Remove the prior contrast patch's explicit background/color overrides while leaving original theme backgrounds intact.
          text = re.sub(r'/\* HIGH CONTRAST TEXT PATCH \*/.*?(?=</style>)', '', text, flags=re.S)
          p.write_text(text, encoding='utf-8')
      - name: Remove workflow and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/restore-background-dark-text-once.yml
          git add index.html
          git commit -m "Restore original backgrounds with dark text" || exit 0
          git push