name: Today count only once
on:
  push:
    branches: [main]
    paths: ['.github/workflows/today-count-only-once.yml']
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - shell: python
        run: |
          from pathlib import Path
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          helper='function todayKey(){return new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Taipei",year:"numeric",month:"2-digit",day:"2-digit"}).format(new Date())}'
          if 'function todayKey()' not in s:
              s=s.replace("const $=id=>document.getElementById(id);", "const $=id=>document.getElementById(id);"+helper)
          s=s.replace('?action=getCount&_=', '?action=getCount&date="+encodeURIComponent(todayKey())+"&_=', 1)
          p.write_text(s,encoding='utf-8')
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/today-count-only-once.yml
          git add index.html
          git commit -m "Fetch only today's attendance counts"
          git push