<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎟️ 後慈湖驗票系統 v4.0</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
    :root {
        --primary: #00d2ff;
        --success: #2ecc71;
        --error: #ff6b6b;
        --warning: #f1c40f;
        --bg: #121212;
        --card: #1e1e1e;
        --accent: #d4af37;
    }

    body {
        margin: 0;
        background: var(--bg);
        color: #fff;
        font-family: 'Segoe UI', Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        padding-bottom: 30px;
    }

    h2 {
        margin: 20px 0;
        letter-spacing: 2px;
        background: linear-gradient(to right, #00d2ff, #3a7bd5);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: 800;
    }

    /* 掃描器外框 */
    #reader-container {
        position: relative;
        width: 85%;
        max-width: 400px;
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        border: 2px solid rgba(255,255,255,0.1);
        background: #000;
    }

    #reader { width: 100% !important; border: none !important; }

    .scan-line {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 4px;
        background: var(--primary);
        box-shadow: 0 0 15px var(--primary);
        animation: scan 2s linear infinite;
        z-index: 10; display: none;
    }

    @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }

    /* 控制區 */
    .controls { width: 90%; max-width: 400px; margin-top: 20px; display: flex; flex-direction: column; gap: 12px; }

    button {
        padding: 16px; border: none; border-radius: 12px;
        font-size: 16px; font-weight: 700; cursor: pointer;
        transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    #start { background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); color: white; }

    .input-group {
        display: flex; background: var(--card); border-radius: 12px; padding: 5px;
        border: 1px solid rgba(255,255,255,0.1);
    }

    input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; }

    /* 狀態卡片 */
    #status {
        width: 85%; max-width: 380px; margin-top: 20px; padding: 20px;
        border-radius: 20px; background: var(--card); text-align: center;
        border-left: 8px solid #444; transition: 0.3s;
    }

    .status.ok { border-left-color: var(--success); background: rgba(46, 204, 113, 0.15); }
    .status.err { border-left-color: var(--error); background: rgba(255, 107, 107, 0.15); }
    .status.wait { border-left-color: var(--warning); background: rgba(241, 196, 15, 0.15); }

    .big { font-size: 30px; font-weight: 900; }

    /* 人數調整按鈕 (微調功能) */
    .counter-ui {
        display: flex; align-items: center; justify-content: center;
        gap: 20px; margin-top: 15px; padding-top: 15px;
        border-top: 1px solid rgba(255,255,255,0.1);
    }

    .btn-adj {
        width: 50px; height: 50px; border-radius: 50%;
        background: var(--accent); color: #000; font-size: 24px;
    }
</style>
</head>

<body>

<h2>🎟️ 後慈湖驗票系統 🌲</h2>

<div id="reader-container">
    <div class="scan-line" id="line"></div>
    <div id="reader"></div>
</div>

<div class="controls">
    <button id="start">📷 啟動掃描鏡頭</button>
    <div class="input-group">
        <input id="manual" type="text" placeholder="⌨️ 手動輸入票號...">
        <button class="btn-manual" onclick="manualCheck()" style="background:rgba(255,255,255,0.1); color:white; border-radius:8px; padding:5px 15px;">驗證</button>
    </div>
</div>

<div id="status" class="status">
    <div id="msg-area">
        <div class="big">⏳ 準備就緒</div>
        <div>請點擊上方按鈕</div>
    </div>
    
    <!-- 人數微調區 -->
    <div class="counter-ui">
        <button class="btn-adj" onclick="changeCount(-1)">➖</button>
        <div id="people-count" style="font-size: 22px; font-weight: bold; min-width: 100px;">👥 0 人</div>
        <button class="btn-adj" onclick="changeCount(1)">➕</button>
    </div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbw5VQi-dtLodRQbKTgzueGGXgMBBedA_Th93Skr_Dia3-JYbxtd00shnZ24axbznDY/exec";
const TOKEN="abc123";

let qr;
let scanning=false;
let lastId="";
let count = 0;

const okSound=new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
const errSound=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

const statusEl=document.getElementById("status");
const msgArea=document.getElementById("msg-area");
const countEl=document.getElementById("people-count");
const scanLine=document.getElementById("line");

document.getElementById("start").onclick=()=>{
    qr=new Html5Qrcode("reader");
    scanLine.style.display = "block";
    qr.start({facingMode:"environment"}, {fps:30, qrbox: 250}, onScan);
};

function onScan(text){
    if(scanning) return;
    const id=text.includes("id=")? text.split("id=")[1].split("&")[0] : text;
    if(id===lastId){
        show("⚠️ 重複票號","err");
        errSound.play();
        return;
    }
    scanning=true;
    lastId=id;
    show("🔍 驗證中...","wait");
    send({id:id, action:"verify", token:TOKEN});
}

function manualCheck(){
    let val=document.getElementById("manual").value.trim();
    if(val) onScan(val);
}

// 🟢 手動人數調整功能
function changeCount(adj) {
    count = Math.max(0, count + adj);
    countEl.innerText = `👥 ${count} 人`;
    // 同步到後端
    fetch(API, {method: "POST", body: JSON.stringify({action:"sync", count: count, token:TOKEN})});
}

function send(data){
    fetch(API,{method:"POST", body:JSON.stringify(data)})
    .then(r=> r.json())
    .then(res=>{
        if(!res.ok){
            show("🚫 驗票失敗","err");
            errSound.play();
            scanning=false; return;
        }
        okSound.play();
        count = res.current || 0;
        countEl.innerText = `👥 ${count} 人`;
        show("✅ 驗證通過","ok");
        scanning=false;
    })
    .catch(()=>{
        show("📡 離線暫存","wait");
        scanning=false;
    });
}

function show(msg, type){
    statusEl.className="status "+type;
    msgArea.innerHTML=`<div class="big">${msg}</div>`;
    if(navigator.vibrate) navigator.vibrate(type==='ok'? 80 : 150);
}
</script>

</body>
</html>
