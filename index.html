<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>後慈湖驗票</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: "Noto Sans TC", sans-serif;
  background:#121212;
  color:white;
  text-align:center;
  padding:15px;
}
h2 { color:#9be7ff; font-size:28px; }

#reader {
  max-width:600px;
  margin:10px auto;
  border-radius:25px;
  overflow:hidden;
  border:4px solid #444;
  background:#000;
}
.status {
  margin:25px auto;
  padding:25px;
  font-size:22px;
  font-weight:900;
  border-radius:20px;
  white-space:pre-line;
}
.ok   { background:#2ecc71; }
.err  { background:#e74c3c; }
.wait { background:#f1c40f; color:black; }

button {
  width:90%;
  max-width:500px;
  padding:25px;
  font-size:26px;
  border-radius:60px;
  border:none;
  background:linear-gradient(135deg,#3498db,#2980b9);
  color:white;
}
</style>
</head>

<body>

<h2>🎟️ 後慈湖驗票系統</h2>

<div id="reader"></div>
<button id="start">📷 啟動相機驗票</button>
<div id="status" class="status">請啟動相機</div>

<script>
// ✅ 換成你真正的 GAS Web App
const API_URL =
  "https://script.google.com/macros/s/AKfycbw5VQi-dtLodRQbKTgzueGGXgMBBedA_Th93Skr_Dia3-JYbxtd00shnZ24axbznDY/exec";

let qr;
let scanning = false;
const statusEl = document.getElementById("status");

document.getElementById("start").onclick = () => {
  qr = new Html5Qrcode("reader");
  qr.start(
    { facingMode: "environment" },
    { fps: 15, qrbox: 250 },
    onScan
  );
  statusEl.className = "status wait";
  statusEl.innerText = "📷 相機啟動中…";
};

function onScan(text) {
  if (scanning) return;
  scanning = true;
  qr.stop();

  const id = text.includes("id=")
    ? text.split("id=")[1].split("&")[0]
    : text;

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ id })
  })
  .then(r => r.json())   // ✅ 改成接 JSON
  .then(res => {
    if (!res.ok) {
      statusEl.className = "status err";
      statusEl.innerText = res.msg;
    } else {
      const d = res.detail;
      statusEl.className = "status ok";
      statusEl.innerText =
`✅ ${res.msg}

🎫 全票：${d.cash_full + d.card_full}
👥 團體：${d.cash_group + d.card_group}
🧓 優待：${d.cash_discount + d.card_discount}
🆓 免費：${d.free}
👤 總人數：${d.people}`;
    }

    scanning = false;
    setTimeout(() => {
      statusEl.className = "status wait";
      statusEl.innerText = "🟢 請掃描下一張票";
      qr.start(
        { facingMode:"environment" },
        { fps:15, qrbox:250 },
        onScan
      );
    }, 3000);
  })
  .catch(() => {
    statusEl.className = "status err";
    statusEl.innerText = "❌ 系統連線失敗";
    scanning = false;
  });
}
// 🎫 驗票成功時自動呼叫
fetch("你的GAS網址", {
  method: "POST",
  mode: "no-cors",
  body: JSON.stringify({ 
    type: "IN", 
    delta: 1, 
    source: "驗票槍掃描" 
  })
});

</script>

</body>
</html>
