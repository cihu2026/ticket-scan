<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="theme-color" content="#08143f"><title>後慈湖電子驗票系統｜星空主題版</title><script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script><style>:root{--bg:#151847;--bg2:#2b2466;--text:#fff;--muted:#d7ddff;--line:rgba(255,255,255,.28);--primary:#8ed8ff;--accent:#d8a6ff;--star:#ffe66d;--blush:#ff8fc7;--green:#9fffd0;--green2:#49c98c;--red:#ff65ae;--orange:#ffc36a;--icon:"🌌"}body[data-theme=starry]{--bg:#151847;--bg2:#2b2466;--text:#fff;--muted:#d7ddff;--line:rgba(255,255,255,.28);--primary:#8ed8ff;--accent:#d8a6ff;--star:#ffe66d;--blush:#ff8fc7;--green:#9fffd0;--green2:#49c98c;--red:#ff65ae;--orange:#ffc36a;--icon:"🌌"}body[data-theme=stitch]{--bg:#07133a;--bg2:#123783;--text:#fff;--muted:#cbd9ff;--line:rgba(139,214,255,.34);--primary:#4fdcff;--accent:#7c7bff;--star:#ffe66d;--blush:#ff65ae;--green:#5df0a2;--green2:#1db96b;--red:#d93476;--orange:#ffae5f;--icon:"💙"}body[data-theme=labubu]{--bg:#20140f;--bg2:#6e472f;--text:#fff7ea;--muted:#ffe0bd;--line:rgba(255,232,199,.42);--primary:#f7dba8;--accent:#ff9bb8;--star:#ffe58a;--blush:#ff8eaa;--green:#a8ffbf;--green2:#32b874;--red:#c43a5a;--orange:#d99a5f;--icon:"👾"}body[data-theme=usagi]{--bg:#2b1230;--bg2:#8b3b79;--text:#fff7fc;--muted:#ffd8ec;--line:rgba(255,155,196,.5);--primary:#ff8fbd;--accent:#8fd9ff;--star:#ffe38a;--blush:#ffaccf;--green:#caffe0;--green2:#47c985;--red:#dc5d7b;--orange:#ffe17a;--icon:"🐰"}body[data-theme=snoopy]{--bg:#090d16;--bg2:#2b3448;--text:#fff;--muted:#d9e2f1;--line:rgba(226,232,240,.34);--primary:#e5e7eb;--accent:#ffd166;--star:#ffd166;--blush:#ef4444;--green:#dcfce7;--green2:#22c55e;--red:#991b1b;--orange:#ffd166;--icon:"🐶"}body[data-theme=disney]{--bg:#130b3f;--bg2:#6d28d9;--text:#fff;--muted:#efe5ff;--line:rgba(251,191,36,.38);--primary:#8bd9ff;--accent:#fbbf24;--star:#ffd76a;--blush:#f9a8d4;--green:#a7f3d0;--green2:#10b981;--red:#be185d;--orange:#fbbf24;--icon:"✨"}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Segoe UI",sans-serif}body{margin:0;padding:10px 10px calc(80px + env(safe-area-inset-bottom));color:var(--text);text-align:center;background:radial-gradient(circle at 12% 8%,color-mix(in srgb,var(--primary) 36%,transparent),transparent 28%),radial-gradient(circle at 88% 6%,color-mix(in srgb,var(--accent) 34%,transparent),transparent 30%),radial-gradient(circle at 15% 92%,color-mix(in srgb,var(--blush) 24%,transparent),transparent 28%),linear-gradient(145deg,var(--bg),var(--bg2) 58%,#050817);overflow-x:hidden}body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.43;background-image:radial-gradient(circle,rgba(255,255,255,.9) 1px,transparent 1.8px),radial-gradient(circle,color-mix(in srgb,var(--star) 90%,transparent) 1px,transparent 1.9px),radial-gradient(circle,color-mix(in srgb,var(--primary) 74%,transparent) 1px,transparent 1.9px);background-size:38px 38px,76px 76px,116px 116px;background-position:0 0,22px 18px,55px 33px}.app{position:relative;z-index:1;width:min(620px,100%);margin:auto;display:grid;gap:14px}.hero,.card,.status,.hint,.netbar,.countbar{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(255,255,255,.08));-webkit-backdrop-filter:blur(22px);backdrop-filter:blur(22px);box-shadow:0 22px 62px rgba(5,10,38,.28);overflow:hidden}.hero{position:relative;padding:18px 16px;border-radius:34px}.hero:after{content:var(--icon);position:absolute;right:18px;top:13px;font-size:30px}.eyebrow{margin:0 0 6px;color:var(--green);font-size:12px;font-weight:1000;letter-spacing:2px}h1{margin:0;font-size:27px;font-weight:1000}.subtitle{margin:8px 0 0;color:var(--muted);font-size:13px;font-weight:850}.themes{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-top:12px}.theme{min-height:32px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.15);color:var(--text);font-size:8px;font-weight:1000;white-space:nowrap}.theme.on{background:linear-gradient(135deg,var(--primary),var(--accent));box-shadow:0 9px 20px color-mix(in srgb,var(--primary) 26%,transparent)}.netbar{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;border-radius:999px;color:var(--muted);font-size:13px;font-weight:1000}.dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 12px var(--green);margin-right:6px}.countbar{border-radius:28px;padding:13px}.countMain{display:flex;align-items:baseline;justify-content:center;gap:8px}.countMain span{color:var(--muted);font-size:14px;font-weight:1000}.countMain b{font-size:56px;line-height:.95;color:var(--green)}.countGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.countMini{border:1px solid var(--line);border-radius:18px;padding:8px 4px;background:rgba(255,255,255,.12);font-weight:1000}.countMini span{display:block;color:var(--muted);font-size:11px;font-weight:900}.countMini b{font-size:18px}.countTime{margin-top:8px;color:var(--muted);font-size:12px;font-weight:850}.card{border-radius:31px;padding:18px 16px 20px}.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;text-align:left}.title{display:flex;align-items:center;gap:9px;font-size:17px;font-weight:1000}.ico{display:grid;place-items:center;width:40px;height:40px;border-radius:18px;background:rgba(255,255,255,.14);border:1px solid var(--line)}.note{font-size:12px;color:var(--muted);font-weight:900}button,input{font:inherit}button{border:0;cursor:pointer;touch-action:manipulation}button:active{transform:scale(.97)}input{display:block;width:100%;min-height:64px;padding:0 14px;border-radius:24px;border:1px solid var(--line);background:rgba(255,255,255,.14);color:var(--text);text-align:center;font-size:19px;font-weight:1000;outline:none}input::placeholder{color:var(--muted)}.start{display:block;width:100%;min-height:68px;margin-bottom:18px;border-radius:25px;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;font-size:20px;font-weight:1000;box-shadow:0 14px 30px color-mix(in srgb,var(--primary) 26%,transparent)}#reader{display:none;width:100%;min-height:260px;max-height:330px;aspect-ratio:1.2/1;margin:0 0 18px;border-radius:27px;overflow:hidden;background:#000;border:1px solid var(--line)}body.scanner-on #reader{display:block}#reader video{width:100%!important;height:100%!important;object-fit:cover!important}.row{display:grid;grid-template-columns:minmax(0,1fr) 112px;gap:12px;align-items:stretch}.send{min-height:64px;border-radius:24px;background:linear-gradient(135deg,var(--orange),var(--blush));color:#fff;font-size:17px;font-weight:1000;white-space:nowrap}.direct .send{background:linear-gradient(135deg,var(--green),var(--green2));color:#062b19}.signrow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}.signbtn{min-height:64px;border-radius:24px;color:#fff;font-size:24px;font-weight:1000;border:2px solid transparent}.signbtn.on{border-color:#fff}.plus{background:linear-gradient(180deg,var(--green),var(--green2));color:#062b19}.minus{background:linear-gradient(180deg,var(--blush),var(--red));color:#fff}.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}.key{min-height:56px;border-radius:22px;font-size:21px;font-weight:1000;background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.08));color:var(--text);border:1px solid var(--line)}.tools{display:grid;grid-template-columns:1fr 1fr;gap:10px}.tool{min-height:54px;border-radius:21px;border:1px solid var(--line);background:rgba(255,255,255,.13);color:var(--text);font-weight:1000}.undo{background:linear-gradient(135deg,var(--orange),var(--blush));color:#fff}.history{display:none;text-align:left;margin-top:10px;padding:10px;border-radius:20px;border:1px solid var(--line);background:rgba(0,0,0,.14)}.status{border-radius:28px;padding:16px;font-weight:1000;line-height:1.6}.ok{border-color:rgba(93,240,162,.55)}.err{border-color:rgba(255,101,174,.6)}.wait{border-color:rgba(79,220,255,.6)}.big{font-size:52px}.current{font-size:22px;color:var(--green);margin-top:8px}.hint{border-radius:23px;padding:12px;color:var(--muted);font-size:13px;font-weight:800;line-height:1.65}@media(max-width:390px){h1{font-size:24px}.row{grid-template-columns:minmax(0,1fr) 98px;gap:10px}.theme{font-size:7.5px}input,.send{min-height:60px;border-radius:22px}.send{font-size:16px}.countMain b{font-size:48px}}</style></head><body data-theme="starry"><div class="app"><header class="hero"><p class="eyebrow" id="eyebrow">HOUCIHU STARRY GATE</p><h1>後慈湖電子驗票系統</h1><p class="subtitle" id="sub">星空版・掃碼驗票・直接加減・離線同步</p><div class="themes"><button type="button" class="theme" data-t="starry">🌌星空</button><button type="button" class="theme" data-t="stitch">💙史迪奇</button><button type="button" class="theme" data-t="labubu">👾拉布布</button><button type="button" class="theme" data-t="usagi">🐰烏薩奇</button><button type="button" class="theme" data-t="snoopy">🐶史努比</button><button type="button" class="theme" data-t="disney">✨迪士尼</button></div></header><div id="netbar" class="netbar"><span><span class="dot"></span><span id="netText">連線正常</span></span><span id="queueCount">待同步 0 筆</span></div><section class="countbar"><div class="countMain"><span>目前場內</span><b id="insideCount">--</b><span>人</span></div><div class="countGrid"><div class="countMini"><span>今日入園</span><b id="inCount">--</b></div><div class="countMini"><span>已離園</span><b id="outCount">--</b></div><div class="countMini"><span>剩餘</span><b id="remainCount">--</b></div></div><div class="countTime" id="countTime">人數讀取中</div></section><section class="card"><div class="head"><div class="title"><span class="ico">📷</span><span>掃描驗票</span></div><div class="note">QR Code / 票號</div></div><button type="button" id="start" class="start">📷 啟動掃描驗票</button><div id="reader"></div><div class="row"><input id="manualTicketInput" placeholder="請手動輸入票號" inputmode="text" autocomplete="off" autocapitalize="characters"><button type="button" id="manualSubmitBtn" class="send">🎫 驗票</button></div></section><section class="card direct"><div class="head"><div class="title"><span class="ico">👥</span><span>直接加減進園人數</span></div><div class="note">先選 + / −</div></div><div class="signrow"><button type="button" id="minusSignBtn" class="signbtn minus">− 扣回</button><button type="button" id="plusSignBtn" class="signbtn plus on">＋ 增加</button></div><div class="row"><input id="directPeopleInput" placeholder="輸入人數" readonly><button type="button" id="directPeopleBtn" class="send">✅ 送出</button></div><div class="keypad"><button type="button" class="key" data-k="1">1</button><button type="button" class="key" data-k="2">2</button><button type="button" class="key" data-k="3">3</button><button type="button" class="key" data-k="4">4</button><button type="button" class="key" data-k="5">5</button><button type="button" class="key" data-k="6">6</button><button type="button" class="key" data-k="7">7</button><button type="button" class="key" data-k="8">8</button><button type="button" class="key" data-k="9">9</button><button type="button" id="clearKeyBtn" class="key">清除</button><button type="button" class="key" data-k="0">0</button><button type="button" id="backspaceKeyBtn" class="key">⌫</button></div><div class="tools"><button type="button" id="undoDirectBtn" class="tool undo">↩️ 撤銷上一筆</button><button type="button" id="toggleHistoryBtn" class="tool">📋 本機紀錄</button></div><div id="historyBox" class="history"><div id="historyList">尚無本機紀錄</div></div></section><div id="status" class="status wait">👋 請先按「啟動掃描驗票」，也可以手動輸入票號或直接加減進園人數</div><div class="hint">上方即時顯示目前場內、入園、離園與剩餘人數；掃票成功或直接加減後會自動更新。</div></div><script>const GAS_URL="https://script.google.com/macros/s/AKfycbw63eJnsg0a70IbZXBYWktt8CCDfx0mm_MAwzMRDoxKNNvcT2FTTMpJuU8f3qfqHjo/exec";const $=id=>document.getElementById(id);let scanner=null,scanning=false,busy=false,directSign=1,lastDirect=null;const themeText={starry:["HOUCIHU STARRY GATE","星空版・掃碼驗票・直接加減・離線同步"],stitch:["HOUCIHU STITCH GATE","史迪奇版・可愛驗票・快速通關"],labubu:["HOUCIHU LABUBU GATE","拉布布版・掃碼驗票・人數控管"],usagi:["HOUCIHU USAGI GATE","烏薩奇版・掃碼驗票・現場備援"],snoopy:["HOUCIHU SNOOPY GATE","史努比版・掃碼驗票・穩定服務"],disney:["HOUCIHU MAGIC GATE","迪士尼版・掃碼驗票・夢幻通關"]};function setTheme(t){document.body.dataset.theme=t;localStorage.setItem("theme",t);document.querySelectorAll(".theme").forEach(b=>b.classList.toggle("on",b.dataset.t===t));if(themeText[t]){$("eyebrow").innerText=themeText[t][0];$("sub").innerText=themeText[t][1]}}document.querySelectorAll(".theme").forEach(b=>b.onclick=()=>setTheme(b.dataset.t));setTheme(localStorage.getItem("theme")||"starry");function n(v){const x=Number(v);return Number.isFinite(x)?x:null}function pick(d,ks){for(const k of ks){if(d&&d[k]!==undefined&&d[k]!==""){const x=n(d[k]);if(x!==null)return x}}return null}async function refreshCount(){try{const r=await fetch(GAS_URL+"?action=getCount&_="+Date.now());const d=await r.json();const tin=pick(d,["todayIn","totalIn","in","total","今日總入園人數"]);const tout=pick(d,["todayOut","out","currentOut","今日總離園人數"]);let cur=pick(d,["inside","currentInside","current","當前場內人數"]);let rem=pick(d,["remain","remaining","剩餘"]);if(cur===null&&tin!==null&&tout!==null)cur=tin-tout;if(rem===null&&cur!==null)rem=Math.max(0,50-cur);$("insideCount").innerText=cur===null?"--":cur;$("inCount").innerText=tin===null?"--":tin;$("outCount").innerText=tout===null?"--":tout;$("remainCount").innerText=rem===null?"--":rem;$("countTime").innerText=new Date().toLocaleTimeString("zh-TW",{hour12:false})+" 更新"}catch(e){$("countTime").innerText="人數讀取失敗"}}function setStatus(msg,cls="wait"){$("status").className="status "+cls;$("status").innerHTML=msg}async function verifyTicket(id){id=String(id||"").trim();if(!id||busy)return;busy=true;setStatus("⏳ 驗票中："+id,"wait");try{const r=await fetch(GAS_URL,{method:"POST",body:JSON.stringify({id:id})});const d=await r.json();if(d.ok){setStatus("✅ 驗票成功<br>票號："+id+(d.detail&&d.detail.people?"<br>人數："+d.detail.people+" 人":"")+(d.current!==undefined?"<div class='current'>目前場內："+d.current+" 人</div>":""),"ok")}else{setStatus((d.msg||"❌ 驗票失敗")+"<br>票號："+id,"err")}setTimeout(refreshCount,650)}catch(e){setStatus("❌ 連線失敗，請稍後再試","err")}setTimeout(()=>busy=false,900)}async function startScan(){if(scanning)return;if(!window.Html5Qrcode){alert("掃描元件載入中，請稍後再按一次");return}document.body.classList.add("scanner-on");scanner=new Html5Qrcode("reader");try{await scanner.start({facingMode:"environment"},{fps:10,qrbox:{width:230,height:230}},txt=>verifyTicket(txt));scanning=true;$("start").innerText="📷 掃描中"}catch(e){setStatus("❌ 無法啟動相機，請允許相機權限","err")}}$("start").onclick=startScan;$("manualSubmitBtn").onclick=()=>{const v=$("manualTicketInput").value;$("manualTicketInput").value="";verifyTicket(v)};$("manualTicketInput").addEventListener("keydown",e=>{if(e.key==="Enter")$("manualSubmitBtn").click()});function setDirectSign(s){directSign=s;$("plusSignBtn").classList.toggle("on",s>0);$("minusSignBtn").classList.toggle("on",s<0)}$("plusSignBtn").onclick=()=>setDirectSign(1);$("minusSignBtn").onclick=()=>setDirectSign(-1);document.querySelectorAll(".key[data-k]").forEach(b=>b.onclick=()=>{$("directPeopleInput").value+=b.dataset.k;$("directPeopleInput").value=$("directPeopleInput").value.replace(/^0+/,"")});$("clearKeyBtn").onclick=()=>$("directPeopleInput").value="";$("backspaceKeyBtn").onclick=()=>$("directPeopleInput").value=$("directPeopleInput").value.slice(0,-1);async function sendDirect(){const v=parseInt($("directPeopleInput").value,10);if(!v||v<1){alert("請輸入人數");return}const type=directSign>0?"IN":"OUT";const source="直接加減人數 / 票號:";if(!confirm((directSign>0?"確認增加 ":"確認扣回 ")+v+" 人？"))return;setStatus("⏳ 送出中","wait");try{await fetch(GAS_URL,{method:"POST",mode:"no-cors",body:JSON.stringify({type:type,delta:v,people:v,source:source,note:source})});lastDirect={type:type,delta:v};$("directPeopleInput").value="";setStatus("✅ 已送出人數調整","ok");setTimeout(refreshCount,850)}catch(e){setStatus("❌ 傳送失敗","err")}}$("directPeopleBtn").onclick=sendDirect;$("undoDirectBtn").onclick=async()=>{if(!lastDirect){alert("沒有可撤銷的上一筆");return}const rev=lastDirect.type==="IN"?"OUT":"IN";try{await fetch(GAS_URL,{method:"POST",mode:"no-cors",body:JSON.stringify({type:rev,delta:lastDirect.delta,people:lastDirect.delta,source:"撤銷直接加減 / 票號:",note:"撤銷直接加減 / 票號:"})});setStatus("✅ 已撤銷上一筆","ok");lastDirect=null;setTimeout(refreshCount,850)}catch(e){setStatus("❌ 撤銷失敗","err")}};$("toggleHistoryBtn").onclick=()=>{const box=$("historyBox");box.style.display=box.style.display==="block"?"none":"block"};window.addEventListener("online",()=>{$("netText").innerText="連線正常"});window.addEventListener("offline",()=>{$("netText").innerText="目前離線"});refreshCount();setInterval(refreshCount,15000);</script></body></html>
