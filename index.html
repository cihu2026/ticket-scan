<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#06111f">
<title>🎟️ 後慈湖電子驗票系統</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06111f;
  --bg2:#0b1d34;
  --card:rgba(255,255,255,.1);
  --card2:rgba(255,255,255,.065);
  --line:rgba(255,255,255,.16);
  --text:#f8fbff;
  --muted:#b7c5da;
  --blue:#22d3ee;
  --blue2:#3b82f6;
  --green:#34d399;
  --green2:#16a34a;
  --red:#fb7185;
  --red2:#be123c;
  --yellow:#facc15;
  --orange:#fb923c;
  --radius:28px;
  --radius2:20px;
  --shadow:0 18px 48px rgba(0,0,0,.35);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{min-height:100%;background:var(--bg)}
body{
  margin:0;
  min-height:100vh;
  padding:14px;
  font-family:"Noto Sans TC",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--text);
  text-align:center;
  background:
    radial-gradient(circle at 12% 4%,rgba(34,211,238,.26),transparent 30%),
    radial-gradient(circle at 86% 0%,rgba(59,130,246,.24),transparent 28%),
    radial-gradient(circle at 100% 72%,rgba(52,211,153,.16),transparent 30%),
    linear-gradient(145deg,var(--bg),#030712 78%);
}
.app{max-width:560px;margin:0 auto;padding-bottom:22px}
.hero{
  position:relative;
  overflow:hidden;
  padding:18px 16px 16px;
  border-radius:32px;
  background:linear-gradient(150deg,rgba(34,211,238,.2),rgba(255,255,255,.08) 46%,rgba(52,211,153,.12));
  border:1px solid rgba(255,255,255,.17);
  box-shadow:var(--shadow);
  backdrop-filter:blur(18px);
}
.hero::after{
  content:"";
  position:absolute;
  inset:auto -20% -55% -20%;
  height:120px;
  background:radial-gradient(circle,rgba(34,211,238,.22),transparent 68%);
  pointer-events:none;
}
.eyebrow{margin:0 0 7px;color:#a7f3d0;font-size:12px;font-weight:900;letter-spacing:2.2px;text-transform:uppercase}
h1{position:relative;margin:0;font-size:28px;font-weight:900;letter-spacing:.4px;text-shadow:0 10px 28px rgba(34,211,238,.36)}
.subtitle{position:relative;margin:8px 0 0;font-size:13px;color:var(--muted);font-weight:700;letter-spacing:.6px}
.hero-tags{position:relative;display:flex;justify-content:center;gap:7px;flex-wrap:wrap;margin-top:13px}
.tag{padding:6px 10px;border-radius:999px;background:rgba(0,0,0,.24);border:1px solid rgba(255,255,255,.13);font-size:12px;font-weight:900;color:#dff9ff}
.netbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  margin:12px auto;
  padding:10px 13px;
  border-radius:999px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(14px);
  font-size:13px;
  color:var(--muted);
}
.pill{display:inline-flex;align-items:center;gap:7px;font-weight:900;white-space:nowrap}
.dot{width:10px;height:10px;border-radius:999px;background:var(--green);box-shadow:0 0 14px var(--green)}
.offline .dot{background:var(--yellow);box-shadow:0 0 14px var(--yellow)}
#queueCount{white-space:nowrap}
.card{
  margin:0 auto 12px;
  padding:14px;
  border-radius:30px;
  border:1px solid var(--line);
  background:linear-gradient(180deg,rgba(255,255,255,.105),rgba(255,255,255,.055));
  box-shadow:0 16px 38px rgba(0,0,0,.25);
  backdrop-filter:blur(16px);
}
.section-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;text-align:left}
.section-title{display:flex;align-items:center;gap:9px;font-size:18px;font-weight:900;letter-spacing:.2px}
.section-icon{display:grid;place-items:center;width:34px;height:34px;border-radius:14px;background:rgba(34,211,238,.15);border:1px solid rgba(34,211,238,.28)}
.section-note{font-size:12px;color:var(--muted);font-weight:800;white-space:nowrap}
.start-btn{
  width:100%;
  padding:18px;
  margin:0 auto 12px;
  border:none;
  border-radius:24px;
  font-size:20px;
  font-weight:900;
  color:#fff;
  cursor:pointer;
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  box-shadow:0 14px 32px rgba(34,211,238,.28);
}
.scan-wrap{position:relative;margin:0 auto 12px}
#reader{position:relative;min-height:250px;border-radius:28px;overflow:hidden;background:#000;border:1px solid rgba(255,255,255,.22);box-shadow:inset 0 0 0 1px rgba(255,255,255,.05),0 14px 36px rgba(0,0,0,.34)}
#reader video{object-fit:cover!important}
#reader::before{content:"";position:absolute;inset:15%;border:3px solid rgba(34,211,238,.95);border-radius:26px;box-shadow:0 0 26px rgba(34,211,238,.56),inset 0 0 20px rgba(34,211,238,.2);pointer-events:none;z-index:2}
#reader::after{content:"對準 QR Code 自動驗票";position:absolute;left:50%;bottom:15px;transform:translateX(-50%);z-index:3;padding:8px 13px;border-radius:999px;background:rgba(0,0,0,.56);border:1px solid rgba(255,255,255,.18);color:#e5fbff;font-size:12px;font-weight:900;letter-spacing:.4px;pointer-events:none}
.scan-line{position:absolute;left:21%;right:21%;top:25%;height:3px;z-index:4;background:linear-gradient(90deg,transparent,var(--blue),#fff,var(--blue),transparent);border-radius:999px;box-shadow:0 0 17px var(--blue);animation:scanMove 1.55s ease-in-out infinite alternate;pointer-events:none}
@keyframes scanMove{from{transform:translateY(0)}to{transform:translateY(112px)}}
.manual-box,.direct-row,.input-group{display:grid;grid-template-columns:1fr 112px;gap:10px}
input{width:100%;padding:16px 12px;border-radius:22px;border:1px solid rgba(255,255,255,.18);background:rgba(2,6,23,.58);color:#fff;font-size:18px;text-align:center;outline:none;font-weight:800}
input::placeholder{color:rgba(226,232,240,.55)}
input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(34,211,238,.14)}
button{transition:transform .08s ease,filter .12s ease,opacity .12s ease;touch-action:manipulation}
button:active{transform:scale(.97)}
button:disabled{opacity:.55;cursor:not-allowed}
.btn-send{border:none;border-radius:22px;font-weight:900;background:linear-gradient(135deg,#fb923c,#ea580c);color:#fff;cursor:pointer;font-size:16px;box-shadow:0 10px 22px rgba(251,146,60,.22)}
.btn-manual{background:linear-gradient(135deg,#64748b,#334155);box-shadow:0 10px 22px rgba(51,65,85,.32)}
.direct-card{border-color:rgba(52,211,153,.28);background:linear-gradient(180deg,rgba(52,211,153,.16),rgba(255,255,255,.055))}
.direct-card .section-icon{background:rgba(52,211,153,.16);border-color:rgba(52,211,153,.3)}
.btn-direct{background:linear-gradient(135deg,var(--green),var(--green2));box-shadow:0 10px 24px rgba(52,211,153,.24)}
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin:12px 0 10px}
.quick-btn{border:none;border-radius:22px;padding:17px 0;font-size:20px;font-weight:900;cursor:pointer;box-shadow:0 10px 24px rgba(0,0,0,.22)}
.plus{background:linear-gradient(180deg,#3ee58f,#15803d);color:#ecfff4}
.minus{background:linear-gradient(180deg,#fb7185,#be123c);color:#fff1f2}
.direct-tools{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:8px}
.tool-btn{border:1px solid rgba(255,255,255,.17);border-radius:20px;padding:13px 8px;font-size:14px;font-weight:900;color:#fff;cursor:pointer;background:rgba(255,255,255,.1)}
.undo-btn{border:none;background:linear-gradient(135deg,rgba(251,146,60,.98),rgba(194,65,12,.96));box-shadow:0 10px 24px rgba(251,146,60,.18)}
.history{display:none;margin-top:11px;padding:11px;border-radius:20px;background:rgba(2,6,23,.42);border:1px solid rgba(255,255,255,.12);text-align:left}
.history-title{font-size:12px;color:var(--muted);font-weight:900;margin-bottom:7px;text-align:center;letter-spacing:.6px}
.history-item{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:7px 2px;border-top:1px solid rgba(255,255,255,.08);font-size:12px;color:#eaf8ff}
.history-item:first-of-type{border-top:none}
.history-diff{font-weight:900;white-space:nowrap;color:#d1fae5}
.history-status{color:#fde68a;white-space:nowrap;font-weight:900}
.status{margin:12px auto;padding:18px;min-height:96px;border-radius:30px;background:linear-gradient(180deg,rgba(255,255,255,.1),rgba(255,255,255,.055));border:1px solid var(--line);line-height:1.5;font-size:16px;box-shadow:0 16px 38px rgba(0,0,0,.24);backdrop-filter:blur(16px);overflow:hidden}
.wait{border:2px solid var(--yellow);color:#fef3c7;background:linear-gradient(180deg,rgba(250,204,21,.17),rgba(250,204,21,.06))}
.ok{border:2px solid var(--green);background:linear-gradient(180deg,rgba(52,211,153,.28),rgba(52,211,153,.08))}
.err{border:2px solid var(--red);color:#ffe4e6;background:linear-gradient(180deg,rgba(251,113,133,.28),rgba(251,113,133,.09))}
.offsave{border:2px solid var(--yellow);color:#fef9c3;background:linear-gradient(180deg,rgba(250,204,21,.22),rgba(250,204,21,.08))}
.result-hero{display:grid;gap:9px;place-items:center}
.result-title{font-size:30px;font-weight:900;letter-spacing:.8px}
.people-num{font-size:58px;font-weight:900;line-height:1;text-shadow:0 8px 22px rgba(0,0,0,.28)}
.people-label{font-size:14px;color:rgba(255,255,255,.82);font-weight:900}
.current-big{padding:8px 18px;border-radius:999px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.16);font-size:30px;font-weight:900;color:#d9fff0}
.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
.mini-stat{padding:11px 7px;border-radius:20px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.16);font-weight:900;box-shadow:inset 0 1px 0 rgba(255,255,255,.08)}
.mini-stat span{display:block;font-size:12px;color:rgba(255,255,255,.72);font-weight:700}
.big{font-size:20px;font-weight:900}
.queue-list{margin-top:8px;font-size:13px;color:#fde68a;word-break:break-all}
#adjustArea{display:none;border-color:rgba(34,211,238,.25)}
.adj-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:12px}
.btn-adj{border:none;border-radius:22px;padding:19px 0;font-size:25px;font-weight:900;cursor:pointer;box-shadow:0 10px 24px rgba(0,0,0,.22)}
.hint{margin:0 auto;color:var(--muted);font-size:12px;line-height:1.6;padding:12px 14px;border-radius:22px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1)}
.flash-ok{animation:flashOk .42s ease}
.flash-err{animation:flashErr .42s ease}
@keyframes flashOk{0%{filter:brightness(1.7)}100%{filter:brightness(1)}}
@keyframes flashErr{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@media (max-width:390px){body{padding:10px}h1{font-size:24px}.section-head{align-items:flex-start}.section-note{white-space:normal}.manual-box,.direct-row,.input-group{grid-template-columns:1fr 96px}.quick-grid{gap:6px}.quick-btn{font-size:17px;padding:15px 0}.direct-tools{grid-template-columns:1fr}.history-item{grid-template-columns:1fr auto}.history-status{grid-column:1/-1}.adj-grid{gap:10px}.btn-adj{font-size:22px;padding:18px 0}#reader{min-height:228px}.people-num{font-size:50px}.result-title{font-size:26px}.start-btn{font-size:19px;padding:17px}}
</style>
</head>
<body>
<div class="app">
  <header class="hero">
    <p class="eyebrow">Houcihu Gate Control</p>
    <h1>🎟️ 後慈湖電子驗票系統</h1>
    <p class="subtitle">掃碼驗票・手動補登・離線自動同步</p>
    <div class="hero-tags"><span class="tag">現場模式</span><span class="tag">手機友善</span><span class="tag">防誤觸</span></div>
  </header>

  <div id="netbar" class="netbar"><span id="netStatus" class="pill"><span class="dot"></span><span>連線正常</span></span><span id="queueCount">待同步 0 筆</span></div>

  <section class="card scan-card">
    <div class="section-head"><div class="section-title"><span class="section-icon">📷</span><span>掃描驗票</span></div><div class="section-note">QR Code / 票號</div></div>
    <button id="start" class="start-btn">📷 啟動掃描驗票</button>
    <div class="scan-wrap"><div id="reader"></div><div class="scan-line" aria-hidden="true"></div></div>
    <div class="manual-box"><input type="text" id="manualTicketInput" placeholder="請手動輸入票號" autocomplete="off" inputmode="text"><button id="manualSubmitBtn" class="btn-send btn-manual">🎫 驗票</button></div>
  </section>

  <section class="card direct-card">
    <div class="section-head"><div class="section-title"><span class="section-icon">👥</span><span>直接加減進園人數</span></div><div class="section-note">補登 / 扣回</div></div>
    <div class="direct-row"><input type="number" id="directPeopleInput" placeholder="輸入 + 或 - 人數" step="1" autocomplete="off" inputmode="numeric"><button id="directPeopleBtn" class="btn-send btn-direct">✅ 送出</button></div>
    <div class="quick-grid"><button type="button" class="quick-btn minus" onclick="directAdjust(-5)">-5</button><button type="button" class="quick-btn minus" onclick="directAdjust(-1)">-1</button><button type="button" class="quick-btn plus" onclick="directAdjust(1)">+1</button><button type="button" class="quick-btn plus" onclick="directAdjust(5)">+5</button></div>
    <div class="direct-tools"><button type="button" id="undoDirectBtn" class="tool-btn undo-btn">↩️ 撤銷上一筆</button><button type="button" id="toggleHistoryBtn" class="tool-btn">📋 本機紀錄</button></div>
    <div id="historyBox" class="history"><div class="history-title">最近加減紀錄</div><div id="historyList"></div></div>
  </section>

  <div id="status" class="status">👋 請先按「啟動掃描驗票」，也可以手動輸入票號或直接加減進園人數</div>

  <section id="adjustArea" class="card"><div class="section-head"><div class="section-title"><span class="section-icon">🔧</span><span>本張票人數微調</span></div><div class="section-note">驗票後使用</div></div><div class="adj-grid"><button type="button" class="btn-adj minus" onclick="adjust(-1)">➖ 1</button><button type="button" class="btn-adj plus" onclick="adjust(1)">➕ 1</button><button type="button" class="btn-adj minus" onclick="adjust(-5)">➖ 5</button><button type="button" class="btn-adj plus" onclick="adjust(5)">➕ 5</button></div><div class="input-group"><input type="number" id="manualDiff" placeholder="輸入數字"><button type="button" class="btn-send" onclick="handleManualAdjust()">📤 送出</button></div></section>

  <div class="hint">看不到相機時，請確認手機瀏覽器已允許相機權限；也可以先用手動輸入票號，或直接加減進園人數。輸入超過 20 人會跳出確認，避免現場誤按。</div>
</div>
<script>
const API_URL="https://script.google.com/macros/s/AKfycbw63eJnsg0a70IbZXBYWktt8CCDfx0mm_MAwzMRDoxKNNvcT2FTTMpJuU8f3qfqHjo/exec";
const QUEUE_KEY="cihu_ticket_offline_queue_v3";
const RECENT_KEY="cihu_ticket_recent_seen_v1";
const HISTORY_KEY="cihu_ticket_adjust_history_v1";
const REQUEST_TIMEOUT=6200;
const BIG_DIFF_CONFIRM=20;
const MAX_DIRECT_DIFF=200;
let qr=null,scanning=false,lastScan=0,lastTicketId="",syncing=false;
const statusEl=document.getElementById("status"),startBtn=document.getElementById("start"),startBackup=document.getElementById("startBackup"),adjArea=document.getElementById("adjustArea"),manualInput=document.getElementById("manualTicketInput"),manualBtn=document.getElementById("manualSubmitBtn"),directPeopleInput=document.getElementById("directPeopleInput"),directPeopleBtn=document.getElementById("directPeopleBtn"),undoDirectBtn=document.getElementById("undoDirectBtn"),toggleHistoryBtn=document.getElementById("toggleHistoryBtn"),historyBox=document.getElementById("historyBox"),historyList=document.getElementById("historyList"),netbar=document.getElementById("netbar"),netStatus=document.getElementById("netStatus"),queueCount=document.getElementById("queueCount");
if(startBtn)startBtn.onclick=startCameraOnce;
if(startBackup)startBackup.onclick=startCameraOnce;
if(manualBtn)manualBtn.onclick=()=>{const val=manualInput.value.trim();if(!val)return;onScan(val,true);manualInput.value=""};
if(manualInput)manualInput.addEventListener("keydown",e=>{if(e.key==="Enter")manualBtn.click()});
if(directPeopleBtn)directPeopleBtn.onclick=handleDirectPeople;
if(directPeopleInput)directPeopleInput.addEventListener("keydown",e=>{if(e.key==="Enter")directPeopleBtn.click()});
if(undoDirectBtn)undoDirectBtn.onclick=undoLastAdjust;
if(toggleHistoryBtn)toggleHistoryBtn.onclick=()=>{historyBox.style.display=historyBox.style.display==="block"?"none":"block";renderHistory()};
window.addEventListener("online",()=>{updateNetUI();flushQueue()});
window.addEventListener("offline",updateNetUI);
document.addEventListener("visibilitychange",()=>{if(!document.hidden){updateNetUI();flushQueue();renderHistory()}});
setInterval(()=>{if(navigator.onLine)flushQueue()},12000);
updateNetUI();flushQueue();renderHistory();
function setStartButtonState(text,disabled,hidden){[startBtn,startBackup].forEach(btn=>{if(!btn)return;if(text)btn.innerText=text;btn.disabled=!!disabled;if(hidden)btn.style.display="none"})}
function startCameraOnce(){if(qr)return;if(typeof Html5Qrcode==="undefined"){statusEl.className="status err flash-err";statusEl.innerHTML='<div class="result-hero"><div class="result-title">❌ 掃描套件尚未載入</div><div>請重新整理頁面，或確認網路可載入掃描功能。</div></div>';return}setStartButtonState("⏳ 啟動中...",true,false);startCamera()}
function startCamera(){qr=new Html5Qrcode("reader",{verbose:false});qr.start({facingMode:"environment"},{fps:30,qrbox:viewfinderSize,aspectRatio:1,disableFlip:true,rememberLastUsedCamera:true,videoConstraints:{facingMode:"environment",width:{ideal:960},height:{ideal:960}}},onScan).then(()=>{statusEl.className="status wait";statusEl.textContent="🔍 正在尋找 QR Code...";setStartButtonState(null,false,true)}).catch(err=>{statusEl.className="status err flash-err";statusEl.innerHTML='<div class="result-hero"><div class="result-title">❌ 相機啟動失敗</div><div>請允許相機權限，或改用 Chrome / Safari 開啟。</div></div>';setStartButtonState("📷 重試啟動掃描",false,false);qr=null;console.error(err)})}
function viewfinderSize(w,h){const edge=Math.floor(Math.min(w,h)*0.68);return{width:Math.max(180,Math.min(edge,260)),height:Math.max(180,Math.min(edge,260))}}
function onScan(text,isManual=false){const now=Date.now();if(scanning||(!isManual&&now-lastScan<650))return;const id=extractTicketId(text);if(!id){statusEl.className="status err flash-err";statusEl.textContent="🚫 票號格式錯誤";return}if(isRecentlySeen(id)){showLocalDuplicate(id);return}lastScan=now;scanning=true;lastTicketId=id;adjArea.style.display="block";rememberTicket(id);if(navigator.vibrate)navigator.vibrate(35);statusEl.className="status wait";statusEl.textContent="⚡ 驗證中...";pauseScanner();const payload={id,action:"verify"};postFast(payload).then(res=>{if(!res.ok){renderFail(res.msg||"驗票失敗",id);resumeScan(450);return}renderSuccess(res);resumeScan(500)}).catch(()=>{saveOffline({kind:"verify",payload,createdAt:Date.now(),ticketId:id});renderOfflineSaved("🎟️ 已離線暫存票號",id);resumeScan(450)})}
function extractTicketId(text){const raw=String(text||"").trim();if(!raw)return"";try{const parsedUrl=new URL(raw,window.location.href);const id=parsedUrl.searchParams.get("id");if(id!==null)return id.trim()}catch(e){}const idMatch=raw.match(/[?&]id=([^&]+)/);if(idMatch){try{return decodeURIComponent(idMatch[1].replace(/\+/g," ")).trim()}catch(e){return idMatch[1].trim()}}return raw}
function scannerState(){if(!qr||typeof qr.getState!=="function")return null;return qr.getState()}
function pauseScanner(){if(scannerState()===2&&typeof qr.pause==="function")qr.pause(true)}
function resumeScan(ms){setTimeout(()=>{if(scannerState()===3&&typeof qr.resume==="function")qr.resume();scanning=false},ms)}
function displayNumber(value){const number=Number(value);return Number.isFinite(number)?String(number):"0"}
function formatSigned(value){const n=Number(value)||0;return `${n>0?"+":""}${n}`}
function renderSuccess(res){const d=res.detail||{};if(navigator.vibrate)navigator.vibrate([80]);statusEl.className="status ok flash-ok";statusEl.innerHTML=`<div class="result-hero"><div class="result-title">✅ 驗票成功</div><div><div class="people-num">${displayNumber(d.people)}</div><div class="people-label">本張票人數</div></div><div class="current-big">場內 ${displayNumber(res.current)} 人</div></div><div class="result-grid"><div class="mini-stat">${displayNumber(d.cash_full)} / ${displayNumber(d.cash_group)} / ${displayNumber(d.cash_discount)}<span>現金 全/團/優</span></div><div class="mini-stat">${displayNumber(d.card_full)} / ${displayNumber(d.card_group)} / ${displayNumber(d.card_discount)}<span>悠遊 全/團/優</span></div><div class="mini-stat">${displayNumber(d.free)}<span>免費</span></div></div>`}
function renderFail(msg,id){if(navigator.vibrate)navigator.vibrate([50,40,50]);statusEl.className="status err flash-err";statusEl.innerHTML=`<div class="result-hero"><div class="result-title">⛔ 驗票未通過</div><div class="big">${escapeHtml(msg)}</div>${id?`<div class="queue-list">票號：${escapeHtml(id)}</div>`:""}</div>`}
function handleManualAdjust(){const val=parseInt(document.getElementById("manualDiff").value,10);if(isNaN(val)||val===0)return;if(!confirmLargeDiff(val))return;adjust(val);document.getElementById("manualDiff").value=""}
function handleDirectPeople(){const val=parseInt(directPeopleInput.value,10);if(isNaN(val)||val===0){statusEl.className="status err flash-err";statusEl.textContent="🚫 請輸入要加減的人數，例如 2 或 -1";return}if(!validateDirectDiff(val))return;if(!confirmLargeDiff(val))return;directPeopleInput.value="";submitDirectAdjust(val)}
function validateDirectDiff(diff){if(Math.abs(diff)>MAX_DIRECT_DIFF){statusEl.className="status err flash-err";statusEl.textContent=`🚫 單次加減不可超過 ${MAX_DIRECT_DIFF} 人，避免誤觸`;return false}return true}
function confirmLargeDiff(diff){return Math.abs(diff)<BIG_DIFF_CONFIRM||confirm(`確定要一次修正 ${formatSigned(diff)} 人嗎？`)}
function directAdjust(diff){if(!validateDirectDiff(diff))return;if(!confirmLargeDiff(diff))return;submitDirectAdjust(diff)}
function submitDirectAdjust(diff){adjust(diff,"直接加減人數","手動直接輸入",{record:true,kind:"direct"})}
function undoLastAdjust(){const history=loadHistory();const target=history.find(item=>item.kind==="direct"&&!item.undone);if(!target){statusEl.className="status err flash-err";statusEl.textContent="目前沒有可撤銷的直接加減紀錄";return}if(!confirm(`確定撤銷上一筆 ${formatSigned(target.diff)} 人？`))return;target.undone=true;saveHistory(history);renderHistory();adjust(-target.diff,"撤銷上一筆加減","撤銷:"+(target.actionId||""),{record:true,kind:"undo"})}
function adjust(diff,source="驗票端微調",notePrefix="票號:",options={}){const actionId=String(Date.now())+Math.random().toString(16).slice(2);const payload={type:"IN",delta:diff,source,note:notePrefix+(lastTicketId||""),actionId};statusEl.className="status wait";statusEl.textContent="🔄 同步中...";postFast(payload).then(res=>{if(options.record)recordHistory({actionId,kind:options.kind||"direct",diff,source,status:"完成",current:res.current,createdAt:Date.now()});statusEl.className="status ok flash-ok";statusEl.innerHTML=`<div class="result-hero"><div class="result-title">✅ 已修正 ${formatSigned(diff)}</div><div class="current-big">目前場內 ${displayNumber(res.current)} 人</div></div>`}).catch(()=>{saveOffline({kind:"adjust",payload,createdAt:Date.now(),ticketId:lastTicketId});if(options.record)recordHistory({actionId,kind:options.kind||"direct",diff,source,status:"待同步",createdAt:Date.now()});renderOfflineSaved(`🔧 已離線暫存修正 ${formatSigned(diff)}`,lastTicketId)})}
function postFast(payload){const controller=new AbortController();const timer=setTimeout(()=>controller.abort(),REQUEST_TIMEOUT);return fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},cache:"no-store",keepalive:true,signal:controller.signal,body:JSON.stringify(payload)}).then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json()}).finally(()=>clearTimeout(timer))}
function loadQueue(){try{return JSON.parse(localStorage.getItem(QUEUE_KEY)||"[]")}catch(e){return[]}}
function saveQueue(queue){localStorage.setItem(QUEUE_KEY,JSON.stringify(queue));updateNetUI()}
function saveOffline(item){let queue=loadQueue();const keyBase=item.kind+":"+JSON.stringify(item.payload);const key=item.kind==="verify"?keyBase:keyBase+":"+item.createdAt+":"+Math.random().toString(16).slice(2);if(item.kind==="verify"&&queue.some(q=>q.key===key)){updateNetUI();return}queue.push({...item,key,queueId:String(Date.now())+Math.random().toString(16).slice(2),tries:0});saveQueue(queue)}
function renderOfflineSaved(title,ticketId){statusEl.className="status offsave";statusEl.innerHTML=`<div class="result-hero"><div class="result-title">${title}</div><div>不用重掃，恢復網路會自動補送</div>${ticketId?`<div class="queue-list">票號：${escapeHtml(ticketId)}</div>`:""}<div class="current-big">待同步 ${loadQueue().length} 筆</div></div>`}
async function flushQueue(){if(syncing||!navigator.onLine)return;let queue=loadQueue();if(queue.length===0){updateNetUI();return}syncing=true;updateNetUI("同步中...");const remain=[];let done=0;for(const item of queue){try{const res=await postFast(item.payload);done++;if(res&&res.ok===false){console.warn("GAS rejected queued item",res)}}catch(e){item.tries=(item.tries||0)+1;remain.push(item)}}syncing=false;saveQueue(remain);if(done>0){statusEl.className=remain.length?"status offsave":"status ok flash-ok";statusEl.innerHTML=remain.length?`<div class="result-hero"><div class="result-title">⚠️ 已同步 ${done} 筆</div><div class="queue-list">尚待同步：${remain.length} 筆，網路穩定後會再試</div></div>`:`<div class="result-hero"><div class="result-title">✅ 離線資料已全部同步</div></div>`}}
function updateNetUI(extraText){const queue=loadQueue();const online=navigator.onLine;netbar.classList.toggle("offline",!online||queue.length>0);netStatus.innerHTML=`<span class="dot"></span><span>${extraText||(online?"連線正常":"離線模式")}</span>`;queueCount.textContent=`待同步 ${queue.length} 筆`}
function loadHistory(){try{return JSON.parse(localStorage.getItem(HISTORY_KEY)||"[]")}catch(e){return[]}}
function saveHistory(history){localStorage.setItem(HISTORY_KEY,JSON.stringify(history.slice(0,20)))}
function recordHistory(item){const history=loadHistory();history.unshift(item);saveHistory(history);renderHistory()}
function renderHistory(){if(!historyList)return;const history=loadHistory().slice(0,5);if(history.length===0){historyList.innerHTML='<div class="history-item"><span>尚無本機加減紀錄</span><span class="history-status">—</span></div>';return}historyList.innerHTML=history.map(item=>`<div class="history-item"><span>${escapeHtml(nowTime(item.createdAt))} ${escapeHtml(item.kind==="undo"?"撤銷":"加減")}</span><span class="history-diff">${formatSigned(item.diff)} 人</span><span class="history-status">${item.undone?"已撤銷":escapeHtml(item.status||"")}</span></div>`).join("")}
function nowTime(ts){const d=new Date(ts||Date.now());return d.toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false})}
function loadRecent(){try{return JSON.parse(localStorage.getItem(RECENT_KEY)||"[]")}catch(e){return[]}}
function rememberTicket(id){const now=Date.now();let list=loadRecent().filter(x=>now-x.t<10*60*1000&&x.id!==id);list.push({id,t:now});if(list.length>80)list=list.slice(list.length-80);localStorage.setItem(RECENT_KEY,JSON.stringify(list))}
function isRecentlySeen(id){const now=Date.now();return loadRecent().some(x=>x.id===id&&now-x.t<80*1000)}
function showLocalDuplicate(id){if(navigator.vibrate)navigator.vibrate([40,40,40]);statusEl.className="status err flash-err";statusEl.innerHTML=`<div class="result-hero"><div class="result-title">⚠️ 這支手機剛剛掃過</div><div>先不要重掃，避免重複送出</div><div class="queue-list">票號：${escapeHtml(id)}</div></div>`}
function escapeHtml(value){return String(value).replace(/[&<>'"]/g,s=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;","\"":"&quot;"}[s]))}
</script>
