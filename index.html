<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎟️ 驗票系統 PRO v3</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
margin:0;
background:#121212;
color:#fff;
font-family:sans-serif;
text-align:center;
}
h2{color:#00d2ff;}
#reader{
max-width:500px;
margin:auto;
border-radius:20px;
overflow:hidden;
}
button{
padding:15px;
border:none;
border-radius:50px;
font-weight:900;
margin:5px;
}
#start{background:#00d2ff;color:#000;}
.status{
margin:15px;
padding:20px;
border-radius:15px;
background:#1e1e1e;
}
.big{
font-size:28px;
font-weight:900;
}
.err{color:#ff6b6b;}
.ok{color:#2ecc71;}
.wait{color:#f1c40f;}
</style>
</head>

<body>

<h2>🎟️ 驗票系統 PRO v3</h2>

<div id="reader"></div>

<button id="start">📷 啟動掃描</button>

<div>
<input id="manual" placeholder="手動輸入票號">
<button onclick="manualCheck()">驗票</button>
</div>

<div id="status" class="status">等待中</div>

<script>
const API="https://script.google.com/macros/s/AKfycbw5VQi-dtLodRQbKTgzueGGXgMBBedA_Th93Skr_Dia3-JYbxtd00shnZ24axbznDY/exec";

// 🔐 前端驗證碼（要跟後端一致）
const TOKEN="abc123";

let qr;
let scanning=false;
let lastId="";
let cache=[];

// 🔊 音效
const okSound=new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
const errSound=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

const statusEl=document.getElementById("status");

// 啟動
document.getElementById("start").onclick=()=>{
qr=new Html5Qrcode("reader");

qr.start(
{facingMode:"environment"},
{
fps:30,
qrbox:220,
videoConstraints:{
width:{ideal:1280},
height:{ideal:720}
}
},
onScan
);
};

// 掃描
function onScan(text){

if(scanning) return;

const id=text.includes("id=")
? text.split("id=")[1].split("&")[0]
: text;

// 防重票
if(id===lastId){
show("⚠️ 重複票號","err");
errSound.play();
return;
}

scanning=true;
lastId=id;

show("驗證中...","wait");

// 👉 送出
send({
id:id,
action:"verify",
token:TOKEN
});
}

// 手動
function manualCheck(){
let val=document.getElementById("manual").value.trim();

if(!/^[A-Za-z0-9_-]+$/.test(val)){
show("票號格式錯誤","err");
return;
}

onScan(val);
}

// API
function send(data){

fetch(API,{
method:"POST",
body:JSON.stringify(data)
})
.then(r=>{
if(!r.ok) throw "http error";
return r.json();
})
.then(res=>{

if(!res.ok){
show("🚫 驗票失敗","err");
errSound.play();
scanning=false;
return;
}

okSound.play();

show(`
<div class="big">✅ 通過</div>
<div class="big">👥 ${res.current || 0} 人</div>
`,"ok");

scanning=false;

// 🔥 補送暫存
flushCache();

})
.catch(()=>{

// ❗離線暫存
cache.push(data);

show("⚠️ 離線暫存中","wait");

scanning=false;

});
}

// 補送
function flushCache(){
if(cache.length===0) return;

let temp=[...cache];
cache=[];

temp.forEach(d=>send(d));
}

// UI
function show(msg,type){
statusEl.className="status "+type;
statusEl.innerHTML=msg;

if(navigator.vibrate) navigator.vibrate(50);
}
</script>

</body>
</html>
