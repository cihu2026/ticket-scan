<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ 後慈湖智慧驗票系統</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --success: #00f2ad;
            --error: #ff5858;
            --warning: #f9d423;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
            font-family: 'PingFang TC', 'Microsoft JhengHei', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        h2 {
            margin: 10px 0 25px 0;
            font-size: 26px;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 10px rgba(0, 242, 254, 0.3));
        }

        /* 掃描器容器 */
        #reader-container {
            position: relative;
            width: 100%;
            max-width: 360px;
            aspect-ratio: 1/1;
            border-radius: 30px;
            overflow: hidden;
            background: #000;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* 掃描框裝飾 Corners */
        .corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 4px solid var(--primary);
            z-index: 11;
            pointer-events: none;
        }
        .tl { top: 20px; left: 20px; border-right: 0; border-bottom: 0; border-radius: 8px 0 0 0; }
        .tr { top: 20px; right: 20px; border-left: 0; border-bottom: 0; border-radius: 0 8px 0 0; }
        .bl { bottom: 20px; left: 20px; border-right: 0; border-top: 0; border-radius: 0 0 0 8px; }
        .br { bottom: 20px; right: 20px; border-left: 0; border-top: 0; border-radius: 0 0 8px 0; }

        #reader { width: 100% !important; height: 100% !important; border: none !important; }

        .scan-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            box-shadow: 0 0 15px var(--primary);
            animation: scan 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            z-index: 10;
            display: none;
        }

        @keyframes scan { 
            0% { top: 10%; opacity: 0; }
            50% { top: 50%; opacity: 1; }
            100% { top: 90%; opacity: 0; }
        }

        /* 控制區 */
        .controls {
            width: 100%;
            max-width: 360px;
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        #start {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
            color: white;
            box-shadow: 0 8px 20px -6px rgba(79, 172, 254, 0.5);
        }

        #start:active { transform: scale(0.96); }

        .input-group {
            display: flex;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 5px;
            border: 1px solid var(--border);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px 15px;
            outline: none;
            font-size: 15px;
        }

        .btn-manual {
            background: rgba(255,255,255,0.1);
            color: white;
            padding: 8px 20px;
            font-size: 14px;
        }

        /* 狀態卡片 */
        #status {
            width: 100%;
            max-width: 360px;
            margin-top: 20px;
            padding: 22px;
            border-radius: 24px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            backdrop-filter: blur(15px);
            text-align: center;
            box-sizing: border-box;
            transition: all 0.4s ease;
        }

        .status.ok { border-bottom: 5px solid var(--success); box-shadow: 0 10px 30px -10px rgba(0, 242, 173, 0.3); }
        .status.err { border-bottom: 5px solid var(--error); box-shadow: 0 10px 30px -10px rgba(255, 88, 88, 0.3); }
        .status.wait { border-bottom: 5px solid var(--warning); box-shadow: 0 10px 30px -10px rgba(249, 212, 35, 0.3); }

        .big { font-size: 28px; font-weight: 800; margin-bottom: 8px; letter-spacing: 1px; }
        .sub { font-size: 14px; color: #94a3b8; }
    </style>
</head>
<body>

    <h2>🎟️ 後慈湖智慧驗票</h2>

    <div id="reader-container">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="scan-line" id="line"></div>
        <div id="reader"></div>
    </div>

    <div class="controls">
        <button id="start">📷 開啟掃描鏡頭</button>
        <div class="input-group">
            <input id="manual" type="text" placeholder="手動輸入票號碼...">
            <button class="btn-manual" onclick="manualCheck()">驗票</button>
        </div>
    </div>

    <div id="status" class="status">
        <div class="big">待機中</div>
        <div class="sub">請確保連網環境並點擊按鈕</div>
    </div>

<script>
    // 原有邏輯保持不變，優化音效與回饋感
    const API="https://script.google.com/macros/s/AKfycbw5VQi-dtLodRQbKTgzueGGXgMBBedA_Th93Skr_Dia3-JYbxtd00shnZ24axbznDY/exec";
    const TOKEN="abc123";

    let qr;
    let scanning=false;
    let lastId="";
    let cache=[];

    const okSound=new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
    const errSound=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

    const statusEl=document.getElementById("status");
    const scanLine=document.getElementById("line");

    document.getElementById("start").onclick=()=>{
        if (qr) return; // 防止重複初始化
        qr=new Html5Qrcode("reader");
        scanLine.style.display = "block";
        document.getElementById("start").innerText = "🟡 初始化相機...";
        
        qr.start(
            {facingMode:"environment"},
            {
                fps:20,
                qrbox: (w, h) => { return { width: w*0.7, height: h*0.7 } }
            },
            onScan
        ).then(() => {
            document.getElementById("start").innerText = "🟢 掃描中...";
            show("🚀 掃描器已就緒", "ok");
        }).catch(err => {
            show("❌ 無法開啟鏡頭", "err");
        });
    };

    function onScan(text){
        if(scanning) return;
        const id = text.includes("id=") ? text.split("id=")[1].split("&")[0] : text;

        if(id === lastId){
            // 短暫提示重複，但不阻斷後續掃描
            return;
        }

        scanning=true;
        lastId=id;
        show("⌛ 正在驗證票券...", "wait");
        send({id:id, action:"verify", token:TOKEN});
    }

    function manualCheck(){
        let val=document.getElementById("manual").value.trim();
        if(!val) return;
        onScan(val);
    }

    function send(data){
        fetch(API,{
            method:"POST",
            body:JSON.stringify(data)
        })
        .then(r=> r.json())
        .then(res=>{
            if(!res.ok){
                show("🚫 驗票失敗<br><small>無效票或已使用</small>","err");
                errSound.play();
                scanning=false;
                return;
            }
            okSound.play();
            show(`<div class="big">✅ 驗證通過</div><div style="font-size:18px">目前場內：${res.current || 0} 人</div>`,"ok");
            setTimeout(() => { scanning=false; }, 2000); // 冷卻 2 秒再掃下一張
        })
        .catch(()=>{
            cache.push(data);
            show("📡 離線模式：已暫存資料","wait");
            scanning=false;
        });
    }

    function show(msg,type){
        statusEl.className="status "+type;
        statusEl.innerHTML=msg;
        if(navigator.vibrate) navigator.vibrate(80);
    }
</script>
</body>
</html>
