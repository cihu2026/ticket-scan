<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎟️ 後慈湖驗票系統</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
    :root {
        --primary: #00d2ff;
        --success: #2ecc71;
        --error: #ff6b6b;
        --warning: #f1c40f;
        --bg: #0a0a0a;
        --card: #1a1a1a;
        --accent: #d4af37;
    }

    body {
        margin: 0;
        background: var(--bg);
        color: #fff;
        font-family: -apple-system, "Noto Sans TC", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        padding-bottom: 40px;
    }

    h2 {
        margin: 25px 0;
        letter-spacing: 3px;
        font-weight: 800;
        opacity: 0.9;
        font-size: 1.2rem;
    }

    /* 掃描器外框 - 更加內斂的質感 */
    #reader-container {
        position: relative;
        width: 88%;
        max-width: 380px;
        border-radius: 28px;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.1);
        background: #000;
        box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    }

    #reader { width: 100% !important; border: none !important; }

    /* 掃描線 */
    .scan-line {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 2px;
        background: var(--primary);
        box-shadow: 0 0 10px var(--primary);
        animation: scan 2.5s linear infinite;
        z-index: 10;
        display: none;
    }
    @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }

    /* 控制按鈕 */
    .btn-start {
        width: 88%;
        max-width: 380px;
        margin-top: 20px;
        padding: 18px;
        border-radius: 15px;
        border: none;
        background: #fff;
        color: #000;
        font-weight: 900;
        font-size: 1rem;
        cursor: pointer;
    }

    /* --- 核心狀態卡片 (保留經典側邊條) --- */
    #status-card {
        width: 88%;
        max-width: 380px;
        margin-top: 25px;
        padding: 25px;
        border-radius: 20px;
        background: var(--card);
        border-left: 6px solid #333;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        box-sizing: border-box;
    }

    #status-card.ok { border-left-color: var(--success); background: rgba(46, 204, 113, 0.08); }
    #status-card.err { border-left-color: var(--error); background: rgba(255, 107, 107, 0.08); }
    #status-card.wait { border-left-color: var(--warning); background: rgba(241, 196, 15, 0.08); }

    .status-msg { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
    .status-sub { font-size: 14px; opacity: 0.5; letter-spacing: 1px; }

    /* --- 微調功能：極簡框框設計 --- */
    .adjust-box-container {
        width: 88%;
        max-width: 380px;
        margin-top: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .occupancy-label {
        font-size: 12px;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-left: 5px;
    }

    .main-adjust-frame {
        display: flex;
        align-items: center;
        background: var(--card);
        border-radius: 20px;
        padding: 10px;
        border: 1px solid rgba(255,255,255,0.05);
    }

    /* 左右微調小區塊 */
    .step-btn {
        width: 50px;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        color: rgba(255,255,255,0.3);
        cursor: pointer;
        user-select: none;
    }
    .step-btn:active { color: var(--primary); }

    /* 中間大數字框 */
    .number-input-frame {
        flex: 1;
        text-align: center;
    }

    .number-input-frame input {
        width: 100%;
        background: transparent;
        border: none;
        color: #fff;
        font-size: 2.5rem;
        font-weight: 200; /* 細體大字最有質感 */
        text-align: center;
        outline: none;
        font-family: 'Courier New', Courier, monospace;
    }

    .btn-apply-frame {
        background: var(--accent);
        color: #000;
        padding: 12px;
        border-radius: 12px;
        font-weight: 900;
        border: none;
        margin-top: 5px;
        font-size: 0.9rem;
        letter-spacing: 1px;
    }

</style>
</head>

<body>

<h2>後慈湖智慧驗票系統</h2>

<div id="reader-container">
    <div class="scan-line" id="line"></div>
    <div id="reader"></div>
</div>

<button class="btn-start" id="start" onclick="initScanner()">開啟掃描鏡頭</button>

<!-- 經典狀態卡 -->
<div id="status-card">
    <div class="status-msg" id="msg-big">等待掃描</div>
    <div class="status-sub" id="msg-sub">請將 QR Code 對準相機</div>
</div>

<!-- 極簡微調框框 -->
<div class="adjust-box-container">
    <div class="occupancy-label">CURRENT OCCUPANCY</div>
    <div class="main-adjust-frame">
        <div class="step-btn" onclick="offsetCount(-1)">−</div>
        <div class="number-input-frame">
            <input type="number" id="current-count-val" value="0" readonly onclick="makeEditable(this)">
        </div>
        <div class="step-btn" onclick="offsetCount(1)">+</div>
    </div>
    <button id="apply-btn" class="btn-apply-frame" style="display:none;" onclick="submitManual()">確認更新人數</button>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbw5VQi-dtLodRQbKTgzueGGXgMBBedA_Th93Skr_Dia3-JYbxtd00shnZ24axbznDY/exec";
let qr;
let currentNum = 0;
let isBusy = false;

function initScanner() {
    qr = new Html5Qrcode("reader");
    document.getElementById("line").style.display = "block";
    qr.start({facingMode:"environment"}, {fps:25, qrbox:250}, onScanSuccess);
}

function onScanSuccess(text) {
    if(isBusy) return;
    isBusy = true;
    updateUI("驗證中...", "wait");
    
    let id = text.includes("id=") ? text.split("id=")[1].split("&")[0] : text;
    
    fetch(API, { method: "POST", body: JSON.stringify({id: id, action: "verify"}) })
    .then(r => r.json())
    .then(res => {
        isBusy = false;
        if(res.ok) {
            currentNum = res.current || (currentNum + 1);
            updateUI("驗證通過", "ok");
            syncDisplay();
        } else {
            updateUI("無效票券", "err");
        }
    }).catch(() => { isBusy = false; updateUI("連線異常", "wait"); });
}

function updateUI(text, statusClass) {
    const card = document.getElementById("status-card");
    const msg = document.getElementById("msg-big");
    card.className = statusClass;
    msg.innerText = text;
    if(navigator.vibrate) navigator.vibrate(statusClass === 'ok' ? 60 : 150);
}

// 人數顯示與同步
function syncDisplay() {
    document.getElementById("current-count-val").value = currentNum;
}

function offsetCount(n) {
    currentNum = Math.max(0, currentNum + n);
    syncDisplay();
    sendSync();
}

// 點擊框框變為可編輯模式
function makeEditable(el) {
    el.readOnly = false;
    el.style.color = "var(--accent)";
    document.getElementById("apply-btn").style.display = "block";
}

function submitManual() {
    const el = document.getElementById("current-count-val");
    currentNum = parseInt(el.value) || 0;
    el.readOnly = true;
    el.style.color = "#fff";
    document.getElementById("apply-btn").style.display = "none";
    sendSync();
}

function sendSync() {
    fetch(API, { method: "POST", mode: "no-cors", body: JSON.stringify({action: "sync", count: currentNum}) });
}

</script>

</body>
</html>
