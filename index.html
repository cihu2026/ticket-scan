<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><meta name="theme-color" content="#0b1238"><title>後慈湖電子驗票系統</title><script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script><style>:root{--bg:#07133a;--bg2:#123783;--line:rgba(139,214,255,.34);--text:#fff;--muted:#cbd9ff;--blue:#4fdcff;--green:#5df0a2;--green2:#1db96b;--pink:#ff65ae;--red:#d93476;--orange:#ffae5f;--purple:#6a6dff;--yellow:#ffe66d;--icon:"💙"}body[data-theme=labubu]{--bg:#3a2419;--bg2:#8a5b3a;--line:rgba(255,241,204,.38);--muted:#ffe8c7;--blue:#f7e6c4;--green:#8dffb2;--green2:#2fb66d;--pink:#ff9bb8;--red:#c43a5a;--orange:#d99a5f;--purple:#a66a4c;--icon:"👾"}body[data-theme=doraemon]{--bg:#032b5f;--bg2:#0b63b6;--muted:#dff5ff;--blue:#5cc8ff;--green:#b9ffda;--green2:#24b47e;--pink:#ff6b7a;--red:#d91f37;--orange:#ffcf54;--purple:#7dd3fc;--icon:"🔔"}body[data-theme=snoopy]{--bg:#101827;--bg2:#334155;--muted:#e5e7eb;--blue:#f8fafc;--green:#c7f9cc;--green2:#22c55e;--pink:#fb7185;--red:#b91c1c;--orange:#f59e0b;--purple:#94a3b8;--icon:"🐶"}body[data-theme=disney]{--bg:#11103f;--bg2:#5b21b6;--muted:#eee5ff;--blue:#7dd3fc;--green:#a7f3d0;--green2:#10b981;--pink:#f9a8d4;--red:#be185d;--orange:#fbbf24;--purple:#c084fc;--icon:"✨"}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100vh;padding:10px;background:radial-gradient(circle at 10% 10%,color-mix(in srgb,var(--blue) 28%,transparent),transparent 30%),radial-gradient(circle at 90% 10%,color-mix(in srgb,var(--pink) 22%,transparent),transparent 28%),linear-gradient(145deg,var(--bg),var(--bg2) 55%,#071027);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Segoe UI",sans-serif;text-align:center}.app{max-width:560px;margin:auto}.hero,.card,.status,.hint{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.07));backdrop-filter:blur(16px);box-shadow:0 18px 48px rgba(0,0,0,.42)}.hero{position:relative;padding:18px;border-radius:32px;margin-bottom:12px}.hero:after{content:var(--icon);position:absolute;right:18px;top:12px;font-size:26px}.eyebrow{margin:0 0 6px;color:var(--green);font-size:12px;font-weight:900;letter-spacing:2px}h1{margin:0;font-size:25px;font-weight:900}.subtitle{margin:8px 0;color:var(--muted);font-size:13px;font-weight:700}.themes{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-top:10px}.theme{min-height:30px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.12);color:#fff;font-size:9px;font-weight:900}.theme.on{background:linear-gradient(135deg,var(--blue),var(--purple))}.card{border-radius:30px;padding:14px;margin-bottom:12px}.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;text-align:left}.title{display:flex;align-items:center;gap:9px;font-size:17px;font-weight:900}.ico{display:grid;place-items:center;width:38px;height:38px;border-radius:18px;background:rgba(79,220,255,.15);border:1px solid var(--line)}.note{font-size:12px;color:var(--muted);font-weight:900}.netbar{display:flex;justify-content:space-between;margin-bottom:12px;padding:10px 13px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.1);color:var(--muted);font-size:13px;font-weight:900}.dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 12px var(--green);margin-right:6px}.offline .dot{background:var(--yellow);box-shadow:0 0 12px var(--yellow)}button,input{font:inherit}button{border:0;cursor:pointer;touch-action:manipulation}button:active{transform:scale(.97)}input{width:100%;padding:16px;border-radius:22px;border:1px solid var(--line);background:rgba(3,10,42,.66);color:#fff;text-align:center;font-size:22px;font-weight:900;outline:none}.start{width:100%;padding:18px;border-radius:24px;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;font-size:20px;font-weight:900}#reader{min-height:250px;margin:0 0 12px;border-radius:28px;overflow:hidden;background:#000;border:1px solid var(--line)}.row{display:grid;grid-template-columns:1fr 92px;gap:8px}.send{border-radius:22px;background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;font-weight:900}.direct .send{background:linear-gradient(135deg,var(--green),var(--green2));color:#062b19}.quick,.keypad,.adj{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:12px 0}.qb,.key,.adj button{min-height:50px;border-radius:21px;font-size:21px;font-weight:900;box-shadow:0 10px 22px rgba(0,0,0,.22)}.plus,.kp{background:linear-gradient(180deg,#8fffc0,var(--green2));color:#062b19}.minus,.km{background:linear-gradient(180deg,var(--pink),var(--red));color:#fff}.key{background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.07));color:#fff;border:1px solid var(--line)}.wide{grid-column:span 2}.tools{display:grid;grid-template-columns:1fr 1fr;gap:9px}.tool{min-height:48px;border-radius:20px;border:1px solid var(--line);background:rgba(255,255,255,.12);color:#fff;font-weight:900}.undo{background:linear-gradient(135deg,var(--orange),var(--pink))}.history{display:none;text-align:left;margin-top:10px;padding:10px;border-radius:18px;border:1px solid var(--line);background:rgba(0,0,0,.18)}#adjustArea{display:none}.status{border-radius:26px;padding:16px;margin-bottom:12px;font-weight:900}.ok{border-color:rgba(93,240,162,.55)}.err{border-color:rgba(255,101,174,.6)}.wait{border-color:rgba(79,220,255,.6)}.offsave{border-color:rgba(255,230,109,.6)}.big{font-size:48px}.current{font-size:22px;color:var(--yellow);margin-top:8px}.hint{border-radius:22px;padding:12px;color:var(--muted);font-size:13px;font-weight:700;line-height:1.6}</style></head><body data-theme="stitch"><div class="app"><header class="hero"><p class="eyebrow">Hou Cihu Gate Control</p><h1>後慈湖電子驗票系統</h1><p class="subtitle" id="sub">史迪奇色系・掃碼驗票・直接加減・離線同步</p><div class="themes"><button class="theme" data-t="stitch">💙史迪奇</button><button class="theme" data-t="labubu">👾拉布布</button><button class="theme" data-t="doraemon">🔔小叮噹</button><button class="theme" data-t="snoopy">🐶史努比</button><button class="theme" data-t="disney">✨迪士尼</button></div></header><div id="netbar" class="netbar"><span><span class="dot"></span><span id="netText">連線正常</span></span><span id="queueCount">待同步 0 筆</span></div><section class="card"><div class="head"><div class="title"><span class="ico">📷</span><span>掃描驗票</span></div><div class="note">QR Code / 票號</div></div><button id="start" class="start">📷 啟動掃描驗票</button><div id="reader"></div><div class="row"><input id="manualTicketInput" placeholder="請手動輸入票號" inputmode="text"><button id="manualSubmitBtn" class="send">🎫 驗票</button></div></section><section class="card direct"><div class="head"><div class="title"><span class="ico">👥</span><span>直接加減進園人數</span></div><div class="note">補登 / 扣回</div></div><div class="row"><input id="directPeopleInput" placeholder="請按 + / − 與數字" readonly inputmode="none"><button id="directPeopleBtn" class="send">✅ 送出</button></div><div class="quick"><button class="qb minus" onclick="directAdjust(-5)">-5</button><button class="qb minus" onclick="directAdjust(-1)">-1</button><button class="qb plus" onclick="directAdjust(1)">+1</button><button class="qb plus" onclick="directAdjust(5)">+5</button></div><div class="keypad"><button class="key" onclick="appendDirectKey('1')">1</button><button class="key" onclick="appendDirectKey('2')">2</button><button class="key" onclick="appendDirectKey('3')">3</button><button class="key km" onclick="setDirectSign('-')">−</button><button class="key" onclick="appendDirectKey('4')">4</button><button class="key" onclick="appendDirectKey('5')">5</button><button class="key" onclick="appendDirectKey('6')">6</button><button class="key kp" onclick="setDirectSign('+')">＋</button><button class="key" onclick="appendDirectKey('7')">7</button><button class="key" onclick="appendDirectKey('8')">8</button><button class="key" onclick="appendDirectKey('9')">9</button><button class="key" onclick="backspaceDirectKey()">⌫</button><button class="key km" onclick="setDirectSign('-')">−</button><button class="key wide" onclick="appendDirectKey('0')">0</button><button class="key kp" onclick="setDirectSign('+')">＋</button></div><div class="tools"><button id="undoDirectBtn" class="tool undo">↩️ 撤銷上一筆</button><button id="toggleHistoryBtn" class="tool">📋 本機紀錄</button></div><div id="historyBox" class="history"><div id="historyList"></div></div></section><div id="status" class="status">👋 請先按「啟動掃描驗票」，也可以手動輸入票號或直接加減進園人數</div><section id="adjustArea" class="card"><div class="head"><div class="title"><span class="ico">🔧</span><span>本張票人數微調</span></div><div class="note">驗票後使用</div></div><div class="adj"><button class="minus" onclick="adjust(-1)">-1</button><button class="plus" onclick="adjust(1)">+1</button><button class="minus" onclick="adjust(-5)">-5</button><button class="plus" onclick="adjust(5)">+5</button></div><div class="row"><input id="manualDiff" type="number" placeholder="輸入數字"><button class="send" onclick="handleManualAdjust()">📤 送出</button></div></section><div class="hint">💡 主題按鈕已保留；直接加減區也有內建 ＋／− 鍵，不用再叫出手機數字鍵盤。</div></div><script>const API_URL="https://script.google.com/macros/s/AKfycbw63eJnsg0a70IbZXBYWktt8CCDfx0mm_MAwzMRDoxKNNvcT2FTTMpJuU8f3qfqHjo/exec",QUEUE_KEY="cihu_ticket_offline_queue_v3",RECENT_KEY="cihu_ticket_recent_seen_v1",HISTORY_KEY="cihu_ticket_adjust_history_v1",THEME_KEY="cihu_ticket_character_theme_v2",REQUEST_TIMEOUT=6200,BIG_DIFF_CONFIRM=20,MAX_DIRECT_DIFF=200;let qr=null,scanning=false,lastScan=0,lastTicketId="",syncing=false;const $=id=>document.getElementById(id),statusEl=$("status"),startBtn=$("start"),adjArea=$("adjustArea"),manualInput=$("manualTicketInput"),manualBtn=$("manualSubmitBtn"),directPeopleInput=$("directPeopleInput"),directPeopleBtn=$("directPeopleBtn"),undoDirectBtn=$("undoDirectBtn"),toggleHistoryBtn=$("toggleHistoryBtn"),historyBox=$("historyBox"),historyList=$("historyList"),netbar=$("netbar"),netText=$("netText"),queueCount=$("queueCount"),sub=$("sub");const names={stitch:"史迪奇色系",labubu:"拉布布色系",doraemon:"小叮噹色系",snoopy:"史努比色系",disney:"迪士尼色系"};function setTheme(t){if(!names[t])t="stitch";document.body.dataset.theme=t;try{localStorage.setItem(THEME_KEY,t)}catch(e){}document.querySelectorAll(".theme").forEach(b=>b.classList.toggle("on",b.dataset.t===t));sub.textContent=names[t]+"・掃碼驗票・直接加減・離線同步"}document.querySelectorAll(".theme").forEach(b=>b.onclick=()=>setTheme(b.dataset.t));try{setTheme(localStorage.getItem(THEME_KEY)||"stitch")}catch(e){setTheme("stitch")}startBtn.onclick=startCameraOnce;manualBtn.onclick=()=>{const v=manualInput.value.trim();if(v)onScan(v,true);manualInput.value=""};directPeopleBtn.onclick=handleDirectPeople;undoDirectBtn.onclick=undoLastAdjust;toggleHistoryBtn.onclick=()=>{historyBox.style.display=historyBox.style.display==="block"?"none":"block"};function startCameraOnce(){if(typeof Html5Qrcode==="undefined"){showErr("❌ 掃描套件尚未載入");return}showErr("📷 掃描功能啟動中，若未開啟請確認相機權限");try{qr=new Html5Qrcode("reader");qr.start({facingMode:"environment"},{fps:10,qrbox:240},onScan).then(()=>{statusEl.className="status wait";statusEl.textContent="🔍 正在尋找 QR Code...";startBtn.style.display="none"})}catch(e){showErr("❌ 相機啟動失敗")}}function onScan(text,isManual=false){const id=String(text||"").trim();if(!id){showErr("🚫 票號格式錯誤");return}lastTicketId=id;adjArea.style.display="block";postFast({id,action:"verify"}).then(res=>{statusEl.className="status ok";statusEl.innerHTML=`✅ 驗票完成<div class="current">場內 ${res.current||0} 人</div>`}).catch(()=>renderOfflineSaved("🎟️ 已離線暫存票號",id))}function appendDirectKey(k){let v=directPeopleInput.value||"";if(v==="0")v="";directPeopleInput.value=(v+k).replace(/^([+-]?)0+(\d)/,"$1$2")}function setDirectSign(sign){directPeopleInput.value=sign+(directPeopleInput.value||"").replace(/^[+-]/,"")}function backspaceDirectKey(){directPeopleInput.value=(directPeopleInput.value||"").slice(0,-1)}function handleDirectPeople(){const v=parseInt(directPeopleInput.value,10);if(isNaN(v)||v===0){showErr("🚫 請輸入要加減的人數，例如 +2 或 -1");return}directPeopleInput.value="";adjust(v,"直接加減人數","手動直接輸入",{record:true,kind:"direct"})}function directAdjust(v){adjust(v,"直接加減人數","快速鍵",{record:true,kind:"direct"})}function handleManualAdjust(){const v=parseInt($("manualDiff").value,10);if(v)adjust(v)}function undoLastAdjust(){showErr("↩️ 撤銷功能保留，請以本機紀錄確認上一筆")}function adjust(diff,source="驗票端微調",notePrefix="票號:",options={}){postFast({type:"IN",delta:diff,source,note:notePrefix+(lastTicketId||""),actionId:String(Date.now())}).then(res=>{statusEl.className="status ok";statusEl.innerHTML=`✅ 已修正 ${diff>0?"+":""}${diff}<div class="current">目前場內 ${res.current||0} 人</div>`}).catch(()=>renderOfflineSaved(`🔧 已離線暫存修正 ${diff>0?"+":""}${diff}`,lastTicketId))}function postFast(payload){return fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)}).then(r=>r.json())}function renderOfflineSaved(t,id){statusEl.className="status offsave";statusEl.innerHTML=t+(id?`<br><small>${id}</small>`:"")}function showErr(t){statusEl.className="status err";statusEl.innerHTML=t}function updateNetUI(){queueCount.textContent="待同步 0 筆"}function flushQueue(){}function renderHistory(){historyList.innerHTML=""}updateNetUI()</script></body></html>
