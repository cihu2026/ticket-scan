<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🚀 後慈湖極速驗票 Turbo v2</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
--bg:#121212;
--card:#1e1e1e;
--line:#333;
--blue:#00d2ff;
--green:#2ecc71;
--red:#e74c3c;
--yellow:#f1c40f;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

body{
margin:0;
padding:15px;
font-family:"Noto Sans TC",sans-serif;
background:var(--bg);
color:#fff;
text-align:center;
}

h2{
margin:10px 0 15px;
font-size:22px;
font-weight:900;
color:var(--blue);
letter-spacing:1px;
}

#reader{
max-width:500px;
margin:0 auto 14px;
border-radius:24px;
overflow:hidden;
background:#000;
border:2px solid #333;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

#start{
width:100%;
max-width:500px;
padding:20px;
border:none;
border-radius:50px;
font-size:20px;
font-weight:900;
color:#fff;
cursor:pointer;
background:linear-gradient(135deg,#00d2ff,#3a7bd5);
box-shadow:0 4px 15px rgba(0,210,255,0.3);
}

.status{
max-width:500px;
margin:14px auto;
padding:15px;
min-height:80px;
border-radius:20px;
background:var(--card);
border:1px solid var(--line);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
transition: all 0.2s ease;
}

.wait{border:2px solid var(--yellow); color:var(--yellow);}
.ok{border:3px solid var(--green); background:rgba(46,204,113,0.1);}
.err{border:3px solid var(--red); color:#ff9e9e; background:rgba(231,76,60,0.1);}

#adjustArea{
display:none;
max-width:500px;
margin:14px auto;
padding:16px;
border-radius:20px;
background:var(--card);
border:1px solid #333;
}

.adj-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:12px;
}

.btn-adj{
border:none;
border-radius:12px;
padding:12px 0;
font-size:16px;
font-weight:900;
cursor:pointer;
}

.plus{background:#214d2b;color:#b9f6ca;}
.minus{background:#5a2727;color:#ffcdd2;}

.input-group{display:flex;gap:10px;}

input{
flex:1;
padding:12px;
border-radius:12px;
border:1px solid #444;
background:#111;
color:#fff;
font-size:18px;
text-align:center;
}

.btn-send{
flex:.4;
border:none;
border-radius:12px;
font-weight:900;
background:#e67e22;
color:#fff;
}

.hr{border-top:1px dashed #444;width:100%;margin:8px 0;}
.big{font-size:24px;font-weight:900;}
.small{font-size:13px;opacity:0.7;}
</style>
</head>

<body>

<h2>🎟️ 後慈湖驗票 Turbo v2</h2>

<div id="reader"></div>

<button id="start">📷 點擊啟動極速驗票</button>

<div id="status" class="status">
👋 準備就緒
</div>

<div id="adjustArea">
<div style="font-weight:900;color:var(--blue);margin-bottom:10px;">🔧 進園人數微調</div>
<div class="adj-grid">
<button class="btn-adj minus" onclick="adjust(-1)">-1</button>
<button class="btn-adj plus" onclick="adjust(1)">+1</button>
<button class="btn-adj minus" onclick="adjust(-5)">-5</button>
<button class="btn-adj plus" onclick="adjust(5)">+5</button>
</div>
<div class="input-group">
<input type="number" id="manualDiff" placeholder="輸入數字">
<button class="btn-send" onclick="handleManualAdjust()">📤送出</button>
</div>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbw5VQi-dtLodRQbKTgzueGGXgMBBedA_Th93Skr_Dia3-JYbxtd00shnZ24axbznDY/exec";

// 預載入嗶聲 (體感加速神器)
const beep = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
beep.volume = 0.5;

let qr=null;
let scanning=false;
let lastScan=0;
let lastTicketId="";

const statusEl=document.getElementById("status");
const startBtn=document.getElementById("start");
const adjArea=document.getElementById("adjustArea");

startBtn.onclick=()=>{
    if(qr) return;
    startBtn.innerText="⚡ 啟動相機中...";
    startBtn.style.opacity="0.6";
    startCamera();
};

function startCamera(){
    qr = new Html5Qrcode("reader");
    const config = {
        fps: 60,                // 高幀率增加捕捉速度
        qrbox: {width: 250, height: 250}, 
        aspectRatio: 1.0,
        experimentalFeatures: {
            useBarCodeDetectorIfSupported: true // 使用硬體解碼加速
        }
    };

    qr.start({facingMode:"environment"}, config, onScan)
    .then(()=>{
        statusEl.className="status wait";
        statusEl.textContent="🔍 請對準 QR Code";
        startBtn.style.display="none";
    })
    .catch(()=>{
        statusEl.className="status err";
        statusEl.textContent="❌ 相機啟動失敗";
        startBtn.innerText="📷 點擊重試";
        startBtn.style.opacity="1";
    });
}

function onScan(text){
    const now = Date.now();
    // 冷卻時間縮短至 1 秒，加快連掃效率
    if(scanning || now - lastScan < 1000) return;

    lastScan = now;
    scanning = true;

    // --- 即時體感回饋 ---
    if(navigator.vibrate) navigator.vibrate(60); 
    beep.play().catch(()=>{}); 
    statusEl.className="status wait";
    statusEl.innerHTML="<div class='big'>⚡ 驗證中...</div>";
    // ------------------

    const id = text.includes("id=") ? text.split("id=")[1].split("&")[0] : text;
    lastTicketId = id;

    fetch(API_URL,{
        method:"POST",
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body:JSON.stringify({ id:id, action:"verify" })
    })
    .then(r=>r.json())
    .then(res=>{
        if(!res.ok){
            statusEl.className="status err";
            statusEl.innerHTML=`<div class="big">🚫 失敗</div><div>${res.msg || "無效票"}</div>`;
            scanning = false; // 出錯時立刻開放下一掃
            return;
        }
        renderSuccess(res);
        adjArea.style.display="block";
        scanning = false; // 成功後立刻開放下一掃
    })
    .catch(()=>{
        statusEl.className="status err";
        statusEl.textContent="🌐 網路異常，請重試";
        scanning = false;
    });
}

function renderSuccess(res){
    const d = res.detail || {};
    statusEl.className="status ok";
    statusEl.innerHTML = `
        <div class="big" style="color:#2ecc71;">✅ 通過：${d.people || 0} 人</div>
        <div class="hr"></div>
        <div class="small">📊 場內總數：${res.current || 0} | 票號：${lastTicketId.slice(-4)}</div>
    `;
}

function handleManualAdjust(){
    const val=parseInt(document.getElementById("manualDiff").value);
    if(isNaN(val)||val===0) return;
    adjust(val);
    document.getElementById("manualDiff").value="";
}

function adjust(diff){
    statusEl.className="status wait";
    statusEl.textContent="🔄 同步中...";

    fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            type:"IN",
            delta:diff,
            source:"驗票端微調",
            note:"票號:"+lastTicketId
        })
    })
    .then(r=>r.json())
    .then(res=>{
        statusEl.className="status ok";
        statusEl.innerHTML=`
            <div class="big" style="color:#2ecc71;">✅ 已修正 ${diff>0?'+':''}${diff}</div>
            <div class="hr"></div>
            <div class="big">📊 場內：${res.current || 0} 人</div>
        `;
    })
    .catch(()=>{
        statusEl.className="status err";
        statusEl.textContent="❌ 同步失敗";
    });
}
</script>

</body>
</html>
