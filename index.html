<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⏱️ 後慈湖驗票</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
  body { font-family: "Noto Sans TC", sans-serif; background:#121212; color:white; text-align:center; padding:15px; }
  h2 { color:#9be7ff; font-size:28px; }
  #reader { max-width:600px; margin:10px auto; border-radius:25px; overflow:hidden; border:4px solid #444; background:#000; }
  .status { margin:25px auto; padding:25px; font-size:22px; font-weight:900; border-radius:20px; white-space:pre-line; min-height: 100px; }
  .ok   { background:#2ecc71; }
  .err  { background:#e74c3c; }
  .wait { background:#f1c40f; color:black; }
  button { width:90%; max-width:500px; padding:22px; font-size:24px; margin:6px; border-radius:60px; border:none; background:linear-gradient(135deg,#3498db,#2980b9); color:white; cursor: pointer; }
  button:active { transform: scale(0.98); }
  #adjustArea { display:none; margin-top:15px; background: #222; padding: 15px; border-radius: 15px; }
  #adjustArea button { background:linear-gradient(135deg,#8e44ad,#9b59b6); width: 22%; font-size: 18px; padding: 15px 5px; }
</style>
</head>

<body>

<h2>🎟️ 後慈湖驗票系統</h2>

<div id="reader"></div>
<button id="start">📷 啟動相機驗票</button>
<div id="status" class="status">請啟動相機</div>

<div id="adjustArea">
  <div style="margin-bottom:8px;color:#ccc;">🔧 實際進園人數微調（僅限一次）</div>
  <button onclick="adjust(-1)">-1</button>
  <button onclick="adjust(1)">+1</button>
  <button onclick="adjust(-2)">-2</button>
  <button onclick="adjust(2)">+2</button>
</div>

<script>
// ⚠️ 請確保此 URL 與你最新部署的 GAS 網址一致
const API_URL = "https://script.google.com/macros/s/AKfycbw5VQi-dtLodRQbKTgzueGGXgMBBedA_Th93Skr_Dia3-JYbxtd00shnZ24axbznDY/exec";

let html5QrCode;
let scanning = false;
let lastTicketId = "";
let adjusted = false;

const statusEl = document.getElementById("status");
const adjustArea = document.getElementById("adjustArea");

// 啟動相機
document.getElementById("start").onclick = () => {
  if (html5QrCode) {
    html5QrCode.stop().then(() => startCamera());
  } else {
    startCamera();
  }
};

function startCamera() {
  html5QrCode = new Html5Qrcode("reader");
  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 250, height: 250 } },
    onScan
  ).catch(err => {
    statusEl.className = "status err";
    statusEl.innerText = "❌ 無法啟動相機";
  });
  statusEl.className = "status wait";
  statusEl.innerText = "📷 相機掃描中...";
  document.getElementById("start").style.display = "none";
}

// 掃描到 QR Code 時的動作
function onScan(text) {
  if (scanning) return;
  scanning = true;

  // 解析 ID (支援完整網址或純 ID)
  const id = text.includes("id=") ? text.split("id=")[1].split("&")[0] : text;
  lastTicketId = id;
  adjusted = false;
  adjustArea.style.display = "none";

  statusEl.className = "status wait";
  statusEl.innerText = "⏳ 正在驗票中...";

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ id: id })
  })
  .then(r => r.json())
  .then(res => {
    if (!res.ok) {
      statusEl.className = "status err";
      statusEl.innerText = res.msg;
      // 2秒後允許再次掃描
      setTimeout(() => { scanning = false; statusEl.innerText = "📷 繼續掃描..."; }, 2000);
      return;
    }

    const d = res.detail;
    statusEl.className = "status ok";
    statusEl.innerText = `✅ 驗票成功！已自動入園\n👤 總人數：${d.people}\n(餘額：場內目前 ${res.current || '?'} 人)`;

    // 顯示微調按鈕
    adjustArea.style.display = "block";
    
    // 5秒後自動隱藏微調區並允許再次掃描
    setTimeout(() => { 
      scanning = false;
      statusEl.className = "status wait";
      statusEl.innerText = "📷 繼續掃描...";
    }, 5000);
  })
  .catch((err) => {
    statusEl.className = "status err";
    statusEl.innerText = "❌ 網路連線失敗";
    scanning = false;
  });
}

// 手動微調功能
function adjust(diff) {
  if (adjusted) return;
  if (!confirm(`確認手動微調 ${diff > 0 ? "+" : ""}${diff} 人？`)) return;

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      type: "IN", 
      delta: diff,
      source: "驗票端微調",
      note: "票號:" + lastTicketId
    })
  })
  .then(() => {
    adjusted = true;
    adjustArea.style.display = "none";
    statusEl.innerText += `\n(已微調 ${diff} 人)`;
  });
}
</script>

</body>
</html>
