<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><meta name="theme-color" content="#08143f"><title>後慈湖電子驗票系統</title><script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script><style>:root{--bg1:#151847;--bg2:#2b2466;--bg3:#050817;--a:#8ed8ff;--b:#d8a6ff;--c:#9fffd0;--d:#ff8fc7;--text:#fff;--muted:#d7ddff;--icon:'🌌'}body[data-theme=stitch]{--bg1:#06357b;--bg2:#108ee2;--bg3:#031438;--a:#6de0ff;--b:#2f66ff;--c:#baf7ff;--d:#ff9ed0;--muted:#e2f8ff;--icon:'💙'}body[data-theme=labubu]{--bg1:#ffe2bd;--bg2:#d99a61;--bg3:#7e4f34;--a:#ffc96f;--b:#ff9ab8;--c:#fff1b8;--d:#e9788e;--muted:#fff4e3;--icon:'👾'}body[data-theme=usagi]{--bg1:#ffe1f3;--bg2:#f4a5d0;--bg3:#a45d97;--a:#ff91d6;--b:#ffd9f1;--c:#fff0fa;--d:#ff70bd;--muted:#fff1fb;--icon:'🐰'}body[data-theme=snoopy]{--bg1:#f8fbff;--bg2:#78a8d8;--bg3:#243b64;--a:#fff;--b:#9ed2ff;--c:#fff4a8;--d:#f26d7d;--muted:#eef7ff;--icon:'🐶'}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100vh;padding:10px 10px 40px;color:var(--text);text-align:center;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',sans-serif;background:radial-gradient(circle at 12% 8%,color-mix(in srgb,var(--a) 45%,transparent),transparent 28%),radial-gradient(circle at 88% 6%,color-mix(in srgb,var(--b) 45%,transparent),transparent 30%),linear-gradient(145deg,var(--bg1),var(--bg2) 58%,var(--bg3))}body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.34;background-image:radial-gradient(circle,rgba(255,255,255,.9) 1px,transparent 1.8px);background-size:38px 38px}.app{position:relative;z-index:1;width:min(620px,100%);margin:auto;display:grid;gap:14px}.box{border:1px solid rgba(255,255,255,.28);background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(255,255,255,.08));backdrop-filter:blur(22px);box-shadow:0 22px 62px rgba(5,10,38,.28);border-radius:30px;padding:16px}.hero{position:relative}.hero:after{content:var(--icon);position:absolute;right:18px;top:13px;font-size:30px}.eyebrow{margin:0 0 6px;color:var(--c);font-size:12px;font-weight:1000;letter-spacing:2px}h1{margin:0;font-size:27px;font-weight:1000}.sub{margin:8px 0 0;color:var(--muted);font-size:13px;font-weight:850}.head,.countHead,.historyHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;text-align:left}.title{font-size:17px;font-weight:1000}.note,.time{color:var(--muted);font-size:12px;font-weight:900}.countHead b{color:var(--c);letter-spacing:1px}.themes{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}.themeBtn{min-height:42px;border-radius:16px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);color:#fff;font-size:12px;font-weight:1000}.themeBtn.on{background:linear-gradient(135deg,var(--a),var(--b));box-shadow:0 0 0 2px rgba(255,255,255,.35) inset}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.tile{min-height:88px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.28);border-radius:22px;background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.08))}.tile span{color:var(--muted);font-size:12px;font-weight:950}.tile b{font-size:32px;line-height:1;margin-top:4px}.tile small{font-size:13px;color:var(--muted)}.main{background:linear-gradient(135deg,color-mix(in srgb,var(--c) 35%,transparent),rgba(255,255,255,.1));border-color:color-mix(in srgb,var(--c) 65%,transparent)}.main b{color:var(--c)}.out b{color:#ffc36a}button,input{font:inherit}button{border:0;touch-action:manipulation}button:active{transform:scale(.96)}input{width:100%;min-height:64px;border-radius:24px;border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.14);color:white;text-align:center;font-size:19px;font-weight:1000;outline:none}input::placeholder{color:var(--muted)}.btn{min-height:64px;border-radius:24px;background:linear-gradient(135deg,#ffc36a,var(--d));color:#fff;font-weight:1000}.start{width:100%;min-height:68px;margin-bottom:14px;background:linear-gradient(135deg,var(--a),var(--b));font-size:20px}.row{display:grid;grid-template-columns:1fr 112px;gap:10px}.reader{display:none;width:100%;min-height:260px;border-radius:24px;overflow:hidden;background:#000;margin-bottom:14px}.reader.on{display:block}.sign{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}.sign button{min-height:66px;border-radius:22px;color:#fff;font-size:22px;font-weight:1000;opacity:.62;filter:saturate(.65)}.sign button.selected{opacity:1;filter:saturate(1.35);transform:scale(1.03);box-shadow:0 0 0 4px rgba(255,255,255,.38) inset,0 10px 24px rgba(0,0,0,.22)}.plus{background:linear-gradient(180deg,var(--c),#49c98c);color:#062b19!important}.minus{background:linear-gradient(180deg,var(--d),#ff65ae)}#choice{margin:4px 0 10px;padding:10px;border-radius:18px;background:rgba(255,255,255,.14);font-weight:1000}.keys{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}.keys button{min-height:54px;border-radius:20px;background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.28);font-size:20px;font-weight:1000}.send2{width:100%;background:linear-gradient(135deg,var(--c),#49c98c);color:#062b19}.status{font-weight:1000;line-height:1.6}.ok{border-color:rgba(159,255,208,.55)}.err{border-color:rgba(255,101,174,.65)}.wait{border-color:rgba(142,216,255,.65)}.clear{min-height:38px;border-radius:14px;background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.28);font-weight:900}.history{display:grid;gap:8px;text-align:left;max-height:260px;overflow:auto}.rec{border:1px solid rgba(255,255,255,.22);border-radius:18px;padding:10px 12px;background:rgba(255,255,255,.1);font-size:13px;font-weight:850}.rec b{font-size:15px}.rec small{display:block;color:var(--muted);margin-top:3px}@media(max-width:430px){.themes{grid-template-columns:repeat(3,1fr)}h1{font-size:24px}.tile{min-height:78px}.tile b{font-size:26px}.tile span{font-size:11px}.row{grid-template-columns:1fr 96px}}
/* STITCH BLACK TEXT PATCH */
body[data-theme="stitch"]{--text:#111827;--muted:#374151}
body[data-theme="stitch"],
body[data-theme="stitch"] button,
body[data-theme="stitch"] input,
body[data-theme="stitch"] .box,
body[data-theme="stitch"] .title,
body[data-theme="stitch"] .note,
body[data-theme="stitch"] .time,
body[data-theme="stitch"] .status,
body[data-theme="stitch"] .rec,
body[data-theme="stitch"] .rec b,
body[data-theme="stitch"] .rec small,
body[data-theme="stitch"] .tile,
body[data-theme="stitch"] .tile span,
body[data-theme="stitch"] .tile b,
body[data-theme="stitch"] .tile small,
body[data-theme="stitch"] #choice,
body[data-theme="stitch"] .clear,
body[data-theme="stitch"] .themeBtn{color:#111827!important}
body[data-theme="stitch"] .eyebrow,
body[data-theme="stitch"] .sub,
body[data-theme="stitch"] .note,
body[data-theme="stitch"] .time,
body[data-theme="stitch"] input::placeholder,
body[data-theme="stitch"] .rec small{color:#374151!important}
body[data-theme="stitch"] input{background:rgba(255,255,255,.72)!important;border-color:rgba(17,24,39,.22)!important}
body[data-theme="stitch"] .box,
body[data-theme="stitch"] .tile,
body[data-theme="stitch"] .rec,
body[data-theme="stitch"] #choice{border-color:rgba(17,24,39,.18)}
</style></head><body><div class="app"><section class="box hero"><p class="eyebrow">HOUCIHU GATE</p><h1>後慈湖電子驗票系統</h1><p class="sub"><span id="themeName">星空</span>主題・掃碼驗票・即時人數・本機紀錄</p></section><section class="box"><div class="head"><div class="title">🎨 主題切換</div><div class="note">會自動記住</div></div><div class="themes"><button class="themeBtn" data-t="starry">🌌 星空</button><button class="themeBtn" data-t="stitch">💙 史迪奇</button><button class="themeBtn" data-t="labubu">👾 Labubu</button><button class="themeBtn" data-t="usagi">🐰 烏薩琪</button><button class="themeBtn" data-t="snoopy">🐶 史努比</button></div></section><section class="box"><div class="countHead"><b>即時人數</b><div class="time" id="time">讀取中</div></div><div class="grid"><div class="tile main"><span>目前場內</span><div><b id="cur">--</b><small> 人</small></div></div><div class="tile"><span>今日入園</span><div><b id="tin">--</b><small> 人</small></div></div><div class="tile out"><span>已離園</span><div><b id="tout">--</b><small> 人</small></div></div></div></section><section class="box"><div class="head"><div class="title">📷 掃描驗票</div><div class="note">QR Code / 票號</div></div><button id="start" class="btn start">📷 啟動掃描驗票</button><div id="reader" class="reader"></div><div class="row"><input id="ticket" placeholder="請手動輸入票號"><button class="btn" onclick="manual()">🎫 驗票</button></div></section><section class="box"><div class="head"><div class="title">👥 直接加減進園人數</div><div class="note">選取會亮起</div></div><div class="sign"><button id="minusBtn" class="minus" onclick="setSign(-1)">− 扣回</button><button id="plusBtn" class="plus" onclick="setSign(1)">＋ 增加</button></div><div id="choice">目前選擇：＋ 增加入園人數</div><input id="people" placeholder="輸入人數" readonly><div class="keys"><button onclick="key('1')">1</button><button onclick="key('2')">2</button><button onclick="key('3')">3</button><button onclick="key('4')">4</button><button onclick="key('5')">5</button><button onclick="key('6')">6</button><button onclick="key('7')">7</button><button onclick="key('8')">8</button><button onclick="key('9')">9</button><button onclick="clr()">清除</button><button onclick="key('0')">0</button><button onclick="back()">⌫</button></div><button class="btn send2" onclick="sendPeople()">✅ 送出</button></section><section id="status" class="box status wait">請啟動掃描，或手動輸入票號。</section><section class="box"><div class="historyHead"><div class="title">🧾 本機紀錄</div><button class="clear" onclick="clearHistory()">清除</button></div><div id="history" class="history"></div></section></div><script>const U='https://script.google.com/macros/s/AKfycbw63eJnsg0a70IbZXBYWktt8CCDfx0mm_MAwzMRDoxKNNvcT2FTTMpJuU8f3qfqHjo/exec';const $=id=>document.getElementById(id);let sgn=1,busy=false,scanner=null;const names={starry:'星空',stitch:'史迪奇',labubu:'Labubu',usagi:'烏薩琪',snoopy:'史努比'};function applyTheme(t){t=t||'starry';document.body.dataset.theme=t==='starry'?'':t;localStorage.setItem('hctheme',t);$('themeName').innerText=names[t]||'星空';document.querySelectorAll('.themeBtn').forEach(b=>b.classList.toggle('on',b.dataset.t===t))}document.querySelectorAll('.themeBtn').forEach(b=>b.onclick=()=>applyTheme(b.dataset.t));applyTheme(localStorage.getItem('hctheme')||'starry');function setSign(v){sgn=v;$('plusBtn').classList.toggle('selected',v>0);$('minusBtn').classList.toggle('selected',v<0);$('choice').innerHTML=v>0?'目前選擇：＋ <b>增加入園人數</b>':'目前選擇：− <b>扣回人數</b>';try{navigator.vibrate&&navigator.vibrate(45)}catch(e){}}setSign(1);function n(v){let x=Number(v);return Number.isFinite(x)?x:null}function pick(d,a){for(let k of a){if(d&&d[k]!==undefined&&d[k]!==''){let x=n(d[k]);if(x!==null)return x}}return null}async function counts(){try{let r=await fetch(U+'?action=getCount&_='+Date.now()),d=await r.json();let i=pick(d,['in','todayIn','totalIn','total']),o=pick(d,['out','todayOut','currentOut']),c=pick(d,['current','inside','currentInside']);if(c===null&&i!==null&&o!==null)c=i-o;$('cur').innerText=c??'--';$('tin').innerText=i??'--';$('tout').innerText=o??'--';$('time').innerText=new Date().toLocaleTimeString('zh-TW',{hour12:false})+' 更新'}catch(e){$('time').innerText='讀取失敗'}}function st(m,c='wait'){$('status').className='box status '+c;$('status').innerHTML=m}function getH(){try{return JSON.parse(localStorage.getItem('hchistory')||'[]')}catch(e){return[]}}function saveH(item){let a=getH();a.unshift(item);a=a.slice(0,80);localStorage.setItem('hchistory',JSON.stringify(a));renderH()}function renderH(){let a=getH();$('history').innerHTML=a.length?a.map(x=>'<div class="rec"><b>'+x.title+'</b><small>'+x.time+'</small><small>'+x.note+'</small></div>').join(''):'<div class="rec">目前沒有本機紀錄</div>'}function clearHistory(){if(confirm('確定清除本機紀錄？')){localStorage.removeItem('hchistory');renderH()}}async function verify(id){id=String(id||'').trim();if(!id||busy)return;busy=true;st('驗票中：'+id);try{let r=await fetch(U,{method:'POST',body:JSON.stringify({id})}),d=await r.json();if(d.ok){st('✅ 驗票成功<br>票號：'+id+(d.current!==undefined?'<br>目前場內：'+d.current+' 人':''),'ok');saveH({title:'✅ 驗票成功',time:new Date().toLocaleString('zh-TW',{hour12:false}),note:'票號：'+id})}else{st((d.msg||'❌ 驗票失敗')+'<br>票號：'+id,'err');saveH({title:'❌ 驗票失敗',time:new Date().toLocaleString('zh-TW',{hour12:false}),note:'票號：'+id+'｜'+(d.msg||'失敗')})}setTimeout(counts,700)}catch(e){st('❌ 連線失敗','err');saveH({title:'❌ 連線失敗',time:new Date().toLocaleString('zh-TW',{hour12:false}),note:'票號：'+id})}setTimeout(()=>busy=false,900)}function manual(){let v=$('ticket').value;$('ticket').value='';verify(v)}$('start').onclick=async()=>{if(!window.Html5Qrcode){alert('掃描元件載入中');return}$('reader').classList.add('on');scanner=new Html5Qrcode('reader');try{await scanner.start({facingMode:'environment'},{fps:10,qrbox:{width:230,height:230}},t=>verify(t));$('start').innerText='📷 掃描中'}catch(e){st('❌ 無法啟動相機','err')}};function key(k){$('people').value=($('people').value+k).replace(/^0+/,'');try{navigator.vibrate&&navigator.vibrate(20)}catch(e){}}function clr(){$('people').value=''}function back(){$('people').value=$('people').value.slice(0,-1)}async function sendPeople(){let v=parseInt($('people').value,10);if(!v||v<1){alert('請輸入人數');return}let type=sgn>0?'IN':'OUT',word=sgn>0?'增加':'扣回',source='B點直接加減';if(!confirm('目前選擇：'+word+' '+v+' 人，確定送出？'))return;await fetch(U,{method:'POST',mode:'no-cors',body:JSON.stringify({type,delta:v,people:v,source,note:source})});saveH({title:(sgn>0?'＋ 增加':'− 扣回')+' '+v+' 人',time:new Date().toLocaleString('zh-TW',{hour12:false}),note:'B點直接加減'});clr();st('✅ 已送出：'+word+' '+v+' 人','ok');setTimeout(counts,800)}$('ticket').addEventListener('keydown',e=>{if(e.key==='Enter')manual()});renderH();counts();setInterval(counts,15000);</script></body></html>
