<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⏱️ 後慈湖驗票</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
  body { font-family: "Noto Sans TC", sans-serif; background:#121212; color:white; text-align:center; padding:15px; }
  h2 { color:#9be7ff; font-size:28px; }
  #reader { max-width:600px; margin:10px auto; border-radius:25px; overflow:hidden; border:4px solid #444; background:#000; }
  .status { margin:25px auto; padding:25px; font-size:18px; font-weight:900; border-radius:20px; white-space:pre-line; min-height: 100px; line-height: 1.5; }
  .ok   { background:#2ecc71; text-align: left; } /* 成功時靠左對齊方便看明細 */
  .err  { background:#e74c3c; }
  .wait { background:#f1c40f; color:black; }
  button { width:90%; max-width:500px; padding:20px; font-size:20px; margin:5px; border-radius:60px; border:none; background:linear-gradient(135deg,#3498db,#2980b9); color:white; cursor: pointer; }
  #adjustArea { display:none; margin-top:15px; background: #222; padding: 15px; border-radius: 15px; }
  input[type="number"] { width: 60%; padding: 12px; border-radius: 10px; border: none; font-size: 18px; text-align: center; }
</style>
</head>

<body>

<h2>🎟️ 後慈湖驗票系統</h2>

<div id="reader"></div>
<button id="start">📷 啟動相機驗票</button>
<div id="status" class="status">請啟動相機</div>

<div id="adjustArea">
  <div style="margin-bottom:8px;color:#ccc;">🔧 實際進園人數微調</div>
  <div style="margin-bottom: 10px;">
    <button onclick="adjust(-1)" style="width:22%; font-size:16px; padding:10px 0;">-1</button>
    <button onclick="adjust(1)" style="width:22%; font-size:16px; padding:10px 0;">+1</button>
    <button onclick="adjust(-5)" style="width:22%; font-size:16px; padding:10px 0;">-5</button>
    <button onclick="adjust(5)" style="width:22%; font-size:16px; padding:10px 0;">+5</button>
  </div>

  <div style="display: flex; gap: 5px; justify-content: center; align-items: center;">
    <input type="number" id="manualDiff" placeholder="輸入數字(如 12)">
    <button onclick="handleManualAdjust()" style="width: 30%; padding: 12px; font-size: 16px; background: #e67e22; border-radius: 10px;">送出</button>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbw5VQi-dtLodRQbKTgzueGGXgMBBedA_Th93Skr_Dia3-JYbxtd00shnZ24axbznDY/exec";

let html5QrCode;
let scanning = false;
let lastTicketId = "";

const statusEl = document.getElementById("status");
const adjustArea = document.getElementById("adjustArea");

document.getElementById("start").onclick = () => {
  if (html5QrCode) {
    html5QrCode.stop().then(() => startCamera());
  } else {
    startCamera();
  }
};

function startCamera() {
  html5QrCode = new Html5Qrcode("reader");
  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 250, height: 250 } },
    onScan
  ).catch(() => {
    statusEl.className = "status err";
    statusEl.innerText = "❌ 相機啟動失敗";
  });
  statusEl.className = "status wait";
  statusEl.innerText = "📷 相機掃描中...";
  document.getElementById("start").style.display = "none";
}

function onScan(text) {
  if (scanning) return;
  scanning = true;

  const id = text.includes("id=") ? text.split("id=")[1].split("&")[0] : text;
  lastTicketId = id;
  
  statusEl.className = "status wait";
  statusEl.innerText = "⏳ 正在驗票中...";

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ id: id })
  })
  .then(r => r.json())
  .then(res => {
    if (!res.ok) {
      statusEl.className = "status err";
      statusEl.innerText = res.msg;
      setTimeout(() => { scanning = false; }, 2000);
      return;
    }

    const d = res.detail;
    statusEl.className = "status ok";
    // 這裡重新把明細加回來
    statusEl.innerText = 
`✅ 驗票成功！已自動入園

👤 總人數：${d.people} 人
--------------------------
🎫 現金：全${d.cash_full} / 團${d.cash_group} / 優${d.cash_discount}
💳 悠遊：全${d.card_full} / 團${d.card_group} / 優${d.card_discount}
🆓 免費：${d.free} 人
--------------------------
📊 目前場內總人數：${res.current || '?'} 人`;

    adjustArea.style.display = "block";
    setTimeout(() => { scanning = false; }, 2000);
  })
  .catch(() => {
    statusEl.className = "status err";
    statusEl.innerText = "❌ 網路連線失敗";
    scanning = false;
  });
}

function handleManualAdjust() {
  const input = document.getElementById("manualDiff");
  const val = parseInt(input.value);
  if (isNaN(val) || val === 0) return alert("請輸入有效數字");
  adjust(val);
  input.value = ""; 
}

function adjust(diff) {
  statusEl.className = "status wait";
  statusEl.innerText = "⏳ 正在更新人數...";
  
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      type: "IN", 
      delta: diff,
      source: "驗票端微調",
      note: "票號:" + lastTicketId
    })
  })
  .then(r => r.json())
  .then(res => {
    statusEl.className = "status ok";
    statusEl.innerText = `✅ 人數已修正 (${diff > 0 ? "+" : ""}${diff})\n📊 目前場內總人數：${res.current || '?'} 人`;
  })
  .catch(() => alert("同步失敗"));
}
</script>
</body>
</html>
