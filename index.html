<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><meta name="theme-color" content="#08143f"><title>後慈湖電子驗票系統｜星空主題版</title><script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100vh;padding:10px 10px 40px;color:white;text-align:center;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',sans-serif;background:radial-gradient(circle at 12% 8%,rgba(142,216,255,.36),transparent 28%),radial-gradient(circle at 88% 6%,rgba(216,166,255,.34),transparent 30%),linear-gradient(145deg,#151847,#2b2466 58%,#050817)}body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.38;background-image:radial-gradient(circle,rgba(255,255,255,.9) 1px,transparent 1.8px);background-size:38px 38px}.app{position:relative;z-index:1;width:min(620px,100%);margin:auto;display:grid;gap:14px}.box{border:1px solid rgba(255,255,255,.28);background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(255,255,255,.08));backdrop-filter:blur(22px);box-shadow:0 22px 62px rgba(5,10,38,.28);border-radius:30px;padding:16px}.hero{position:relative}.hero:after{content:'🌌';position:absolute;right:18px;top:13px;font-size:30px}.eyebrow{margin:0 0 6px;color:#9fffd0;font-size:12px;font-weight:1000;letter-spacing:2px}h1{margin:0;font-size:27px;font-weight:1000}.sub{margin:8px 0 0;color:#d7ddff;font-size:13px;font-weight:850}.countHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.countHead b{color:#9fffd0;letter-spacing:1px}.time{color:#d7ddff;font-size:12px;font-weight:900}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.tile{min-height:88px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.28);border-radius:22px;background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.08))}.tile span{color:#d7ddff;font-size:12px;font-weight:950}.tile b{font-size:34px;line-height:1;margin-top:4px}.tile small{font-size:14px;color:#d7ddff}.main{background:linear-gradient(135deg,rgba(159,255,208,.34),rgba(255,255,255,.1));border-color:rgba(159,255,208,.65)}.main b{color:#9fffd0}.out b{color:#ffc36a}.remain b{color:#8ed8ff}.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;text-align:left}.title{font-size:17px;font-weight:1000}.note{font-size:12px;color:#d7ddff;font-weight:900}button,input{font:inherit}button{border:0;touch-action:manipulation}button:active{transform:scale(.97)}input{width:100%;min-height:64px;border-radius:24px;border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.14);color:white;text-align:center;font-size:19px;font-weight:1000;outline:none}input::placeholder{color:#d7ddff}.btn{min-height:64px;border-radius:24px;background:linear-gradient(135deg,#ffc36a,#ff8fc7);color:#fff;font-weight:1000}.start{width:100%;min-height:68px;margin-bottom:14px;background:linear-gradient(135deg,#8ed8ff,#d8a6ff);font-size:20px}.row{display:grid;grid-template-columns:1fr 112px;gap:10px}.reader{display:none;width:100%;min-height:260px;border-radius:24px;overflow:hidden;background:#000;margin-bottom:14px}.reader.on{display:block}.sign{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}.sign button{min-height:60px;border-radius:22px;color:#fff;font-size:22px;font-weight:1000}.plus{background:linear-gradient(180deg,#9fffd0,#49c98c);color:#062b19!important}.minus{background:linear-gradient(180deg,#ff8fc7,#ff65ae)}.keys{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}.keys button{min-height:54px;border-radius:20px;background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.28);font-size:20px;font-weight:1000}.send2{width:100%;background:linear-gradient(135deg,#9fffd0,#49c98c);color:#062b19}.status{font-weight:1000;line-height:1.6}.ok{border-color:rgba(159,255,208,.55)}.err{border-color:rgba(255,101,174,.65)}.wait{border-color:rgba(142,216,255,.65)}@media(max-width:390px){h1{font-size:24px}.tile{min-height:80px}.tile b{font-size:30px}.row{grid-template-columns:1fr 96px}}</style></head><body><div class="app"><section class="box hero"><p class="eyebrow">HOUCIHU STARRY GATE</p><h1>後慈湖電子驗票系統</h1><p class="sub">星空版・掃碼驗票・即時人數</p></section><section class="box"><div class="countHead"><b>即時人數</b><div class="time" id="time">讀取中</div></div><div class="grid"><div class="tile main"><span>目前場內</span><div><b id="cur">--</b><small> 人</small></div></div><div class="tile"><span>今日入園</span><div><b id="tin">--</b><small> 人</small></div></div><div class="tile out"><span>已離園</span><div><b id="tout">--</b><small> 人</small></div></div><div class="tile remain"><span>剩餘容量</span><div><b id="rem">--</b><small> 人</small></div></div></div></section><section class="box"><div class="head"><div class="title">📷 掃描驗票</div><div class="note">QR Code / 票號</div></div><button id="start" class="btn start">📷 啟動掃描驗票</button><div id="reader" class="reader"></div><div class="row"><input id="ticket" placeholder="請手動輸入票號"><button class="btn" onclick="manual()">🎫 驗票</button></div></section><section class="box"><div class="head"><div class="title">👥 直接加減進園人數</div><div class="note">先選 + / −</div></div><div class="sign"><button class="minus" onclick="sgn=-1">− 扣回</button><button class="plus" onclick="sgn=1">＋ 增加</button></div><input id="people" placeholder="輸入人數" readonly><div class="keys"><button onclick="key('1')">1</button><button onclick="key('2')">2</button><button onclick="key('3')">3</button><button onclick="key('4')">4</button><button onclick="key('5')">5</button><button onclick="key('6')">6</button><button onclick="key('7')">7</button><button onclick="key('8')">8</button><button onclick="key('9')">9</button><button onclick="clr()">清除</button><button onclick="key('0')">0</button><button onclick="back()">⌫</button></div><button class="btn send2" onclick="sendPeople()">✅ 送出</button></section><section id="status" class="box status wait">請啟動掃描，或手動輸入票號。</section></div><script>const U='https://script.google.com/macros/s/AKfycbw63eJnsg0a70IbZXBYWktt8CCDfx0mm_MAwzMRDoxKNNvcT2FTTMpJuU8f3qfqHjo/exec';const $=id=>document.getElementById(id);let sgn=1,busy=false,scanner=null;function n(v){let x=Number(v);return Number.isFinite(x)?x:null}function pick(d,a){for(let k of a){if(d&&d[k]!==undefined&&d[k]!==''){let x=n(d[k]);if(x!==null)return x}}return null}async function counts(){try{let r=await fetch(U+'?action=getCount&_='+Date.now()),d=await r.json();let i=pick(d,['in','todayIn','totalIn','total']),o=pick(d,['out','todayOut','currentOut']),c=pick(d,['current','inside','currentInside']),m=pick(d,['remain','remaining']);if(c===null&&i!==null&&o!==null)c=i-o;if(m===null&&c!==null)m=Math.max(0,50-c);$('cur').innerText=c??'--';$('tin').innerText=i??'--';$('tout').innerText=o??'--';$('rem').innerText=m??'--';$('time').innerText=new Date().toLocaleTimeString('zh-TW',{hour12:false})+' 更新'}catch(e){$('time').innerText='讀取失敗'}}function st(m,c='wait'){$('status').className='box status '+c;$('status').innerHTML=m}async function verify(id){id=String(id||'').trim();if(!id||busy)return;busy=true;st('驗票中：'+id);try{let r=await fetch(U,{method:'POST',body:JSON.stringify({id})}),d=await r.json();if(d.ok)st('✅ 驗票成功<br>票號：'+id+(d.current!==undefined?'<br>目前場內：'+d.current+' 人':''),'ok');else st((d.msg||'❌ 驗票失敗')+'<br>票號：'+id,'err');setTimeout(counts,700)}catch(e){st('❌ 連線失敗','err')}setTimeout(()=>busy=false,900)}function manual(){let v=$('ticket').value;$('ticket').value='';verify(v)}$('start').onclick=async()=>{if(!window.Html5Qrcode){alert('掃描元件載入中');return}$('reader').classList.add('on');scanner=new Html5Qrcode('reader');try{await scanner.start({facingMode:'environment'},{fps:10,qrbox:{width:230,height:230}},t=>verify(t));$('start').innerText='📷 掃描中'}catch(e){st('❌ 無法啟動相機','err')}};function key(k){$('people').value=($('people').value+k).replace(/^0+/,'')}function clr(){$('people').value=''}function back(){$('people').value=$('people').value.slice(0,-1)}async function sendPeople(){let v=parseInt($('people').value,10);if(!v||v<1){alert('請輸入人數');return}let type=sgn>0?'IN':'OUT',source='直接加減人數 / 票號:';if(!confirm((sgn>0?'確認增加 ':'確認扣回 ')+v+' 人？'))return;await fetch(U,{method:'POST',mode:'no-cors',body:JSON.stringify({type,delta:v,people:v,source,note:source})});clr();st('✅ 已送出','ok');setTimeout(counts,800)}$('ticket').addEventListener('keydown',e=>{if(e.key==='Enter')manual()});counts();setInterval(counts,15000);</script></body></html>
