<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌲 後慈湖 | 智慧驗票系統</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
    :root {
        --primary: #00d2ff;
        --accent: #d4af37;
        --success: #2ecc71;
        --error: #e74c3c;
        --glass: rgba(255, 255, 255, 0.05);
        --glass-heavy: rgba(15, 23, 42, 0.8);
    }

    body {
        margin: 0;
        padding: 0;
        background: radial-gradient(circle at top, #1e293b 0%, #020617 100%);
        color: #f8fafc;
        font-family: -apple-system, "Noto Sans TC", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    /* 標題欄 */
    .header {
        width: 100%;
        padding: 20px 0;
        text-align: center;
        background: var(--glass-heavy);
        backdrop-filter: blur(15px);
        border-bottom: 1px solid rgba(255,255,255,0.1);
        box-shadow: 0 4px 30px rgba(0,0,0,0.5);
    }

    h2 {
        margin: 0;
        font-size: 1.4rem;
        letter-spacing: 2px;
        font-weight: 900;
    }

    /* 掃描區 */
    .scanner-wrapper {
        position: relative;
        width: 88%;
        max-width: 380px;
        margin-top: 20px;
        border-radius: 30px;
        padding: 8px;
        background: rgba(255,255,255,0.03);
        border: 2px solid rgba(255,255,255,0.1);
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    #reader {
        width: 100% !important;
        border-radius: 22px;
        overflow: hidden;
        border: none !important;
    }

    /* 控制面板 */
    .main-panel {
        width: 92%;
        max-width: 400px;
        margin-top: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    button {
        border-radius: 18px;
        border: none;
        font-weight: 800;
        transition: all 0.2s ease;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    #start-btn {
        background: linear-gradient(135deg, #00d2ff, #3a7bd5);
        color: white;
        padding: 18px;
        font-size: 1.1rem;
        box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2);
    }

    .input-box {
        display: flex;
        background: var(--glass-heavy);
        border-radius: 18px;
        padding: 5px;
        border: 1px solid rgba(255,255,255,0.1);
    }

    .input-box input {
        flex: 1; background: transparent; border: none; color: white;
        padding: 12px 15px; font-size: 16px; outline: none;
    }

    .btn-verify { background: var(--accent); color: #000; padding: 0 20px; border-radius: 14px; }

    /* 狀態卡片 */
    .status-card {
        background: var(--glass-heavy);
        backdrop-filter: blur(25px);
        border-radius: 32px;
        padding: 25px 20px;
        text-align: center;
        border: 1px solid rgba(255,255,255,0.1);
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    #status-text { font-size: 1.8rem; font-weight: 900; margin-bottom: 20px; transition: 0.3s; }

    /* 人數控制區 */
    .counter-area {
        display: flex;
        align-items: center;
        justify-content: space-around;
        padding: 10px 0;
    }

    .adj-btn {
        width: 65px; height: 65px;
        background: rgba(255,255,255,0.08);
        color: white;
        font-size: 1.5rem;
        border-radius: 50%;
        border: 1px solid rgba(255,255,255,0.1);
        box-shadow: 0 8px 15px rgba(0,0,0,0.2);
    }

    .adj-btn:active { transform: scale(0.9); background: var(--primary); }

    .count-display { text-align: center; }
    .count-label { font-size: 0.85rem; opacity: 0.6; margin-bottom: 2px; letter-spacing: 1px; }
    #count-num { font-size: 3.8rem; font-weight: 800; line-height: 1; color: #fff; }

    /* 快速調整面板 */
    .quick-adjust {
        margin-top: 25px;
        padding-top: 20px;
        border-top: 1px solid rgba(255,255,255,0.1);
        display: flex;
        justify-content: center;
        gap: 12px;
    }

    .quick-adjust input {
        width: 100px;
        background: rgba(0,0,0,0.5);
        border: 1px solid var(--accent);
        border-radius: 12px;
        color: white;
        text-align: center;
        font-size: 1.2rem;
        font-weight: bold;
    }

    .btn-apply { background: var(--accent); color: #000; padding: 10px 20px; border-radius: 12px; }

    /* 動態狀態顏色 */
    .status-ok { color: var(--success); text-shadow: 0 0 15px rgba(46, 204, 113, 0.4); }
    .status-err { color: var(--error); text-shadow: 0 0 15px rgba(231, 76, 60, 0.4); }
</style>
</head>

<body>

<div class="header">
    <h2>🌲 後慈湖驗票系統</h2>
</div>

<div class="scanner-wrapper">
    <div id="reader"></div>
</div>

<div class="main-panel">
    <button id="start-btn" onclick="initScanner()">📷 啟動相機掃描</button>

    <div class="input-group">
        <div class="input-box">
            <input id="manual-id" placeholder="⌨️ 手動輸入票號...">
            <button class="btn-verify" onclick="manualCheck()">驗證</button>
        </div>
    </div>

    <div id="status-display" class="status-card">
        <div id="status-text">⏳ 準備就緒</div>
        
        <div class="counter-area">
            <button class="adj-btn" onclick="changeCount(-1)">➖</button>
            
            <div class="count-display">
                <div class="count-label">場內人數</div>
                <div id="count-num">0</div>
            </div>

            <button class="adj-btn" onclick="changeCount(1)">➕</button>
        </div>

        <div class="quick-adjust">
            <input type="number" id="quick-num" placeholder="🔢 0">
            <button class="btn-apply" onclick="quickAdjust()">套用校正</button>
        </div>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbw5VQi-dtLodRQbKTgzueGGXgMBBedA_Th93Skr_Dia3-JYbxtd00shnZ24axbznDY/exec";
    let qrScanner;
    let currentCount = 0;
    let isScanning = false;

    function initScanner() {
        qrScanner = new Html5Qrcode("reader");
        qrScanner.start(
            { facingMode: "environment" },
            { fps: 25, qrbox: { width: 250, height: 250 } },
            onScanSuccess
        ).catch(err => updateUI("❌ 鏡頭啟動失敗", "status-err"));
    }

    function onScanSuccess(text) {
        if (isScanning) return;
        isScanning = true;
        let id = text.includes("id=") ? text.split("id=")[1].split("&")[0] : text;
        updateUI("🔍 正在驗證...", "");
        fetchVerify({ id, action: "verify" });
        setTimeout(() => { isScanning = false; }, 2000);
    }

    function manualCheck() {
        let val = document.getElementById("manual-id").value.trim();
        if (val) onScanSuccess(val);
    }

    function fetchVerify(data) {
        fetch(API, { method: "POST", body: JSON.stringify(data) })
        .then(r => r.json())
        .then(res => {
            if (res.ok) {
                updateUI("✅ 驗證成功", "status-ok");
                currentCount = res.current || (currentCount + 1);
                document.getElementById("count-num").innerText = currentCount;
            } else {
                updateUI("🚫 票券無效", "status-err");
            }
        })
        .catch(() => updateUI("📡 網路連線異常", ""));
    }

    function changeCount(n) {
        currentCount = Math.max(0, currentCount + n);
        document.getElementById("count-num").innerText = currentCount;
        syncCount();
    }

    function quickAdjust() {
        let n = parseInt(document.getElementById("quick-num").value);
        if (!isNaN(n)) changeCount(n);
        document.getElementById("quick-num").value = "";
    }

    function updateUI(text, className) {
        const title = document.getElementById("status-text");
        title.innerText = text;
        title.className = className;
        if (navigator.vibrate) navigator.vibrate(className === 'status-ok' ? 80 : 200);
    }

    function syncCount() {
        fetch(API, { method: "POST", body: JSON.stringify({ action: "sync", count: currentCount }) });
    }
</script>

</body>
</html>
