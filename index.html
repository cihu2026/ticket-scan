<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ 後慈湖智慧驗票系統 🎟️</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --success: #00f2ad;
            --error: #ff5858;
            --warning: #f9d423;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
            font-family: 'PingFang TC', 'Microsoft JhengHei', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 標題美化 */
        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        h2 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 3px;
            background: linear-gradient(135deg, var(--primary), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 10px rgba(0, 242, 254, 0.3));
        }

        /* 掃描器容器 */
        #reader-container {
            position: relative;
            width: 100%;
            max-width: 360px;
            aspect-ratio: 1 / 1;
            border-radius: 30px;
            overflow: hidden;
            background: #000;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* 掃描框裝飾 corners */
        .scanner-overlay {
            position: absolute;
            inset: 0;
            z-index: 5;
            pointer-events: none;
            border: 40px solid rgba(0,0,0,0.3);
        }

        .corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 4px solid var(--primary);
            z-index: 11;
        }
        .top-left { top: 20px; left: 20px; border-right: 0; border-bottom: 0; border-radius: 8px 0 0 0; }
        .top-right { top: 20px; right: 20px; border-left: 0; border-bottom: 0; border-radius: 0 8px 0 0; }
        .bottom-left { bottom: 20px; left: 20px; border-right: 0; border-top: 0; border-radius: 0 0 0 8px; }
        .bottom-right { bottom: 20px; right: 20px; border-left: 0; border-top: 0; border-radius: 0 0 8px 0; }

        #reader { width: 100% !important; height: 100% !important; border: none !important; }

        .scan-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            box-shadow: 0 0 15px var(--primary);
            animation: scan 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            z-index: 10;
            display: none;
        }

        @keyframes scan { 
            0% { top: 10%; opacity: 0; }
            50% { top: 50%; opacity: 1; }
            100% { top: 90%; opacity: 0; }
        }

        /* 控制區 */
        .controls {
            width: 100%;
            max-width: 360px;
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        #start-btn {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
            color: white;
            box-shadow: 0 8px 20px -6px rgba(79, 172, 254, 0.5);
        }

        #start-btn:active { transform: scale(0.96); }

        .input-group {
            display: flex;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 5px;
            border: 1px solid var(--border);
            backdrop-filter: blur(12px);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px 15px;
            outline: none;
            font-size: 15px;
        }

        /* 狀態卡片 */
        #status {
            width: 100%;
            max-width: 360px;
            margin-top: 20px;
            padding: 20px;
            border-radius: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            backdrop-filter: blur(12px);
            box-sizing: border-box;
            text-align: center;
        }

        .status.ok { border-bottom: 4px solid var(--success); }
        .status.err { border-bottom: 4px solid var(--error); }
        .status.wait { border-bottom: 4px solid var(--warning); }

        .big { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
        .sub { font-size: 14px; color: #94a3b8; }

        /* 針對小螢幕優化 */
        @media (max-height: 700px) {
            h2 { font-size: 22px; }
            #reader-container { max-width: 280px; }
            .controls { margin-top: 15px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>後慈湖智慧驗票</h2>
        <div style="font-size: 12px; color: #64748b; margin-top: 5px; letter-spacing: 1px;">SMART CHECK-IN SYSTEM</div>
    </div>

    <div id="reader-container">
        <!-- 裝飾元素 -->
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
        <div class="scan-line" id="line"></div>
        
        <div id="reader"></div>
    </div>

    <div class="controls">
        <button id="start-btn">📸 啟動掃描鏡頭</button>
        <div class="input-group">
            <input id="manual-input" type="text" placeholder="手動輸入票號...">
            <button style="background: rgba(255,255,255,0.1); color:white; width: 80px;" onclick="manualCheck()">🔍 驗票</button>
        </div>
    </div>

    <div id="status" class="status">
        <div class="big">⌛ 待機中</div>
        <div class="sub">請授權相機權限並對準 QR Code</div>
    </div>

<script>
    // 保持你原本的邏輯不變，僅微調提示訊息與 UI 互動
    const API_URL = "你的_GAS_URL"; 
    const TOKEN = "abc123";

    let html5QrCode;
    let isProcessing = false;
    
    // 音效載入建議使用相對路徑或更穩定的來源
    const okSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
    const errSound = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

    const statusEl = document.getElementById("status");
    const scanLine = document.getElementById("line");
    const startBtn = document.getElementById("start-btn");

    startBtn.onclick = async function() {
        if (html5QrCode) { try { await html5QrCode.stop(); } catch(e){} }
        
        // 點擊按鈕時解鎖音效（解決 iOS 自動播放限制）
        okSound.play().then(()=>okSound.pause()); 
        
        html5QrCode = new Html5Qrcode("reader");
        scanLine.style.display = "block";
        startBtn.innerHTML = "⚡ 正在初始化...";

        const config = { 
            fps: 20, 
            qrbox: (w, h) => { return { width: w * 0.7, height: h * 0.7 } },
            aspectRatio: 1.0
        };

        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
            .then(() => {
                startBtn.style.background = "linear-gradient(135deg, #059669 0%, #10b981 100%)";
                startBtn.innerHTML = "🟢 系統運作中";
                updateStatus("🚀 掃描器已就緒", "ok");
            })
            .catch(err => {
                updateStatus("❌ 鏡頭啟動失敗", "err");
                startBtn.innerHTML = "📸 重新啟動鏡頭";
            });
    };

    function onScanSuccess(text) {
        if (isProcessing) return;
        let id = text.includes("id=") ? text.split("id=")[1].split("&")[0] : text;
        isProcessing = true;
        updateStatus("⏳ 正在核銷：" + id, "wait");
        verifyTicket(id);
    }

    function manualCheck() {
        const val = document.getElementById("manual-input").value.trim();
        if (val) onScanSuccess(val);
    }

    function verifyTicket(id) {
        // 使用 POST 呼叫 GAS
        fetch(API_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: new URLSearchParams({ "id": id, "token": TOKEN, "action": "verify" })
        })
        .then(() => {
            okSound.play();
            updateStatus(`<div class="big" style="color:#00f2ad">✅ 核銷成功</div><div class="sub">票號：${id}</div>`, "ok");
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            setTimeout(() => { isProcessing = false; }, 3000);
        })
        .catch(err => {
            errSound.play();
            updateStatus("📡 連線異常", "err");
            isProcessing = false;
        });
    }

    function updateStatus(msg, type) {
        statusEl.className = "status " + type;
        statusEl.innerHTML = msg;
    }
</script>
</body>
</html>
