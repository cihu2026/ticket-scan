<style>

.app{position:relative;z-index:1;max-width:560px;margin:auto}.hero,.card,.status,.hint{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.07));backdrop-filter:blur(16px);box-shadow:0 18px 48px rgba(0,0,0,.42)}.hero{position:relative;padding:18px;border-radius:32px;margin-bottom:12px}.hero:after{content:var(--icon);position:absolute;right:18px;top:12px;font-size:26px}.eyebrow{margin:0 0 6px;color:var(--green);font-size:12px;font-weight:900;letter-spacing:2px}h1{margin:0;font-size:25px;font-weight:900}.subtitle{margin:8px 0;color:var(--muted);font-size:13px;font-weight:700}.themes{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-top:10px}.theme{min-height:30px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.12);color:#fff;font-size:9px;font-weight:900}.theme.on{background:linear-gradient(135deg,var(--blue),var(--purple))}.card{border-radius:30px;padding:14px;margin-bottom:12px}.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;text-align:left}.title{display:flex;align-items:center;gap:9px;font-size:17px;font-weight:900}.ico{display:grid;place-items:center;width:38px;height:38px;border-radius:18px;background:rgba(79,220,255,.15);border:1px solid var(--line)}.note{font-size:12px;color:var(--muted);font-weight:900}.netbar{display:flex;justify-content:space-between;margin-bottom:12px;padding:10px 13px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.1);color:var(--muted);font-size:13px;font-weight:900}.dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 12px var(--green);margin-right:6px}.offline .dot{background:var(--yellow);box-shadow:0 0 12px var(--yellow)}button,input{font:inherit}button{border:0;cursor:pointer;touch-action:manipulation}button:active{transform:scale(.97)}input{width:100%;padding:16px;border-radius:22px;border:1px solid var(--line);background:rgba(3,10,42,.66);color:#fff;text-align:center;font-size:22px;font-weight:900;outline:none}.start{width:100%;padding:18px;border-radius:24px;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;font-size:20px;font-weight:900}#reader{min-height:250px;margin:0 0 12px;border-radius:28px;overflow:hidden;background:#000;border:1px solid var(--line)}.row{display:grid;grid-template-columns:1fr 92px;gap:8px}.send{border-radius:22px;background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;font-weight:900}.direct .send{background:linear-gradient(135deg,var(--green),var(--green2));color:#062b19}.signrow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}.signbtn{min-height:58px;border-radius:22px;color:#fff;font-size:24px;font-weight:950;box-shadow:0 10px 22px rgba(0,0,0,.24);border:2px solid transparent}.signbtn.on{border-color:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.18),0 10px 24px rgba(0,0,0,.26)}.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:12px 0}.adj{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:12px 0}.key,.adj button{min-height:50px;border-radius:21px;font-size:21px;font-weight:900;box-shadow:0 10px 22px rgba(0,0,0,.22)}.plus{background:linear-gradient(180deg,#8fffc0,var(--green2));color:#062b19}.minus{background:linear-gradient(180deg,var(--pink),var(--red));color:#fff}.key{background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.07));color:#fff;border:1px solid var(--line)}.clear{background:linear-gradient(180deg,#444,#222);color:#fff}.tools{display:grid;grid-template-columns:1fr 1fr;gap:9px}.tool{min-height:48px;border-radius:20px;border:1px solid var(--line);background:rgba(255,255,255,.12);color:#fff;font-weight:900}.undo{background:linear-gradient(135deg,var(--orange),var(--pink))}.history{display:none;text-align:left;margin-top:10px;padding:10px;border-radius:18px;border:1px solid var(--line);background:rgba(0,0,0,.18)}.history-item{display:grid;grid-template-columns:1fr auto auto;gap:8px;padding:7px 2px;border-top:1px solid rgba(255,255,255,.12);font-size:12px;color:#fff}.history-item:first-child{border-top:0}.history-diff{font-weight:900;color:var(--green)}.history-status{color:var(--yellow);font-weight:900}#adjustArea{display:none}.status{border-radius:26px;padding:16px;margin-bottom:12px;font-weight:900}.ok{border-color:rgba(93,240,162,.55)}.err{border-color:rgba(255,101,174,.6)}.wait{border-color:rgba(79,220,255,.6)}.offsave{border-color:rgba(255,230,109,.6)}.big{font-size:48px}.current{font-size:22px;color:var(--yellow);margin-top:8px}.hint{border-radius:22px;padding:12px;color:var(--muted);font-size:13px;font-weight:700;line-height:1.6}.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.mini{padding:8px;border-radius:14px;background:rgba(255,255,255,.1);border:1px solid var(--line);font-weight:900}.mini span{display:block;color:var(--muted);font-size:11px}@media(max-width:390px){h1{font-size:23px}.signbtn,.key,.adj button{min-height:47px;font-size:20px}.row{grid-template-columns:1fr 86px}.themes{gap:4px}.theme{font-size:8.5px}}
</style>

<body data-theme="stitch">
<div class="app">
<header class="hero"><p class="eyebrow" id="eyebrow">Hou Cihu Gate Control</p><h1>後慈湖電子驗票系統</h1><p class="subtitle" id="sub">史迪奇星空版・掃碼驗票・直接加減・離線同步</p><div class="themes"><button class="theme" data-t="stitch">💙史迪奇</button><button class="theme" data-t="labubu">👾拉布布</button><button class="theme" data-t="doraemon">🔔小叮噹</button><button class="theme" data-t="snoopy">🐶史努比</button><button class="theme" data-t="disney">✨迪士尼</button></div></header>
<div id="netbar" class="netbar"><span><span class="dot"></span><span id="netText">連線正常</span></span><span id="queueCount">待同步 0 筆</span></div>
<section class="card"><div class="head"><div class="title"><span class="ico">📷</span><span>掃描驗票</span></div><div class="note">QR Code / 票號</div></div><button id="start" class="start">📷 啟動掃描驗票</button><div id="reader"></div><div class="row"><input id="manualTicketInput" placeholder="請手動輸入票號" inputmode="text"><button id="manualSubmitBtn" class="send">🎫 驗票</button></div></section>
<section class="card direct"><div class="head"><div class="title"><span class="ico">👥</span><span>直接加減進園人數</span></div><div class="note">先選 + / −</div></div><div class="signrow"><button id="minusSignBtn" class="signbtn minus" onclick="setDirectSign('-')">− 扣回</button><button id="plusSignBtn" class="signbtn plus on" onclick="setDirectSign('+')">＋ 增加</button></div><div class="row"><input id="directPeopleInput" placeholder="輸入人數" readonly inputmode="none"><button id="directPeopleBtn" class="send">✅ 送出</button></div><div class="keypad"><button class="key" onclick="appendDirectKey('1')">1</button><button class="key" onclick="appendDirectKey('2')">2</button><button class="key" onclick="appendDirectKey('3')">3</button><button class="key" onclick="appendDirectKey('4')">4</button><button class="key" onclick="appendDirectKey('5')">5</button><button class="key" onclick="appendDirectKey('6')">6</button><button class="key" onclick="appendDirectKey('7')">7</button><button class="key" onclick="appendDirectKey('8')">8</button><button class="key" onclick="appendDirectKey('9')">9</button><button class="key clear" onclick="clearDirectKey()">清除</button><button class="key" onclick="appendDirectKey('0')">0</button><button class="key" onclick="backspaceDirectKey()">⌫</button></div><div class="tools"><button id="undoDirectBtn" class="tool undo">↩️ 撤銷上一筆</button><button id="toggleHistoryBtn" class="tool">📋 本機紀錄</button></div><div id="historyBox" class="history"><div id="historyList"></div></div></section>
<div id="status" class="status">👋 請先按「啟動掃描驗票」，也可以手動輸入票號或直接加減進園人數</div>
<section id="adjustArea" class="card"><div class="head"><div class="title"><span class="ico">🔧</span><span>本張票人數微調</span></div><div class="note">驗票後使用</div></div><div class="adj"><button class="minus" onclick="adjust(-1)">-1</button><button class="plus" onclick="adjust(1)">+1</button><button class="minus" onclick="adjust(-5)">-5</button><button class="plus" onclick="adjust(5)">+5</button></div><div class="row"><input id="manualDiff" type="number" placeholder="輸入數字"><button class="send" onclick="handleManualAdjust()">📤 送出</button></div></section>
<div class="hint">💡 直接加減區改成單獨一顆「＋ 增加」和一顆「− 扣回」；先選方向，再輸入人數送出。</div>
</div>
<script>
const API_URL="https://script.google.com/macros/s/AKfycbw63eJnsg0a70IbZXBYWktt8CCDfx0mm_MAwzMRDoxKNNvcT2FTTMpJuU8f3qfqHjo/exec";
const QUEUE_KEY="cihu_ticket_offline_queue_v3",RECENT_KEY="cihu_ticket_recent_seen_v1",HISTORY_KEY="cihu_ticket_adjust_history_v1",THEME_KEY="cihu_ticket_character_theme_v2";
const REQUEST_TIMEOUT=6200,BIG_DIFF_CONFIRM=20,MAX_DIRECT_DIFF=200;
let qr=null,scanning=false,lastScan=0,lastTicketId="",syncing=false,directSign="+";
const $=id=>document.getElementById(id),statusEl=$("status"),startBtn=$("start"),adjArea=$("adjustArea"),manualInput=$("manualTicketInput"),manualBtn=$("manualSubmitBtn"),directPeopleInput=$("directPeopleInput"),directPeopleBtn=$("directPeopleBtn"),undoDirectBtn=$("undoDirectBtn"),toggleHistoryBtn=$("toggleHistoryBtn"),historyBox=$("historyBox"),historyList=$("historyList"),netbar=$("netbar"),netText=$("netText"),queueCount=$("queueCount"),sub=$("sub"),eyebrow=$("eyebrow"),minusSignBtn=$("minusSignBtn"),plusSignBtn=$("plusSignBtn");
const names={stitch:{n:"史迪奇星空版",e:"Stitch Starry Gate Control"},labubu:{n:"Labubu 怪可愛星空版",e:"Labubu Monster Starry Gate Control"},doraemon:{n:"小叮噹藍白星空版",e:"Doraemon Starry Gate Control"},snoopy:{n:"史努比黑白星空版",e:"Snoopy Starry Gate Control"},disney:{n:"迪士尼夢幻星空版",e:"Disney Magic Starry Gate Control"}};
function setTheme(t){if(!names[t])t="stitch";document.body.dataset.theme=t;try{localStorage.setItem(THEME_KEY,t)}catch(e){}document.querySelectorAll(".theme").forEach(b=>b.classList.toggle("on",b.dataset.t===t));sub.textContent=names[t].n+"・掃碼驗票・直接加減・離線同步";eyebrow.textContent=names[t].e}
function setDirectSign(sign){directSign=sign==="-"?"-":"+";minusSignBtn.classList.toggle("on",directSign==="-");plusSignBtn.classList.toggle("on",directSign==="+");directPeopleInput.placeholder=directSign==="-"?"輸入要扣回的人數":"輸入要增加的人數"}
document.querySelectorAll(".theme").forEach(b=>b.onclick=()=>setTheme(b.dataset.t));try{setTheme(localStorage.getItem(THEME_KEY)||"stitch")}catch(e){setTheme("stitch")}setDirectSign("+");
startBtn.onclick=startCameraOnce;manualBtn.onclick=()=>{const v=manualInput.value.trim();if(v)onScan(v,true);manualInput.value=""};manualInput.addEventListener("keydown",e=>{if(e.key==="Enter")manualBtn.click()});directPeopleBtn.onclick=handleDirectPeople;undoDirectBtn.onclick=undoLastAdjust;toggleHistoryBtn.onclick=()=>{historyBox.style.display=historyBox.style.display==="block"?"none":"block";renderHistory()};
window.addEventListener("online",()=>{updateNetUI();flushQueue()});window.addEventListener("offline",updateNetUI);document.addEventListener("visibilitychange",()=>{if(!document.hidden){updateNetUI();flushQueue();renderHistory()}});setInterval(()=>{if(navigator.onLine)flushQueue()},12000);updateNetUI();flushQueue();renderHistory();
function appendDirectKey(k){let v=directPeopleInput.value.replace(/\D/g,"");if(v.length>=4)return;v=(v+k).replace(/^0+(?=\d)/,"");directPeopleInput.value=v}
function backspaceDirectKey(){directPeopleInput.value=directPeopleInput.value.slice(0,-1)}
function clearDirectKey(){directPeopleInput.value=""}
function startCameraOnce(){if(qr)return;if(typeof Html5Qrcode==="undefined"){showErr("❌ 掃描套件尚未載入");return}startBtn.textContent="⏳ 啟動中...";startBtn.disabled=true;try{qr=new Html5Qrcode("reader",{verbose:false});qr.start({facingMode:"environment"},{fps:30,qrbox:viewfinderSize,aspectRatio:1,disableFlip:true,rememberLastUsedCamera:true,videoConstraints:{facingMode:"environment",width:{ideal:960},height:{ideal:960}}},onScan).then(()=>{statusEl.className="status wait";statusEl.textContent="🔍 正在尋找 QR Code...";startBtn.style.display="none"}).catch(err=>{showErr("❌ 相機啟動失敗，請允許相機權限");startBtn.textContent="📷 重試啟動掃描";startBtn.disabled=false;qr=null;console.error(err)})}catch(e){showErr("❌ 相機啟動失敗");startBtn.disabled=false}}
function viewfinderSize(w,h){const edge=Math.floor(Math.min(w,h)*0.68);return{width:Math.max(180,Math.min(edge,260)),height:Math.max(180,Math.min(edge,260))}}
function onScan(text,isManual=false){const now=Date.now();if(scanning||(!isManual&&now-lastScan<650))return;const id=extractTicketId(text);if(!id){showErr("🚫 票號格式錯誤");return}if(isRecentlySeen(id)){showLocalDuplicate(id);return}lastScan=now;scanning=true;lastTicketId=id;adjArea.style.display="block";rememberTicket(id);if(navigator.vibrate)navigator.vibrate(35);statusEl.className="status wait";statusEl.textContent="⚡ 驗證中...";pauseScanner();const payload={id,action:"verify"};postFast(payload).then(res=>{if(!res.ok){renderFail(res.msg||"驗票失敗",id);resumeScan(450);return}renderSuccess(res);resumeScan(500)}).catch(()=>{saveOffline({kind:"verify",payload,createdAt:Date.now(),ticketId:id});renderOfflineSaved("🎟️ 已離線暫存票號",id);resumeScan(450)})}
function extractTicketId(text){const raw=String(text||"").trim();if(!raw)return"";try{const url=new URL(raw,location.href);const id=url.searchParams.get("id");if(id!==null)return id.trim()}catch(e){}const m=raw.match(/[?&]id=([^&]+)/);if(m){try{return decodeURIComponent(m[1].replace(/\+/g," ")).trim()}catch(e){return m[1].trim()}}return raw}
function scannerState(){if(!qr||typeof qr.getState!=="function")return null;return qr.getState()}function pauseScanner(){if(scannerState()===2&&typeof qr.pause==="function")qr.pause(true)}function resumeScan(ms){setTimeout(()=>{if(scannerState()===3&&typeof qr.resume==="function")qr.resume();scanning=false},ms)}
function displayNumber(v){const n=Number(v);return Number.isFinite(n)?String(n):"0"}function formatSigned(v){const n=Number(v)||0;return`${n>0?"+":""}${n}`}
function renderSuccess(res){const d=res.detail||{};if(navigator.vibrate)navigator.vibrate([80]);statusEl.className="status ok";statusEl.innerHTML=`<div>✅ 驗票成功</div><div class="big">${displayNumber(d.people)}</div><div>本張票人數</div><div class="current">場內 ${displayNumber(res.current)} 人</div><div class="result-grid"><div class="mini">${displayNumber(d.cash_full)} / ${displayNumber(d.cash_group)} / ${displayNumber(d.cash_discount)}<span>現金 全/團/優</span></div><div class="mini">${displayNumber(d.card_full)} / ${displayNumber(d.card_group)} / ${displayNumber(d.card_discount)}<span>悠遊 全/團/優</span></div><div class="mini">${displayNumber(d.free)}<span>免費</span></div></div>`}
function renderFail(msg,id){if(navigator.vibrate)navigator.vibrate([50,40,50]);statusEl.className="status err";statusEl.innerHTML=`⛔ 驗票未通過<br>${escapeHtml(msg)}${id?`<br><small>票號：${escapeHtml(id)}</small>`:""}`}
function showErr(msg){statusEl.className="status err";statusEl.textContent=msg}
function handleManualAdjust(){const val=parseInt($("manualDiff").value,10);if(isNaN(val)||val===0)return;if(!confirmLargeDiff(val))return;adjust(val);$("manualDiff").value=""}
function handleDirectPeople(){const raw=parseInt(directPeopleInput.value,10);if(isNaN(raw)||raw<=0){showErr("🚫 請先選 + 或 −，再輸入人數");return}const val=directSign==="-"?-raw:raw;if(!validateDirectDiff(val))return;if(!confirmLargeDiff(val))return;directPeopleInput.value="";submitDirectAdjust(val)}
function validateDirectDiff(diff){if(Math.abs(diff)>MAX_DIRECT_DIFF){showErr(`🚫 單次加減不可超過 ${MAX_DIRECT_DIFF} 人，避免誤觸`);return false}return true}function confirmLargeDiff(diff){return Math.abs(diff)<BIG_DIFF_CONFIRM||confirm(`確定要一次修正 ${formatSigned(diff)} 人嗎？`)}
function directAdjust(diff){if(!validateDirectDiff(diff))return;if(!confirmLargeDiff(diff))return;submitDirectAdjust(diff)}function submitDirectAdjust(diff){adjust(diff,"直接加減人數","手動直接輸入",{record:true,kind:"direct"})}
function undoLastAdjust(){const h=loadHistory();const target=h.find(i=>i.kind==="direct"&&!i.undone);if(!target){showErr("目前沒有可撤銷的直接加減紀錄");return}if(!confirm(`確定撤銷上一筆 ${formatSigned(target.diff)} 人？`))return;target.undone=true;saveHistory(h);renderHistory();adjust(-target.diff,"撤銷上一筆加減","撤銷:"+(target.actionId||""),{record:true,kind:"undo"})}
function adjust(diff,source="驗票端微調",notePrefix="票號:",options={}){const actionId=String(Date.now())+Math.random().toString(16).slice(2);const payload={type:"IN",delta:diff,source,note:notePrefix+(lastTicketId||""),actionId};statusEl.className="status wait";statusEl.textContent="🔄 同步中...";postFast(payload).then(res=>{if(options.record)recordHistory({actionId,kind:options.kind||"direct",diff,source,status:"完成",current:res.current,createdAt:Date.now()});statusEl.className="status ok";statusEl.innerHTML=`✅ 已修正 ${formatSigned(diff)}<div class="current">目前場內 ${displayNumber(res.current)} 人</div>`}).catch(()=>{saveOffline({kind:"adjust",payload,createdAt:Date.now(),ticketId:lastTicketId});if(options.record)recordHistory({actionId,kind:options.kind||"direct",diff,source,status:"待同步",createdAt:Date.now()});renderOfflineSaved(`🔧 已離線暫存修正 ${formatSigned(diff)}`,lastTicketId)})}
function postFast(payload){const c=new AbortController();const timer=setTimeout(()=>c.abort(),REQUEST_TIMEOUT);return fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},cache:"no-store",keepalive:true,signal:c.signal,body:JSON.stringify(payload)}).then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json()}).finally(()=>clearTimeout(timer))}
function loadQueue(){try{return JSON.parse(localStorage.getItem(QUEUE_KEY)||"[]")}catch(e){return[]}}function saveQueue(q){localStorage.setItem(QUEUE_KEY,JSON.stringify(q));updateNetUI()}
function saveOffline(item){let q=loadQueue();const keyBase=item.kind+":"+JSON.stringify(item.payload);const key=item.kind==="verify"?keyBase:keyBase+":"+item.createdAt+":"+Math.random().toString(16).slice(2);if(item.kind==="verify"&&q.some(x=>x.key===key)){updateNetUI();return}q.push({...item,key,queueId:String(Date.now())+Math.random().toString(16).slice(2),tries:0});saveQueue(q)}
function renderOfflineSaved(title,ticketId){statusEl.className="status offsave";statusEl.innerHTML=`${title}<br>不用重掃，恢復網路會自動補送${ticketId?`<br><small>票號：${escapeHtml(ticketId)}</small>`:""}<div class="current">待同步 ${loadQueue().length} 筆</div>`}
async function flushQueue(){if(syncing||!navigator.onLine)return;let q=loadQueue();if(q.length===0){updateNetUI();return}syncing=true;updateNetUI("同步中...");const remain=[];let done=0;for(const item of q){try{const res=await postFast(item.payload);done++;if(res&&res.ok===false)console.warn("GAS rejected queued item",res)}catch(e){item.tries=(item.tries||0)+1;remain.push(item)}}syncing=false;saveQueue(remain);if(done>0){statusEl.className=remain.length?"status offsave":"status ok";statusEl.innerHTML=remain.length?`⚠️ 已同步 ${done} 筆<br>尚待同步：${remain.length} 筆`:`✅ 離線資料已全部同步`}}
function updateNetUI(extra){const q=loadQueue();const online=navigator.onLine;netbar.classList.toggle("offline",!online||q.length>0);netText.textContent=extra||(online?"連線正常":"離線模式");queueCount.textContent=`待同步 ${q.length} 筆`}
function loadHistory(){try{return JSON.parse(localStorage.getItem(HISTORY_KEY)||"[]")}catch(e){return[]}}function saveHistory(h){localStorage.setItem(HISTORY_KEY,JSON.stringify(h.slice(0,20)))}function recordHistory(item){const h=loadHistory();h.unshift(item);saveHistory(h);renderHistory()}
function renderHistory(){if(!historyList)return;const h=loadHistory().slice(0,5);if(h.length===0){historyList.innerHTML='<div class="history-item"><span>尚無本機加減紀錄</span><span>—</span></div>';return}historyList.innerHTML=h.map(i=>`<div class="history-item"><span>${escapeHtml(nowTime(i.createdAt))} ${escapeHtml(i.kind==="undo"?"撤銷":"加減")}</span><span class="history-diff">${formatSigned(i.diff)} 人</span><span class="history-status">${i.undone?"已撤銷":escapeHtml(i.status||"")}</span></div>`).join("")}
function nowTime(ts){return new Date(ts||Date.now()).toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false})}
function loadRecent(){try{return JSON.parse(localStorage.getItem(RECENT_KEY)||"[]")}catch(e){return[]}}function rememberTicket(id){const now=Date.now();let list=loadRecent().filter(x=>now-x.t<10*60*1000&&x.id!==id);list.push({id,t:now});if(list.length>80)list=list.slice(list.length-80);localStorage.setItem(RECENT_KEY,JSON.stringify(list))}function isRecentlySeen(id){const now=Date.now();return loadRecent().some(x=>x.id===id&&now-x.t<80*1000)}
function showLocalDuplicate(id){if(navigator.vibrate)navigator.vibrate([40,40,40]);statusEl.className="status err";statusEl.innerHTML=`⚠️ 這支手機剛剛掃過<br>先不要重掃，避免重複送出<br><small>票號：${escapeHtml(id)}</small>`}
function escapeHtml(v){return String(v).replace(/[&<>'"]/g,s=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;","\"":"&quot;"}[s]))}
