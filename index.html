<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⏱️ 後慈湖驗票</title>

<!-- ✅ 正確載入 html5-qrcode -->
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: "Noto Sans TC", sans-serif;
  background:#121212;
  color:white;
  text-align:center;
  padding:15px;
}
h2 { color:#9be7ff; font-size:28px; }

#reader {
  max-width:600px;
  margin:10px auto;
  border-radius:25px;
  overflow:hidden;
  border:4px solid #444;
  background:#000;
}

.status {
  margin:25px auto;
  padding:25px;
  font-size:22px;
  font-weight:900;
  border-radius:20px;
  white-space:pre-line;
}
.ok   { background:#2ecc71; }
.err  { background:#e74c3c; }
.wait { background:#f1c40f; color:black; }

button {
  width:90%;
  max-width:500px;
  padding:22px;
  font-size:24px;
  margin:6px;
  border-radius:60px;
  border:none;
  background:linear-gradient(135deg,#3498db,#2980b9);
  color:white;
}

#adjustArea {
  display:none;
  margin-top:15px;
}
#adjustArea button {
  background:linear-gradient(135deg,#8e44ad,#9b59b6);
}
</style>
</head>

<body>

<h2>🎟️ 後慈湖驗票系統</h2>

<div id="reader"></div>
<button id="start">📷 啟動相機驗票</button>
<div id="status" class="status">請啟動相機</div>

<div id="adjustArea">
  <div style="margin-bottom:8px;color:#ccc;">🔧 實際進園人數微調（僅限一次）</div>
  <button onclick="adjust(-1)">-1</button>
  <button onclick="adjust(1)">+1</button>
  <button onclick="adjust(-2)">-2</button>
  <button onclick="adjust(2)">+2</button>
</div>

<script>
// ✅ 統一後端 GAS（你目前正在使用的）
const API_URL =
  "https://script.google.com/macros/s/AKfycbw5VQi-dtLodRQbKTgzueGGXgMBBedA_Th93Skr_Dia3-JYbxtd00shnZ24axbznDY/exec";

let qr;
let scanning = false;
let lastTicketId = "";
let adjusted = false;

const statusEl = document.getElementById("status");
const adjustArea = document.getElementById("adjustArea");

// === 啟動相機 ===
document.getElementById("start").onclick = () => {
  qr = new Html5Qrcode("reader");
  qr.start(
    { facingMode: "environment" },
    { fps: 15, qrbox: 250 },
    onScan
  );
  statusEl.className = "status wait";
  statusEl.innerText = "📷 相機啟動中…";
  adjustArea.style.display = "none";
};

// === 掃描到 QR ===
function onScan(text) {
  if (scanning) return;
  scanning = true;
  qr.stop();

  // ✅ 正確解析 id（用 & 不是 &amp;）
  const id = text.includes("id=")
    ? text.split("id=")[1].split("&")[0]
    : text;

  lastTicketId = id;
  adjusted = false;

  // ✅ 第一步：驗票（尚未使用？）
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ id })
  })
  .then(r => r.json())
  .then(res => {
    if (!res.ok) {
      statusEl.className = "status err";
      statusEl.innerText = res.msg;
      scanning = false;
      return;
    }

    const d = res.detail;

    statusEl.className = "status ok";
    statusEl.innerText =
     `✅ 驗票成功

🎫 現金全票：${d.cash_full}
👥 現金團體：${d.cash_group}
🧓 現金優待：${d.cash_discount}
💳 悠遊全票：${d.card_full}
💳 悠遊團體：${d.card_group}
💳 悠遊優待：${d.card_discount}
🆓 免費：${d.free}
👤 本票總人數：${d.people}`;

    // ✅ 第二步：依票內人數進園
    fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        mode: "IN",
        delta: d.people,
        source: "SCAN_IN",
        note: "qr=" + id
      })
    });

    // 顯示手動微調
    adjustArea.style.display = "block";
    scanning = false;
  })
  .catch(() => {
    statusEl.className = "status err";
    statusEl.innerText = "❌ 系統連線失敗";
    scanning = false;
  });
}

// === 手動微調（只能一次） ===
function adjust(diff) {
  if (adjusted) {
    alert("⚠️ 本票已調整過");
    return;
  }

  if (!confirm(`確認手動調整 ${diff > 0 ? "+" : ""}${diff} 人？`)) return;

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      mode: "IN",
      delta: diff,
      source: "SCAN_ADJUST",
      note: "manual_adjust qr=" + lastTicketId
    })
  });

  adjusted = true;
  adjustArea.style.display = "none";
  alert("✅ 已完成手動調整");
}
</script>

</body>
</html>
