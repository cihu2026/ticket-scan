<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎟️ 後慈湖驗票系統 Turbo</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  margin:0;
  padding:15px;
  font-family:"Microsoft JhengHei";
  background:#121212;
  color:#fff;
  text-align:center;
}

#reader{
  max-width:500px;
  margin:auto;
}

button,input{
  font-size:18px;
  padding:10px;
  margin:5px;
}

.status{
  margin-top:10px;
  padding:15px;
  border-radius:10px;
}
.ok{background:#003300;}
.err{background:#330000;}
.wait{background:#333;}
</style>
</head>

<body>

<h2>🎟️ 後慈湖驗票系統 Turbo</h2>

<div id="reader"></div>

<button id="start">📷 啟動相機驗票</button>

<br>

<input id="manualTicketInput" placeholder="請手動輸入票號">
<button id="manualBtn">🎫 驗票</button>

<div id="status" class="status">
👋 請點擊上方按鈕或輸入票號
</div>

<div id="realtimeBar" style="margin-top:10px;font-weight:bold;color:#00d2ff;"></div>

<script>
const API_URL="你的_GAS_URL";

let qr=null;
let scanning=false;
let lastScan=0;
let lastTicketId="";

const statusEl=document.getElementById("status");

/* ================= 啟動相機 ================= */
document.getElementById("start").onclick=(()=>{
  if(qr) return;

  qr=new Html5Qrcode("reader");

  qr.start(
    { facingMode:"environment" },
    { fps:30, qrbox:200 },
    onScan
  );
});

/* ================= 手動 ================= */
document.getElementById("manualBtn").onclick=(()=>{
  const val = extractTicketId(
    document.getElementById("manualTicketInput").value
  );

  if(!val) return;
  onScan(val);
});

/* ================= 掃描 ================= */
function onScan(text){
  const now = Date.now();
  const id = extractTicketId(text);

  if(!id){
    showErr("🚫 票號格式錯誤");
    return;
  }

  if(scanning || id===lastTicketId || now-lastScan<1200){
    return;
  }

  lastScan=now;
  lastTicketId=id;
  scanning=true;

  if(navigator.vibrate) navigator.vibrate(50);

  showWait("⚡ 驗證中...");

  sendVerify(id);
}

/* ================= API ================= */
function sendVerify(id,retry=0){

fetch(API_URL,{
  method:"POST",
  headers:{'Content-Type':'text/plain'},
  body:JSON.stringify({
    id:id,
    action:"verify",
    source:"入口A"
  })
})
.then(r=>r.json())
.then(res=>{
  scanning=false;

  if(!res.ok){
    showErr("🚫 " + res.msg);
    return;
  }

  showSuccess(res);
})
.catch(()=>{
  if(retry<2){
    setTimeout(()=>sendVerify(id,retry+1),500);
  }else{
    showErr("🌐 網路錯誤");
    scanning=false;
  }
});
}

/* ================= UI ================= */
function showWait(msg){
  statusEl.className="status wait";
  statusEl.textContent=msg;
}

function showErr(msg){
  statusEl.className="status err";
  statusEl.textContent=msg;
}

function showSuccess(res){
  const d=res.detail||{};

  statusEl.className="status ok";
  statusEl.innerHTML=`
  ✅ 驗票成功<br>
  👥 人數: ${d.people||0}<br>
  📊 場內: ${res.current||0} 人
  `;
}

/* ================= ID解析 ================= */
function extractTicketId(text){
  try{
    const url=new URL(text);
    return url.searchParams.get("id")||"";
  }catch{
    return text.trim();
  }
}

/* ================= 即時同步 ================= */
function loadRealtime(){
fetch(API_URL+"?action=getCount")
.then(r=>r.json())
.then(d=>{
  document.getElementById("realtimeBar").innerText =
  "📊 場內即時人數："+d.current+" 人";
});
}

setInterval(loadRealtime,3000);
loadRealtime();
</script>

</body>
</html>
