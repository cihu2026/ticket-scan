<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#07111f">
<title>🎟️ 後慈湖電子驗票系統 Turbo</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#07111f;--card:rgba(255,255,255,.085);--line:rgba(255,255,255,.16);--blue:#00d2ff;--blue2:#3a7bd5;--green:#2ecc71;--red:#ff5c70;--yellow:#f1c40f;--orange:#ff9f43;--text:#fff;--muted:#b8c2d6;--radius:28px;--radius2:22px;--shadow:0 18px 45px rgba(0,0,0,.38)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html{height:100%}body{margin:0;min-height:100vh;padding:12px;font-family:"Noto Sans TC",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 16% 4%,rgba(0,210,255,.26),transparent 30%),radial-gradient(circle at 92% 8%,rgba(58,123,213,.2),transparent 26%),radial-gradient(circle at 90% 96%,rgba(46,204,113,.16),transparent 30%),linear-gradient(145deg,var(--bg),#05070d 76%);color:var(--text);text-align:center}.app{max-width:540px;margin:0 auto;padding-bottom:18px}.hero{max-width:500px;margin:0 auto 10px;padding:15px 14px 13px;border:1px solid rgba(255,255,255,.14);border-radius:var(--radius);background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.06));box-shadow:0 12px 30px rgba(0,0,0,.2);backdrop-filter:blur(16px)}h2{margin:0 0 6px;font-size:26px;font-weight:900;letter-spacing:.5px;text-shadow:0 0 24px rgba(0,210,255,.48)}.subtitle{margin:0;font-size:13px;color:var(--muted);font-weight:700;letter-spacing:.4px}.netbar{display:flex;justify-content:space-between;align-items:center;gap:8px;max-width:500px;margin:0 auto 10px;padding:9px 12px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.075);backdrop-filter:blur(14px);font-size:13px;color:var(--muted)}.pill{display:inline-flex;align-items:center;gap:6px;font-weight:900;white-space:nowrap}.dot{width:9px;height:9px;border-radius:999px;background:var(--green);box-shadow:0 0 12px var(--green)}.offline .dot{background:var(--yellow);box-shadow:0 0 12px var(--yellow)}#queueCount{white-space:nowrap}.scan-wrap{position:relative;max-width:500px;margin:0 auto 12px}#reader{position:relative;min-height:270px;border-radius:32px;overflow:hidden;background:#000;border:1px solid rgba(255,255,255,.22);box-shadow:var(--shadow)}#reader video{object-fit:cover!important}#reader::before{content:"";position:absolute;inset:15%;border:3px solid rgba(0,210,255,.95);border-radius:26px;box-shadow:0 0 26px rgba(0,210,255,.56),inset 0 0 20px rgba(0,210,255,.22);pointer-events:none;z-index:2}#reader::after{content:"對準 QR Code 自動驗票";position:absolute;left:50%;bottom:15px;transform:translateX(-50%);z-index:3;padding:7px 13px;border-radius:999px;background:rgba(0,0,0,.48);border:1px solid rgba(255,255,255,.2);color:#e5fbff;font-size:12px;font-weight:900;letter-spacing:.4px;pointer-events:none}.scan-line{position:absolute;left:21%;right:21%;top:25%;height:3px;z-index:4;background:linear-gradient(90deg,transparent,var(--blue),#fff,var(--blue),transparent);border-radius:999px;box-shadow:0 0 17px var(--blue);animation:scanMove 1.55s ease-in-out infinite alternate;pointer-events:none}@keyframes scanMove{from{transform:translateY(0)}to{transform:translateY(122px)}}button{transition:transform .08s ease,filter .12s ease,opacity .12s ease;touch-action:manipulation}button:active{transform:scale(.97)}button:disabled{opacity:.55;cursor:not-allowed}#start{width:100%;max-width:500px;padding:17px;border:none;border-radius:999px;font-size:19px;font-weight:900;color:#fff;cursor:pointer;background:linear-gradient(135deg,var(--blue),var(--blue2));box-shadow:0 12px 30px rgba(0,210,255,.26);margin-bottom:10px}.manual-box{max-width:500px;margin:0 auto 12px;display:grid;grid-template-columns:1fr 112px;gap:10px}.status{max-width:500px;margin:12px auto;padding:18px;min-height:92px;border-radius:var(--radius);background:var(--card);border:1px solid var(--line);line-height:1.5;font-size:16px;box-shadow:0 12px 30px rgba(0,0,0,.22);backdrop-filter:blur(16px);overflow:hidden}.wait{border:2px solid var(--yellow);color:#ffeaa7;background:linear-gradient(180deg,rgba(241,196,15,.15),rgba(241,196,15,.06))}.ok{border:2px solid var(--green);background:linear-gradient(180deg,rgba(46,204,113,.28),rgba(46,204,113,.08))}.err{border:2px solid var(--red);color:#ffd1d8;background:linear-gradient(180deg,rgba(255,92,112,.28),rgba(255,92,112,.09))}.offsave{border:2px solid var(--yellow);color:#fff1a8;background:linear-gradient(180deg,rgba(241,196,15,.22),rgba(241,196,15,.08))}.result-hero{display:grid;gap:8px;place-items:center}.result-title{font-size:30px;font-weight:900;letter-spacing:.8px}.people-num{font-size:58px;font-weight:900;line-height:1;text-shadow:0 8px 22px rgba(0,0,0,.28)}.people-label{font-size:14px;color:rgba(255,255,255,.82);font-weight:900}.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}.mini-stat{padding:11px 7px;border-radius:var(--radius2);background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.16);font-weight:900;box-shadow:inset 0 1px 0 rgba(255,255,255,.08)}.mini-stat span{display:block;font-size:12px;color:rgba(255,255,255,.72);font-weight:700}.current-big{padding:8px 18px;border-radius:999px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.16);font-size:30px;font-weight:900;color:#d9fff0}.hr{border-top:1px dashed rgba(255,255,255,.25);margin:12px 0}.big{font-size:20px;font-weight:900}.queue-list{margin-top:8px;font-size:13px;color:#ffeaa7;word-break:break-all}#adjustArea{display:none;max-width:500px;margin:14px auto;padding:16px;border-radius:var(--radius);background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.06));border:1px solid var(--line);box-shadow:0 12px 30px rgba(0,0,0,.22);backdrop-filter:blur(16px)}.adj-title{font-weight:900;color:var(--blue);margin-bottom:12px;font-size:18px}.adj-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:12px}.btn-adj{border:none;border-radius:var(--radius2);padding:20px 0;font-size:26px;font-weight:900;cursor:pointer;box-shadow:0 8px 20px rgba(0,0,0,.18)}.plus{background:linear-gradient(180deg,#31a858,#176436);color:#e4ffec}.minus{background:linear-gradient(180deg,#b54550,#67272d);color:#ffe1e6}.input-group{display:grid;grid-template-columns:1fr 112px;gap:10px}input{width:100%;padding:15px 12px;border-radius:var(--radius2);border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.34);color:#fff;font-size:18px;text-align:center;outline:none}input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,210,255,.12)}.btn-send{border:none;border-radius:var(--radius2);font-weight:900;background:linear-gradient(135deg,#ff9f43,#e67e22);color:#fff;cursor:pointer;font-size:16px}.btn-manual{background:linear-gradient(135deg,#5f7894,#2d3f53)}.hint{max-width:500px;margin:0 auto;color:var(--muted);font-size:12px;line-height:1.55}.flash-ok{animation:flashOk .42s ease}.flash-err{animation:flashErr .42s ease}@keyframes flashOk{0%{filter:brightness(1.8)}100%{filter:brightness(1)}}@keyframes flashErr{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}@media (max-width:390px){body{padding:10px}h2{font-size:22px}.manual-box,.input-group{grid-template-columns:1fr 96px}.adj-grid{gap:10px}.btn-adj{font-size:22px;padding:18px 0}#reader{min-height:248px}.people-num{font-size:50px}.result-title{font-size:26px}}
</style>
</head>
<body>
<div class="app">
  <div class="hero"><h2>🎟️ 後慈湖電子驗票系統</h2><p class="subtitle">快速掃碼・即時驗證・離線暫存</p></div>
  <div id="netbar" class="netbar"><span id="netStatus" class="pill"><span class="dot"></span><span>連線正常</span></span><span id="queueCount">待同步 0 筆</span></div>
  <div class="scan-wrap"><div id="reader"></div><div class="scan-line" aria-hidden="true"></div></div>
  <button id="start">📷 啟動掃描驗票</button>
  <div class="manual-box"><input type="text" id="manualTicketInput" placeholder="請手動輸入票號" autocomplete="off" inputmode="text"><button id="manualSubmitBtn" class="btn-send btn-manual">🎫 驗票</button></div>
  <div id="status" class="status">👋 請點擊上方按鈕或輸入票號</div>
  <div id="adjustArea"><div class="adj-title">🔧 進園人數微調</div><div class="adj-grid"><button class="btn-adj minus" onclick="adjust(-1)">➖ 1</button><button class="btn-adj plus" onclick="adjust(1)">➕ 1</button><button class="btn-adj minus" onclick="adjust(-5)">➖ 5</button><button class="btn-adj plus" onclick="adjust(5)">➕ 5</button></div><div class="input-group"><input type="number" id="manualDiff" placeholder="輸入數字"><button class="btn-send" onclick="handleManualAdjust()">📤 送出</button></div></div>
  <div class="hint">建議保持鏡頭距離 QR Code 約 15－25 公分；畫面跳出結果後即可掃下一張。</div>
</div>
<script>
const API_URL="https://script.google.com/macros/s/AKfycbw5VQi-dtLodRQbKTgzueGGXgMBBedA_Th93Skr_Dia3-JYbxtd00shnZ24axbznDY/exec";
const QUEUE_KEY="cihu_ticket_offline_queue_v3";
const RECENT_KEY="cihu_ticket_recent_seen_v1";
const REQUEST_TIMEOUT=6200;
let qr=null,scanning=false,lastScan=0,lastTicketId="",syncing=false;
const statusEl=document.getElementById("status"),startBtn=document.getElementById("start"),adjArea=document.getElementById("adjustArea"),manualInput=document.getElementById("manualTicketInput"),manualBtn=document.getElementById("manualSubmitBtn"),netbar=document.getElementById("netbar"),netStatus=document.getElementById("netStatus"),queueCount=document.getElementById("queueCount");
startBtn.onclick=()=>{if(qr)return;startBtn.innerText="⏳ 啟動中...";startBtn.disabled=true;startCamera()};
manualBtn.onclick=()=>{const val=manualInput.value.trim();if(!val)return;onScan(val,true);manualInput.value=""};
manualInput.addEventListener("keydown",e=>{if(e.key==="Enter")manualBtn.click()});
window.addEventListener("online",()=>{updateNetUI();flushQueue()});
window.addEventListener("offline",updateNetUI);
document.addEventListener("visibilitychange",()=>{if(!document.hidden){updateNetUI();flushQueue()}});
setInterval(()=>{if(navigator.onLine)flushQueue()},12000);
updateNetUI();flushQueue();
function startCamera(){qr=new Html5Qrcode("reader",{verbose:false});qr.start({facingMode:"environment"},{fps:30,qrbox:viewfinderSize,aspectRatio:1,disableFlip:true,rememberLastUsedCamera:true,videoConstraints:{facingMode:"environment",width:{ideal:960},height:{ideal:960}}},onScan).then(()=>{statusEl.className="status wait";statusEl.textContent="🔍 正在尋找 QR Code...";startBtn.style.display="none";startBtn.disabled=false}).catch(()=>{statusEl.className="status err flash-err";statusEl.textContent="❌ 相機啟動失敗，請確認相機權限";startBtn.innerText="📷 重試啟動";startBtn.disabled=false;qr=null})}
function viewfinderSize(w,h){const edge=Math.floor(Math.min(w,h)*0.68);return{width:Math.max(180,Math.min(edge,260)),height:Math.max(180,Math.min(edge,260))}}
function onScan(text,isManual=false){const now=Date.now();if(scanning||(!isManual&&now-lastScan<650))return;const id=extractTicketId(text);if(!id){statusEl.className="status err flash-err";statusEl.textContent="🚫 票號格式錯誤";return}if(isRecentlySeen(id)){showLocalDuplicate(id);return}lastScan=now;scanning=true;lastTicketId=id;adjArea.style.display="block";rememberTicket(id);if(navigator.vibrate)navigator.vibrate(35);statusEl.className="status wait";statusEl.textContent="⚡ 驗證中...";pauseScanner();const payload={id,action:"verify"};postFast(payload).then(res=>{if(!res.ok){renderFail(res.msg||"驗票失敗",id);resumeScan(450);return}renderSuccess(res);resumeScan(500)}).catch(()=>{saveOffline({kind:"verify",payload,createdAt:Date.now(),ticketId:id});renderOfflineSaved("🎟️ 已離線暫存票號",id);resumeScan(450)})}
function extractTicketId(text){const raw=String(text||"").trim();if(!raw)return"";try{const parsedUrl=new URL(raw,window.location.href);const id=parsedUrl.searchParams.get("id");if(id!==null)return id.trim()}catch(e){}const idMatch=raw.match(/[?&]id=([^&]+)/);if(idMatch){try{return decodeURIComponent(idMatch[1].replace(/\+/g," ")).trim()}catch(e){return idMatch[1].trim()}}return raw}
function scannerState(){if(!qr||typeof qr.getState!=="function")return null;return qr.getState()}
function pauseScanner(){if(scannerState()===2&&typeof qr.pause==="function")qr.pause(true)}
function resumeScan(ms){setTimeout(()=>{if(scannerState()===3&&typeof qr.resume==="function")qr.resume();scanning=false},ms)}
function displayNumber(value){const number=Number(value);return Number.isFinite(number)?String(number):"0"}
function renderSuccess(res){const d=res.detail||{};if(navigator.vibrate)navigator.vibrate([80]);statusEl.className="status ok flash-ok";statusEl.innerHTML=`<div class="result-hero"><div class="result-title">✅ 驗票成功</div><div><div class="people-num">${displayNumber(d.people)}</div><div class="people-label">本張票人數</div></div><div class="current-big">場內 ${displayNumber(res.current)} 人</div></div><div class="result-grid"><div class="mini-stat">${displayNumber(d.cash_full)} / ${displayNumber(d.cash_group)} / ${displayNumber(d.cash_discount)}<span>現金 全/團/優</span></div><div class="mini-stat">${displayNumber(d.card_full)} / ${displayNumber(d.card_group)} / ${displayNumber(d.card_discount)}<span>悠遊 全/團/優</span></div><div class="mini-stat">${displayNumber(d.free)}<span>免費</span></div></div>`}
function renderFail(msg,id){if(navigator.vibrate)navigator.vibrate([50,40,50]);statusEl.className="status err flash-err";statusEl.innerHTML=`<div class="result-hero"><div class="result-title">⛔ 驗票未通過</div><div class="big">${escapeHtml(msg)}</div>${id?`<div class="queue-list">票號：${escapeHtml(id)}</div>`:""}</div>`}
function handleManualAdjust(){const val=parseInt(document.getElementById("manualDiff").value,10);if(isNaN(val)||val===0)return;adjust(val);document.getElementById("manualDiff").value=""}
function adjust(diff){const payload={type:"IN",delta:diff,source:"驗票端微調",note:"票號:"+lastTicketId};statusEl.className="status wait";statusEl.textContent="🔄 同步中...";postFast(payload).then(res=>{statusEl.className="status ok flash-ok";statusEl.innerHTML=`<div class="result-hero"><div class="result-title">✅ 已修正 ${diff>0?'+':''}${diff}</div><div class="current-big">目前場內 ${displayNumber(res.current)} 人</div></div>`}).catch(()=>{saveOffline({kind:"adjust",payload,createdAt:Date.now(),ticketId:lastTicketId});renderOfflineSaved(`🔧 已離線暫存修正 ${diff>0?'+':''}${diff}`,lastTicketId)})}
function postFast(payload){const controller=new AbortController();const timer=setTimeout(()=>controller.abort(),REQUEST_TIMEOUT);return fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},cache:"no-store",keepalive:true,signal:controller.signal,body:JSON.stringify(payload)}).then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json()}).finally(()=>clearTimeout(timer))}
function loadQueue(){try{return JSON.parse(localStorage.getItem(QUEUE_KEY)||"[]")}catch(e){return[]}}
function saveQueue(queue){localStorage.setItem(QUEUE_KEY,JSON.stringify(queue));updateNetUI()}
function saveOffline(item){let queue=loadQueue();const key=item.kind+":"+JSON.stringify(item.payload);if(queue.some(q=>q.key===key)){updateNetUI();return}queue.push({...item,key,queueId:String(Date.now())+Math.random().toString(16).slice(2),tries:0});saveQueue(queue)}
function renderOfflineSaved(title,ticketId){statusEl.className="status offsave";statusEl.innerHTML=`<div class="result-hero"><div class="result-title">${title}</div><div>不用重掃，恢復網路會自動補送</div>${ticketId?`<div class="queue-list">票號：${escapeHtml(ticketId)}</div>`:""}<div class="current-big">待同步 ${loadQueue().length} 筆</div></div>`}
async function flushQueue(){if(syncing||!navigator.onLine)return;let queue=loadQueue();if(queue.length===0){updateNetUI();return}syncing=true;updateNetUI("同步中...");const remain=[];let done=0;for(const item of queue){try{const res=await postFast(item.payload);done++;if(res&&res.ok===false){console.warn("GAS rejected queued item",res)}}catch(e){item.tries=(item.tries||0)+1;remain.push(item)}}syncing=false;saveQueue(remain);if(done>0){statusEl.className=remain.length?"status offsave":"status ok flash-ok";statusEl.innerHTML=remain.length?`<div class="result-hero"><div class="result-title">⚠️ 已同步 ${done} 筆</div><div class="queue-list">尚待同步：${remain.length} 筆，網路穩定後會再試</div></div>`:`<div class="result-hero"><div class="result-title">✅ 離線資料已全部同步</div></div>`}}
function updateNetUI(extraText){const queue=loadQueue();const online=navigator.onLine;netbar.classList.toggle("offline",!online||queue.length>0);netStatus.innerHTML=`<span class="dot"></span><span>${extraText||(online?"連線正常":"離線模式")}</span>`;queueCount.textContent=`待同步 ${queue.length} 筆`}
function loadRecent(){try{return JSON.parse(localStorage.getItem(RECENT_KEY)||"[]")}catch(e){return[]}}
function rememberTicket(id){const now=Date.now();let list=loadRecent().filter(x=>now-x.t<10*60*1000&&x.id!==id);list.push({id,t:now});if(list.length>80)list=list.slice(list.length-80);localStorage.setItem(RECENT_KEY,JSON.stringify(list))}
function isRecentlySeen(id){const now=Date.now();return loadRecent().some(x=>x.id===id&&now-x.t<80*1000)}
function showLocalDuplicate(id){if(navigator.vibrate)navigator.vibrate([40,40,40]);statusEl.className="status err flash-err";statusEl.innerHTML=`<div class="result-hero"><div class="result-title">⚠️ 這支手機剛剛掃過</div><div>先不要重掃，避免重複送出</div><div class="queue-list">票號：${escapeHtml(id)}</div></div>`}
function escapeHtml(value){return String(value).replace(/[&<>'"]/g,s=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;","\"":"&quot;"}[s]))}
</script>
</body>
</html>
