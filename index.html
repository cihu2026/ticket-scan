<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎟️ 後慈湖驗票系統</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-color: #121212; --card-bg: #1e1e1e; --primary: #00d2ff;
    --success: #2ecc71; --error: #e74c3c; --warning: #f1c40f;
  }
  body { font-family: "Noto Sans TC", sans-serif; background: var(--bg-color); color: #e0e0e0; text-align: center; padding: 15px; margin: 0; }
  h2 { color: var(--primary); font-size: 24px; font-weight: 900; margin: 15px 0; }
  #reader { 
    max-width: 500px; margin: 15px auto; border-radius: 25px; overflow: hidden; 
    border: 2px solid #333; background: #000; box-shadow: 0 8px 25px rgba(0,0,0,0.4);
  }
  .status { 
    max-width: 500px; margin: 15px auto; padding: 20px; font-size: 16px; border-radius: 20px; 
    background: var(--card-bg); border: 1px solid #333; min-height: 60px; line-height: 1.6;
    transition: all 0.2s ease;
  }
  .ok { border: 2px solid var(--success); text-align: left; background: rgba(46, 204, 113, 0.1); }
  .err { border: 2px solid var(--error); color: #ff8a80; background: rgba(231, 76, 60, 0.1); }
  .wait { border: 2px solid var(--warning); color: var(--warning); }
  #start { 
    width: 90%; max-width: 500px; padding: 18px; font-size: 19px; font-weight: 700;
    border-radius: 50px; border: none; color: white; cursor: pointer;
    background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
    box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3);
  }
  #adjustArea { display: none; max-width: 500px; margin: 15px auto; background: var(--card-bg); padding: 18px; border-radius: 20px; border: 1px solid #333; }
  .adj-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
  .btn-adj { padding: 12px 0; font-size: 16px; border-radius: 12px; border: none; cursor: pointer; font-weight: 700; }
  .plus { background: #2d5a27; color: #a5d6a7; }
  .minus { background: #5a2727; color: #ef9a9a; }
  .input-group { display: flex; gap: 10px; }
  input[type="number"] { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #444; background: #121212; color: #fff; text-align: center; font-size: 16px; }
  .btn-send { flex: 0.4; background: #e67e22; color: white; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; }
  .hr-line { border-top: 1px dashed #444; margin: 12px 0; }
  .detail-row { margin: 8px 0; color: #ccc; }
  .total-num { font-weight: 900; color: #fff; font-size: 1.1em; }
</style>
</head>
<body>

<h2>🎟️ 後慈湖驗票系統</h2>
<div id="reader"></div>
<button id="start">📷 啟動相機驗票</button>
<div id="status" class="status">👋 您好！請點擊上方按鈕開始</div>

<div id="adjustArea">
  <div style="margin-bottom:12px; font-weight:700; color:var(--primary);">🔧 進園人數手動微調</div>
  <div class="adj-grid">
    <button class="btn-adj minus" onclick="adjust(-1)">-1</button>
    <button class="btn-adj plus" onclick="adjust(1)">+1</button>
    <button class="btn-adj minus" onclick="adjust(-5)">-5</button>
    <button class="btn-adj plus" onclick="adjust(5)">+5</button>
  </div>
  <div class="input-group">
    <input type="number" id="manualDiff" placeholder="輸入數字">
    <button class="btn-send" onclick="handleManualAdjust()">📤 送出</button>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbw5VQi-dtLodRQbKTgzueGGXgMBBedA_Th93Skr_Dia3-JYbxtd00shnZ24axbznDY/exec";
let html5QrCode;
let scanning = false;
let lastTicketId = "";
const statusEl = document.getElementById("status");
const adjArea = document.getElementById("adjustArea");

document.getElementById("start").addEventListener("click", function() {
  if (scanning) return;
  this.innerText = "⏳ 啟動中...";
  startCamera();
});

function startCamera() {
  html5QrCode = new Html5Qrcode("reader");
  const config = { 
    fps: 20, // ⚡ 提高偵測率：確保抓取速度
    qrbox: { width: 220, height: 220 }, // 縮小掃描框：減少運算量，節省電力
    aspectRatio: 1.0,
    rememberLastUsedCamera: true
  };

  html5QrCode.start({ facingMode: "environment" }, config, onScan)
    .then(() => {
      statusEl.className = "status wait";
      statusEl.innerText = "🔍 正在尋找 QR Code...";
      document.getElementById("start").style.display = "none";
    })
    .catch(err => {
      statusEl.className = "status err";
      statusEl.innerText = "❌ 相機啟動失敗";
      document.getElementById("start").innerText = "📷 重試啟動";
    });
}

function onScan(text) {
  if (scanning) return;
  scanning = true;

  // 1. ⚡ 體感加速：立即震動並更新 UI
  if (navigator.vibrate) navigator.vibrate(60); 
  statusEl.className = "status wait";
  statusEl.innerText = "⚡ 已讀取，連線驗證中...";

  // 2. 🔋 節能核心：掃描到後立刻暫停相機運算 (CPU 休息)
  html5QrCode.pause(); 

  const id = text.includes("id=") ? text.split("id=")[1].split("&")[0] : text;
  lastTicketId = id;

  fetch(API_URL, {
    method: "POST",
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ id: id, action: "verify" })
  })
  .then(r => r.json())
  .then(res => {
    if (!res.ok) {
      statusEl.className = "status err";
      statusEl.innerText = "🚫 驗票失敗\n" + res.msg;
      resumeAfterDelay(2000);
      return;
    }
    renderSuccess(res);
    adjArea.style.display = "block";
    resumeAfterDelay(3500); // ✅ 驗票成功後相機暫停 3.5 秒，最省電
  })
  .catch(err => {
    statusEl.className = "status err";
    statusEl.innerText = "🌐 網路異常，請稍後重試";
    resumeAfterDelay(2000);
  });
}

function resumeAfterDelay(ms) {
  setTimeout(() => {
    if (html5QrCode) html5QrCode.resume(); // 恢復相機運算
    scanning = false;
  }, ms);
}

function renderSuccess(res) {
  const d = res.detail;
  statusEl.className = "status ok";
  statusEl.innerHTML = `
    <div style="font-weight:900; font-size:18px; margin-bottom:10px; color:#2ecc71;">✅ 驗票通過！歡迎入園</div>
    <div class="detail-row">👥 總人數：<span class="total-num">${d.people}</span> 人</div>
    <div class="hr-line"></div>
    <div class="detail-row">🔸 現金：${d.cash_full}全 / ${d.cash_group}團 / ${d.cash_discount}優</div>
    <div class="detail-row">🔸 悠遊：${d.card_full}全 / ${d.card_group}團 / ${d.card_discount}優</div>
    <div class="detail-row">🔸 免費：${d.free} 人</div>
    <div class="hr-line"></div>
    <div style="font-weight:700;">📊 場內總計：${res.current || '?'} 人</div>
  `;
}

// 🔧 微調功能
function handleManualAdjust() {
  const input = document.getElementById("manualDiff");
  const val = parseInt(input.value);
  if (isNaN(val) || val === 0) return alert("請輸入數字");
  adjust(val);
  input.value = ""; 
}

function adjust(diff) {
  statusEl.className = "status wait";
  statusEl.innerText = "🔄 同步中...";
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ type: "IN", delta: diff, source: "驗票端微調", note: "票號:" + lastTicketId })
  })
  .then(r => r.json())
  .then(res => {
    statusEl.className = "status ok";
    statusEl.innerHTML = `<div style="text-align:center;"><div style="color:#2ecc71; font-weight:900;">✅ 已修正 (${diff > 0 ? "+" : ""}${diff})</div><div class="hr-line"></div><div style="font-weight:700;">📊 目前場內：${res.current || '?'} 人</div></div>`;
  })
  .catch(() => alert("❌ 同步失敗"));
}
</script>
</body>
</html>
