<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0b1238">
<title>後慈湖電子驗票系統</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
:root{--bg:#07133a;--bg2:#123783;--card:rgba(255,255,255,.12);--line:rgba(139,214,255,.34);--text:#fff;--muted:#cbd9ff;--blue:#4fdcff;--green:#5df0a2;--green2:#1db96b;--pink:#ff65ae;--red:#d93476;--orange:#ffae5f;--purple:#6a6dff;--yellow:#ffe66d;--shadow:0 18px 48px rgba(0,0,0,.42)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100vh;padding:14px;background:radial-gradient(circle at 10% 10%,rgba(79,220,255,.28),transparent 30%),radial-gradient(circle at 90% 10%,rgba(255,101,174,.22),transparent 28%),linear-gradient(145deg,var(--bg),var(--bg2) 55%,#071027);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Segoe UI",sans-serif;text-align:center}.app{max-width:560px;margin:0 auto 28px}.hero,.card,.status,.hint{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.07));backdrop-filter:blur(16px);box-shadow:var(--shadow)}.hero{padding:18px;border-radius:32px;margin-bottom:12px}.eyebrow{margin:0 0 6px;color:var(--green);font-size:12px;font-weight:900;letter-spacing:2px;text-transform:uppercase}h1{margin:0;font-size:28px;font-weight:900}.subtitle{margin:8px 0 0;color:var(--muted);font-size:13px;font-weight:700}.card{border-radius:30px;padding:14px;margin-bottom:12px}.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;text-align:left}.section-title{display:flex;align-items:center;gap:9px;font-size:19px;font-weight:900}.section-icon{display:grid;place-items:center;width:38px;height:38px;border-radius:18px;background:rgba(79,220,255,.15);border:1px solid var(--line)}.section-note{font-size:12px;color:var(--muted);font-weight:900}.netbar{display:flex;justify-content:space-between;align-items:center;margin:0 0 12px;padding:10px 13px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.1);color:var(--muted);font-size:13px;font-weight:900}.dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 12px var(--green);margin-right:6px}.offline .dot{background:var(--yellow);box-shadow:0 0 12px var(--yellow)}button,input{font:inherit}button{border:0;cursor:pointer;touch-action:manipulation;transition:.08s}button:active{transform:scale(.97)}input{width:100%;padding:16px;border-radius:22px;border:1px solid var(--line);background:rgba(3,10,42,.66);color:#fff;text-align:center;font-size:22px;font-weight:900;outline:none}input::placeholder{color:rgba(230,238,255,.56)}.start-btn{width:100%;padding:18px;border-radius:24px;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;font-size:20px;font-weight:900;box-shadow:0 14px 30px rgba(79,220,255,.24)}#reader{min-height:250px;margin:0 0 12px;border-radius:28px;overflow:hidden;background:#000;border:1px solid var(--line)}.manual-box,.direct-row,.input-group{display:grid;grid-template-columns:1fr 108px;gap:10px}.btn-send{border-radius:22px;background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;font-weight:900}.btn-direct{background:linear-gradient(135deg,var(--green),var(--green2));color:#062b19}.direct-card{border-color:rgba(93,240,162,.45)}.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin:12px 0}.quick-btn,.key-btn,.btn-adj{min-height:52px;border-radius:21px;font-size:21px;font-weight:900;box-shadow:0 10px 22px rgba(0,0,0,.22)}.plus,.key-plus{background:linear-gradient(180deg,#8fffc0,var(--green2));color:#062b19}.minus,.key-minus{background:linear-gradient(180deg,var(--pink),var(--red));color:#fff}.keypad{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin:10px 0 8px}.key-btn{background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.07));color:#fff;border:1px solid var(--line)}.key-wide{grid-column:span 2}.tools{display:grid;grid-template-columns:1fr 1fr;gap:9px}.tool-btn{min-height:48px;border-radius:20px;border:1px solid var(--line);background:rgba(255,255,255,.12);color:#fff;font-weight:900}.undo-btn{background:linear-gradient(135deg,var(--orange),var(--pink))}.history{display:none;text-align:left;margin-top:10px;padding:10px;border-radius:18px;border:1px solid var(--line);background:rgba(0,0,0,.18)}.history-item{display:grid;grid-template-columns:1fr auto auto;gap:8px;padding:7px 0;border-top:1px solid rgba(255,255,255,.12);font-size:12px}.history-item:first-child{border-top:0}.history-diff{color:var(--green);font-weight:900}#adjustArea{display:none}.adj-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:10px}.status{border-radius:26px;padding:16px;margin-bottom:12px;font-weight:900}.ok{border-color:rgba(93,240,162,.55)}.err{border-color:rgba(255,101,174,.6)}.wait{border-color:rgba(79,220,255,.6)}.offsave{border-color:rgba(255,230,109,.6)}.result-title{font-size:20px}.people-num{font-size:48px}.current-big{font-size:22px;color:var(--yellow);margin-top:8px}.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}.mini-stat{padding:10px;border-radius:16px;background:rgba(0,0,0,.18);font-size:14px}.mini-stat span{display:block;font-size:10px;color:var(--muted);margin-top:4px}.hint{border-radius:22px;padding:12px;color:var(--muted);font-size:13px;font-weight:700;line-height:1.6}.flash-ok{animation:ok .45s}.flash-err{animation:err .45s}@keyframes ok{50%{box-shadow:0 0 30px var(--green)}}@keyframes err{50%{box-shadow:0 0 30px var(--pink)}}@media(max-width:430px){body{padding:10px}h1{font-size:25px}.manual-box,.direct-row,.input-group{grid-template-columns:1fr 92px}.quick-grid,.keypad,.adj-grid{gap:7px}.key-btn,.quick-btn,.btn-adj{min-height:50px}.section-title{font-size:17px}.result-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
<header class="hero"><p class="eyebrow">Hou Cihu Gate Control</p><h1>🎟️ 後慈湖電子驗票系統</h1><p class="subtitle">掃碼驗票・直接加減人數・離線自動同步</p></header>
<div id="netbar" class="netbar"><span><span class="dot"></span><span id="netText">連線正常</span></span><span id="queueCount">待同步 0 筆</span></div>
<section class="card"><div class="section-head"><div class="section-title"><span class="section-icon">📷</span><span>掃描驗票</span></div><div class="section-note">QR Code / 票號</div></div><button id="start" class="start-btn">📷 啟動掃描驗票</button><div id="reader"></div><div class="manual-box"><input id="manualTicketInput" placeholder="請手動輸入票號" inputmode="text"><button id="manualSubmitBtn" class="btn-send">🎫 驗票</button></div></section>
<section class="card direct-card"><div class="section-head"><div class="section-title"><span class="section-icon">👥</span><span>直接加減進園人數</span></div><div class="section-note">補登 / 扣回</div></div><div class="direct-row"><input id="directPeopleInput" placeholder="請按 + / − 與數字" readonly inputmode="none"><button id="directPeopleBtn" class="btn-send btn-direct">✅ 送出</button></div><div class="quick-grid"><button class="quick-btn minus" onclick="directAdjust(-5)">-5</button><button class="quick-btn minus" onclick="directAdjust(-1)">-1</button><button class="quick-btn plus" onclick="directAdjust(1)">+1</button><button class="quick-btn plus" onclick="directAdjust(5)">+5</button></div><div class="keypad"><button class="key-btn" onclick="appendDirectKey('1')">1</button><button class="key-btn" onclick="appendDirectKey('2')">2</button><button class="key-btn" onclick="appendDirectKey('3')">3</button><button class="key-btn key-minus" onclick="setDirectSign('-')">−</button><button class="key-btn" onclick="appendDirectKey('4')">4</button><button class="key-btn" onclick="appendDirectKey('5')">5</button><button class="key-btn" onclick="appendDirectKey('6')">6</button><button class="key-btn key-plus" onclick="setDirectSign('+')">＋</button><button class="key-btn" onclick="appendDirectKey('7')">7</button><button class="key-btn" onclick="appendDirectKey('8')">8</button><button class="key-btn" onclick="appendDirectKey('9')">9</button><button class="key-btn" onclick="backspaceDirectKey()">⌫</button><button class="key-btn key-minus" onclick="setDirectSign('-')">−</button><button class="key-btn key-wide" onclick="appendDirectKey('0')">0</button><button class="key-btn key-plus" onclick="setDirectSign('+')">＋</button></div><div class="tools"><button id="undoDirectBtn" class="tool-btn undo-btn">↩️ 撤銷上一筆</button><button id="toggleHistoryBtn" class="tool-btn">📋 本機紀錄</button></div><div id="historyBox" class="history"><div id="historyList"></div></div></section>
<div id="status" class="status">👋 請先按「啟動掃描驗票」，也可以手動輸入票號或直接加減進園人數</div>
<section id="adjustArea" class="card"><div class="section-head"><div class="section-title"><span class="section-icon">🔧</span><span>本張票人數微調</span></div><div class="section-note">驗票後使用</div></div><div class="adj-grid"><button class="btn-adj minus" onclick="adjust(-1)">-1</button><button class="btn-adj plus" onclick="adjust(1)">+1</button><button class="btn-adj minus" onclick="adjust(-5)">-5</button><button class="btn-adj plus" onclick="adjust(5)">+5</button></div><div class="input-group"><input id="manualDiff" type="number" placeholder="輸入數字"><button class="btn-send" onclick="handleManualAdjust()">📤 送出</button></div></section>
<div class="hint">💡 直接加減區已加上內建 ＋／− 鍵，不用再叫出手機數字鍵盤。</div>
</div>
<script>
const API_URL="https://script.google.com/macros/s/AKfycbw63eJnsg0a70IbZXBYWktt8CCDfx0mm_MAwzMRDoxKNNvcT2FTTMpJuU8f3qfqHjo/exec";
const QUEUE_KEY="cihu_ticket_offline_queue_v3",RECENT_KEY="cihu_ticket_recent_seen_v1",HISTORY_KEY="cihu_ticket_adjust_history_v1";
const REQUEST_TIMEOUT=6200,BIG_DIFF_CONFIRM=20,MAX_DIRECT_DIFF=200;
let qr=null,scanning=false,lastScan=0,lastTicketId="",syncing=false;
const statusEl=document.getElementById("status"),startBtn=document.getElementById("start"),adjArea=document.getElementById("adjustArea"),manualInput=document.getElementById("manualTicketInput"),manualBtn=document.getElementById("manualSubmitBtn"),directPeopleInput=document.getElementById("directPeopleInput"),directPeopleBtn=document.getElementById("directPeopleBtn"),undoDirectBtn=document.getElementById("undoDirectBtn"),toggleHistoryBtn=document.getElementById("toggleHistoryBtn"),historyBox=document.getElementById("historyBox"),historyList=document.getElementById("historyList"),netbar=document.getElementById("netbar"),netText=document.getElementById("netText"),queueCount=document.getElementById("queueCount");
startBtn.onclick=startCameraOnce;manualBtn.onclick=()=>{const val=manualInput.value.trim();if(!val)return;onScan(val,true);manualInput.value=""};manualInput.addEventListener("keydown",e=>{if(e.key==="Enter")manualBtn.click()});directPeopleBtn.onclick=handleDirectPeople;undoDirectBtn.onclick=undoLastAdjust;toggleHistoryBtn.onclick=()=>{historyBox.style.display=historyBox.style.display==="block"?"none":"block";renderHistory()};window.addEventListener("online",()=>{updateNetUI();flushQueue()});window.addEventListener("offline",updateNetUI);document.addEventListener("visibilitychange",()=>{if(!document.hidden){updateNetUI();flushQueue();renderHistory()}});setInterval(()=>{if(navigator.onLine)flushQueue()},12000);updateNetUI();flushQueue();renderHistory();
function startCameraOnce(){if(qr)return;if(typeof Html5Qrcode==="undefined"){showErr("❌ 掃描套件尚未載入");return}startBtn.innerText="⏳ 啟動中...";startBtn.disabled=true;qr=new Html5Qrcode("reader",{verbose:false});qr.start({facingMode:"environment"},{fps:30,qrbox:viewfinderSize,aspectRatio:1,disableFlip:true,rememberLastUsedCamera:true,videoConstraints:{facingMode:"environment",width:{ideal:960},height:{ideal:960}}},onScan).then(()=>{statusEl.className="status wait";statusEl.textContent="🔍 正在尋找 QR Code...";startBtn.style.display="none"}).catch(err=>{showErr("❌ 相機啟動失敗，請允許相機權限或改用 Chrome / Safari");startBtn.innerText="📷 重試啟動掃描";startBtn.disabled=false;qr=null;console.error(err)})}
function viewfinderSize(w,h){const edge=Math.floor(Math.min(w,h)*0.68);return{width:Math.max(180,Math.min(edge,260)),height:Math.max(180,Math.min(edge,260))}}
function onScan(text,isManual=false){const now=Date.now();if(scanning||(!isManual&&now-lastScan<650))return;const id=extractTicketId(text);if(!id){showErr("🚫 票號格式錯誤");return}if(isRecentlySeen(id)){showLocalDuplicate(id);return}lastScan=now;scanning=true;lastTicketId=id;adjArea.style.display="block";rememberTicket(id);if(navigator.vibrate)navigator.vibrate(35);statusEl.className="status wait";statusEl.textContent="⚡ 驗證中...";pauseScanner();const payload={id,action:"verify"};postFast(payload).then(res=>{if(!res.ok){renderFail(res.msg||"驗票失敗",id);resumeScan(450);return}renderSuccess(res);resumeScan(500)}).catch(()=>{saveOffline({kind:"verify",payload,createdAt:Date.now(),ticketId:id});renderOfflineSaved("🎟️ 已離線暫存票號",id);resumeScan(450)})}
function extractTicketId(text){const raw=String(text||"").trim();if(!raw)return"";try{const u=new URL(raw,location.href);const id=u.searchParams.get("id");if(id!==null)return id.trim()}catch(e){}const m=raw.match(/[?&]id=([^&]+)/);return m?decodeURIComponent(m[1].replace(/\+/g," ")).trim():raw}
function scannerState(){return qr&&typeof qr.getState==="function"?qr.getState():null}function pauseScanner(){if(scannerState()===2&&typeof qr.pause==="function")qr.pause(true)}function resumeScan(ms){setTimeout(()=>{if(scannerState()===3&&typeof qr.resume==="function")qr.resume();scanning=false},ms)}function displayNumber(v){const n=Number(v);return Number.isFinite(n)?String(n):"0"}function formatSigned(v){const n=Number(v)||0;return `${n>0?"+":""}${n}`}
function renderSuccess(res){const d=res.detail||{};if(navigator.vibrate)navigator.vibrate([80]);statusEl.className="status ok flash-ok";statusEl.innerHTML=`<div class="result-title">✅ 驗票成功</div><div class="people-num">${displayNumber(d.people)}</div><div>本張票人數</div><div class="current-big">場內 ${displayNumber(res.current)} 人</div><div class="result-grid"><div class="mini-stat">${displayNumber(d.cash_full)} / ${displayNumber(d.cash_group)} / ${displayNumber(d.cash_discount)}<span>現金 全/團/優</span></div><div class="mini-stat">${displayNumber(d.card_full)} / ${displayNumber(d.card_group)} / ${displayNumber(d.card_discount)}<span>悠遊 全/團/優</span></div><div class="mini-stat">${displayNumber(d.free)}<span>免費</span></div></div>`}
function renderFail(msg,id){showErr(`⛔ 驗票未通過<br>${escapeHtml(msg)}${id?`<br><small>票號：${escapeHtml(id)}</small>`:""}`)}function showErr(html){if(navigator.vibrate)navigator.vibrate([50,40,50]);statusEl.className="status err flash-err";statusEl.innerHTML=html}
function appendDirectKey(k){let v=directPeopleInput.value||"";if(v==="0")v="";directPeopleInput.value=(v+k).replace(/^([+-]?)0+(\d)/,"$1$2")}function setDirectSign(sign){let v=(directPeopleInput.value||"").replace(/^[+-]/,"");directPeopleInput.value=sign+v}function backspaceDirectKey(){directPeopleInput.value=(directPeopleInput.value||"").slice(0,-1)}
function handleManualAdjust(){const v=parseInt(document.getElementById("manualDiff").value,10);if(isNaN(v)||v===0)return;if(!confirmLargeDiff(v))return;adjust(v);document.getElementById("manualDiff").value=""}function handleDirectPeople(){const v=parseInt(directPeopleInput.value,10);if(isNaN(v)||v===0){showErr("🚫 請輸入要加減的人數，例如 +2 或 -1");return}if(!validateDirectDiff(v)||!confirmLargeDiff(v))return;directPeopleInput.value="";submitDirectAdjust(v)}function validateDirectDiff(diff){if(Math.abs(diff)>MAX_DIRECT_DIFF){showErr(`🚫 單次加減不可超過 ${MAX_DIRECT_DIFF} 人，避免誤觸`);return false}return true}function confirmLargeDiff(diff){return Math.abs(diff)<BIG_DIFF_CONFIRM||confirm(`確定要一次修正 ${formatSigned(diff)} 人嗎？`)}function directAdjust(diff){if(!validateDirectDiff(diff)||!confirmLargeDiff(diff))return;submitDirectAdjust(diff)}function submitDirectAdjust(diff){adjust(diff,"直接加減人數","手動直接輸入",{record:true,kind:"direct"})}
function undoLastAdjust(){const h=loadHistory();const target=h.find(x=>x.kind==="direct"&&!x.undone);if(!target){showErr("目前沒有可撤銷的直接加減紀錄");return}if(!confirm(`確定撤銷上一筆 ${formatSigned(target.diff)} 人？`))return;target.undone=true;saveHistory(h);renderHistory();adjust(-target.diff,"撤銷上一筆加減","撤銷:"+(target.actionId||""),{record:true,kind:"undo"})}
function adjust(diff,source="驗票端微調",notePrefix="票號:",options={}){const actionId=String(Date.now())+Math.random().toString(16).slice(2);const payload={type:"IN",delta:diff,source,note:notePrefix+(lastTicketId||""),actionId};statusEl.className="status wait";statusEl.textContent="🔄 同步中...";postFast(payload).then(res=>{if(options.record)recordHistory({actionId,kind:options.kind||"direct",diff,source,status:"完成",current:res.current,createdAt:Date.now()});statusEl.className="status ok flash-ok";statusEl.innerHTML=`<div class="result-title">✅ 已修正 ${formatSigned(diff)}</div><div class="current-big">目前場內 ${displayNumber(res.current)} 人</div>`}).catch(()=>{saveOffline({kind:"adjust",payload,createdAt:Date.now(),ticketId:lastTicketId});if(options.record)recordHistory({actionId,kind:options.kind||"direct",diff,source,status:"待同步",createdAt:Date.now()});renderOfflineSaved(`🔧 已離線暫存修正 ${formatSigned(diff)}`,lastTicketId)})}
function postFast(payload){const c=new AbortController();const t=setTimeout(()=>c.abort(),REQUEST_TIMEOUT);return fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},cache:"no-store",keepalive:true,signal:c.signal,body:JSON.stringify(payload)}).then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json()}).finally(()=>clearTimeout(t))}
function loadQueue(){try{return JSON.parse(localStorage.getItem(QUEUE_KEY)||"[]")}catch(e){return[]}}function saveQueue(q){localStorage.setItem(QUEUE_KEY,JSON.stringify(q));updateNetUI()}function saveOffline(item){let q=loadQueue();const key=item.kind+":"+JSON.stringify(item.payload)+":"+(item.kind==="verify"?"":Date.now()+Math.random());if(item.kind==="verify"&&q.some(x=>x.key===key)){updateNetUI();return}q.push({...item,key,tries:0});saveQueue(q)}function renderOfflineSaved(title,ticketId){statusEl.className="status offsave";statusEl.innerHTML=`<div class="result-title">${title}</div><div>不用重掃，恢復網路會自動補送</div>${ticketId?`<small>票號：${escapeHtml(ticketId)}</small>`:""}<div class="current-big">待同步 ${loadQueue().length} 筆</div>`}
async function flushQueue(){if(syncing||!navigator.onLine)return;let q=loadQueue();if(q.length===0){updateNetUI();return}syncing=true;updateNetUI("同步中...");const remain=[];let done=0;for(const item of q){try{await postFast(item.payload);done++}catch(e){item.tries=(item.tries||0)+1;remain.push(item)}}syncing=false;saveQueue(remain);if(done>0){statusEl.className=remain.length?"status offsave":"status ok flash-ok";statusEl.innerHTML=remain.length?`⚠️ 已同步 ${done} 筆，尚待同步 ${remain.length} 筆`:`✅ 離線資料已全部同步`}}
function updateNetUI(extra){const q=loadQueue(),online=navigator.onLine;netbar.classList.toggle("offline",!online||q.length>0);netText.textContent=extra||(online?"連線正常":"離線模式");queueCount.textContent=`待同步 ${q.length} 筆`}function loadHistory(){try{return JSON.parse(localStorage.getItem(HISTORY_KEY)||"[]")}catch(e){return[]}}function saveHistory(h){localStorage.setItem(HISTORY_KEY,JSON.stringify(h.slice(0,20)))}function recordHistory(item){const h=loadHistory();h.unshift(item);saveHistory(h);renderHistory()}function renderHistory(){const h=loadHistory().slice(0,5);historyList.innerHTML=h.length?h.map(x=>`<div class="history-item"><span>${escapeHtml(nowTime(x.createdAt))} ${x.kind==="undo"?"撤銷":"加減"}</span><span class="history-diff">${formatSigned(x.diff)} 人</span><span>${x.undone?"已撤銷":escapeHtml(x.status||"")}</span></div>`).join(""):'<div class="history-item"><span>尚無本機加減紀錄</span><span>—</span></div>'}
function nowTime(ts){return new Date(ts||Date.now()).toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false})}function loadRecent(){try{return JSON.parse(localStorage.getItem(RECENT_KEY)||"[]")}catch(e){return[]}}function rememberTicket(id){const now=Date.now();let list=loadRecent().filter(x=>now-x.t<10*60*1000&&x.id!==id);list.push({id,t:now});localStorage.setItem(RECENT_KEY,JSON.stringify(list.slice(-80)))}function isRecentlySeen(id){const now=Date.now();return loadRecent().some(x=>x.id===id&&now-x.t<80*1000)}function showLocalDuplicate(id){showErr(`⚠️ 這張手機剛剛掃過<br>先不要重複送出<br><small>票號：${escapeHtml(id)}</small>`)}function escapeHtml(v){return String(v).replace(/[&<>"']/g,s=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[s]))}
</script>
</body>
</html>
