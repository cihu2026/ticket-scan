<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🍃 後慈湖驗票系統 PRO</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
    :root {
        --forest-green: #1b4332;
        --lake-blue: #0077b6;
        --gold: #d4af37;
        --success: #2d6a4f;
        --error: #bc4749;
    }

    body {
        margin: 0;
        background: linear-gradient(180deg, #1b4332 0%, #081c15 100%);
        color: #fff;
        font-family: -apple-system, "Noto Sans TC", sans-serif;
        text-align: center;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }

    /* 頂部標題區 */
    .header {
        padding: 25px 0;
        background: rgba(0,0,0,0.3);
        border-bottom: 3px solid var(--gold);
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    h2 { margin: 0; font-size: 1.4rem; letter-spacing: 1px; }

    /* 掃描器外框 */
    #reader-container {
        position: relative;
        width: 85%;
        max-width: 380px;
        margin: 20px auto;
        border: 5px solid #fff;
        border-radius: 25px;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    #reader { width: 100% !important; border: none !important; }

    /* 控制按鈕 */
    .btn-container {
        width: 85%;
        max-width: 380px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    #start {
        background: var(--gold);
        color: #1b4332;
        padding: 18px;
        border: none;
        border-radius: 15px;
        font-size: 1.2rem;
        font-weight: 900;
        cursor: pointer;
        box-shadow: 0 5px 0 #967240;
    }
    #start:active { transform: translateY(3px); box-shadow: none; }

    .input-box {
        display: flex;
        background: rgba(255,255,255,0.15);
        border-radius: 15px;
        padding: 5px;
        backdrop-filter: blur(5px);
    }

    input {
        flex: 1;
        background: transparent;
        border: none;
        color: white;
        padding: 12px;
        font-size: 1rem;
        outline: none;
    }

    .btn-go {
        background: var(--lake-blue);
        color: white;
        border-radius: 12px;
        padding: 0 20px;
        border: none;
        font-weight: bold;
    }

    /* 狀態卡片 (動態變化) */
    #status {
        margin-top: auto;
        width: 100%;
        padding: 40px 0;
        background: rgba(255,255,255,0.05);
        border-radius: 40px 40px 0 0;
        transition: 0.3s;
    }

    .status-emoji { font-size: 4rem; margin-bottom: 10px; }
    .status-title { font-size: 1.8rem; font-weight: 900; margin-bottom: 5px; }
    .status-sub { font-size: 1rem; opacity: 0.8; }

    /* 狀態配色樣式 */
    .ok { background: var(--success) !important; }
    .err { background: var(--error) !important; }
    .wait { background: #444 !important; }
</style>
</head>

<body>

<div class="header">
    <h2>🍃 後慈湖工作人員驗票 🌲</h2>
</div>

<div id="reader-container">
    <div id="reader"></div>
</div>

<div class="btn-container">
    <button id="start">📷 啟動相機掃描</button>
    
    <div class="input-box">
        <input id="manual" placeholder="⌨️ 手動輸入票號碼...">
        <button class="btn-go" onclick="manualCheck()">驗票</button>
    </div>
</div>

<div id="status" class="status">
    <div class="status-emoji">⏳</div>
    <div class="status-title">等待啟動</div>
    <div class="status-sub">Ready for Check-in</div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbw5VQi-dtLodRQbKTgzueGGXgMBBedA_Th93Skr_Dia3-JYbxtd00shnZ24axbznDY/exec";
const TOKEN="abc123";

let qr;
let scanning=false;
let lastId="";
let cache=[];

const okSound=new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
const errSound=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

const statusEl=document.getElementById("status");

document.getElementById("start").onclick=()=>{
    qr=new Html5Qrcode("reader");
    qr.start(
        {facingMode:"environment"},
        { fps:30, qrbox:220, aspectRatio: 1.0 },
        onScan
    ).catch(e => updateStatus("❌", "啟動失敗", "請檢查相機權限", "err"));
};

function onScan(text){
    if(scanning) return;
    const id=text.includes("id=")? text.split("id=")[1].split("&")[0]: text;
    
    if(id===lastId){
        updateStatus("⚠️", "重複掃描", "此票卷已驗證過", "err");
        errSound.play();
        return;
    }
    
    scanning=true;
    lastId=id;
    updateStatus("🔍", "驗證中", "正在查詢資料庫...", "wait");
    send({id:id, action:"verify", token:TOKEN});
}

function manualCheck(){
    let val=document.getElementById("manual").value.trim();
    if(val) onScan(val);
}

function send(data){
    fetch(API,{method:"POST", body:JSON.stringify(data)})
    .then(r=>r.json())
    .then(res=>{
        if(!res.ok){
            updateStatus("🚫", "無效票卷", "請引導遊客至櫃檯", "err");
            errSound.play();
            scanning=false;
            return;
        }
        okSound.play();
        updateStatus("✅", "通過", `場內人數：${res.current || 0} 人`, "ok");
        scanning=false;
        flushCache();
    })
    .catch(()=>{
        cache.push(data);
        updateStatus("📡", "離線儲存", "訊號弱，已暫存紀錄", "wait");
        scanning=false;
    });
}

function flushCache(){
    if(cache.length===0) return;
    let temp=[...cache];
    cache=[];
    temp.forEach(d=>send(d));
}

function updateStatus(emoji, title, sub, type){
    statusEl.className = type;
    statusEl.innerHTML = `
        <div class="status-emoji">${emoji}</div>
        <div class="status-title">${title}</div>
        <div class="status-sub">${sub}</div>
    `;
    if(navigator.vibrate) {
        if(type === 'ok') navigator.vibrate(80);
        else if(type === 'err') navigator.vibrate([100, 50, 100]);
    }
}
</script>

</body>
</html>
