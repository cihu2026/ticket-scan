<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>🎟️ 後慈湖驗票系統 FINAL</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root{
    --primary:#00d2ff;
    --success:#2ecc71;
    --error:#ff6b6b;
    --warning:#f1c40f;
    --bg:#0f172a;
    --glass:rgba(255,255,255,0.06);
    --gold:#d4af37;
}

body{
    margin:0;
    background:linear-gradient(180deg,#0f172a,#020617);
    color:#fff;
    font-family:"Noto Sans TC",sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
}

h2{
    margin:20px 0;
    font-weight:900;
    letter-spacing:2px;
    background:linear-gradient(90deg,#00d2ff,#3a7bd5);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* 掃描區 /
#reader-container{
    width:90%;
    max-width:420px;
    border-radius:24px;
    overflow:hidden;
    background:#000;
}

.scan-line{
    position:absolute;
    width:100%;
    height:3px;
    background:var(--primary);
    animation:scan 2s linear infinite;
    display:none;
}

@keyframes scan{
    0%{top:0}
    100%{top:100%}
}

/ 控制 /
.controls{
    width:90%;
    max-width:420px;
    margin-top:15px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

button{
    border:none;
    border-radius:14px;
    padding:14px;
    font-weight:800;
}

#start{
    background:linear-gradient(135deg,#00d2ff,#3a7bd5);
    color:#fff;
}

.input-group{
    display:flex;
    background:var(--glass);
    border-radius:12px;
    padding:5px;
}

input{
    flex:1;
    background:transparent;
    border:none;
    color:#fff;
    padding:10px;
}

/ 狀態 /
#status{
    width:90%;
    max-width:400px;
    margin-top:20px;
    padding:20px;
    border-radius:20px;
    background:var(--glass);
    text-align:center;
    border-left:6px solid #333;
}

.status.ok{border-color:var(--success)}
.status.err{border-color:var(--error)}
.status.wait{border-color:var(--warning)}

.big{font-size:30px;font-weight:900}

/ 人數 /
.counter{
    margin-top:15px;
    display:flex;
    justify-content:center;
    gap:20px;
}

.btn-adj{
    width:50px;height:50px;
    border-radius:50%;
    background:var(--gold);
}

/ 輸入調整 /
.adjust-box{
    margin-top:10px;
    display:flex;
    gap:10px;
    justify-content:center;
}

.adjust-box input{
    width:120px;
    text-align:center;
}
</style>
</head>

<body>

<h2>🎟️ 後慈湖驗票系統</h2>

<div id="reader-container">
    <div class="scan-line" id="line"></div>
    <div id="reader"></div>
</div>

<div class="controls">
    <button id="start">📷 開始掃描</button>

    <div class="input-group">
        <input id="manual" placeholder="輸入票號">
        <button onclick="manualCheck()">驗證</button>
    </div>
</div>

<div id="status" class="status">
    <div id="msg" class="big">⏳ 準備就緒</div>

    <div class="counter">
        <button class="btn-adj" onclick="adjust(-1)">➖</button>
        <div id="count">👥 0</div>
        <button class="btn-adj" onclick="adjust(1)">➕</button>
    </div>

    <div class="adjust-box">
        <input id="adjInput" placeholder="+ / -">
        <button onclick="applyAdjust()">套用</button>
    </div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbw5VQi-dtLodRQbKTgzueGGXgMBBedA_Th93Skr_Dia3-JYbxtd00shnZ24axbznDY/exec";

let qr,lastId="",count=0,cache=[],history=[];
let lastScanTime=0;
const DELAY=1200;

const msg=document.getElementById("msg");
const countEl=document.getElementById("count");

/ 啟動掃描 /
document.getElementById("start").onclick=()=>{
    qr=new Html5Qrcode("reader");
    document.getElementById("line").style.display="block";

    qr.start({facingMode:"environment"},{fps:30,qrbox:250},onScan)
    .catch(()=>show("❌ 鏡頭開啟失敗","err"));
};

/ 掃描 /
function onScan(text){
    let now=Date.now();
    if(now-lastScanTime<DELAY) return;
    lastScanTime=now;

    let id=text.includes("id=")?text.split("id=")[1].split("&")[0]:text;

    if(!id) return;

    if(id===lastId){
        show("⚠️ 重複票","err");
        return;
    }

    lastId=id;
    show("🔍 驗證中","wait");

    send({id,action:"verify"});
}

/ 手動 /
function manualCheck(){
    let v=document.getElementById("manual").value.trim();
    if(v) onScan(v);
}

/ 傳送 /
function send(data){
    fetch(API,{method:"POST",body:JSON.stringify(data)})
    .then(r=>r.json())
    .then(res=>{
        if(!res.ok){
            show("🚫 無效票","err");
            return;
        }

        history.push(data.id);

        count = res.current ?? (count+1);
        update();

        show("✅ 通過","ok");
        flush();
    })
    .catch(()=>{
        cache.push(data);
        show("📡 離線暫存","wait");
    });
}

/ ➕➖ /
function adjust(n){
    if(n<0 && history.length>0){
        history.pop();
    }
    count=Math.max(0,count+n);
    update();
}

/ 輸入調整 /
function applyAdjust(){
    let v=parseInt(document.getElementById("adjInput").value);
    if(isNaN(v)) return;

    count=Math.max(0,count+v);
    update();

    document.getElementById("adjInput").value="";
}

/ 更新 /
function update(){
    countEl.innerText="👥 "+count;
}

/ 離線補送 /
function flush(){
    if(cache.length===0) return;
    let t=[...cache];
    cache=[];
    t.forEach(send);
}

/ 顯示 */
function show(t,type){
    document.getElementById("status").className="status "+type;
    msg.innerText=t;
}
</script>

</body>
</html>
