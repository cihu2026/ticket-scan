<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⏱️ 後慈湖驗票</title>

<!-- ✅ 正確載入 html5-qrcode -->
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: "Noto Sans TC", sans-serif;
  background:#121212;
  color:white;
  text-align:center;
  padding:15px;
}
h2 { color:#9be7ff; font-size:28px; }

#reader {
  max-width:600px;
  margin:10px auto;
  border-radius:25px;
  overflow:hidden;
  border:4px solid #444;
  background:#000;
}

.status {
  margin:25px auto;
  padding:25px;
  font-size:22px;
  font-weight:900;
  border-radius:20px;
  white-space:pre-line;
}
.ok   { background:#2ecc71; }
.err  { background:#e74c3c; }
.wait { background:#f1c40f; color:black; }

button {
  width:90%;
  max-width:500px;
  padding:22px;
  font-size:24px;
  margin:6px;
  border-radius:60px;
  border:none;
  background:linear-gradient(135deg,#3498db,#2980b9);
  color:white;
}

#adjustArea {
  display:none;
  margin-top:15px;
}
#adjustArea button {
  background:linear-gradient(135deg,#8e44ad,#9b59b6);
}
</style>
</head>

<body>

<h2>🎟️ 後慈湖驗票系統</h2>

<div id="reader"></div>
<button id="start">📷 啟動相機驗票</button>
<div id="status" class="status">請啟動相機</div>

<div id="adjustArea">
  <div style="margin-bottom:8px;color:#ccc;">🔧 實際進園人數微調（僅限一次）</div>
  <button onclick="adjust(-1)">-1</button>
  <button onclick="adjust(1)">+1</button>
  <button onclick="adjust(-2)">-2</button>
  <button onclick="adjust(2)">+2</button>
</div>

<script>
const API_URL =
  "https://script.google.com/macros/s/AKfycbw5VQi-dtLodRQbKTgzueGGXgMBBedA_Th93Skr_Dia3-JYbxtd00shnZ24axbznDY/exec";

let qr;
let scanning = false;
let lastTicketId = "";
let adjusted = false;

const statusEl = document.getElementById("status");
const adjustArea = document.getElementById("adjustArea");

// 啟動相機
document.getElementById("start").onclick = () => {
  qr = new Html5Qrcode("reader");
  qr.start(
    { facingMode: "environment" },
    { fps: 15, qrbox: 250 },
    onScan
  );
  statusEl.className = "status wait";
  statusEl.innerText = "📷 相機啟動中…";
  adjustArea.style.display = "none";
};

// 掃描 QR
function onScan(text) {
  if (scanning) return;
  scanning = true;
  // 這裡建議不要 qr.stop()，除非你想掃完一個就重啟相機
  // 如果想連續掃描，可以用計時器隔開

  // ✅ 正確解析票號
  const id = text.includes("id=")
    ? text.split("id=")[1].split("&")[0]
    : text;

  lastTicketId = id;
  adjusted = false;

  // 1. 執行驗票與核銷
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ id: id }) // 傳送票號給整合後的 doPost
  })
  .then(r => r.json())
  .then(res => {
    if (!res.ok) {
      statusEl.className = "status err";
      statusEl.innerText = res.msg;
      scanning = false;
      return;
    }

    const d = res.detail;

    // 顯示票券資訊
    statusEl.className = "status ok";
    statusEl.innerText = 
`✅ 驗票成功！已自動入園

👤 本票總人數：${d.people}
🎫 現金全/團/優：${d.cash_full}/${d.cash_group}/${d.cash_discount}
💳 悠遊全/團/優：${d.card_full}/${d.card_group}/${d.card_discount}
🆓 免費：${d.free}`;

    // 💡 註：因為 Code.gs 已經在核銷成功時自動幫你加了 IN，
    // 所以這裡不需要再發送第二次 fetch，避免人數重複計算。

    adjustArea.style.display = "block";
    
    // 3秒後允許再次掃描
    setTimeout(() => { scanning = false; }, 3000);
  })
  .catch((err) => {
    statusEl.className = "status err";
    statusEl.innerText = "❌ 系統連線失敗";
    scanning = false;
  });
}

// 手動微調（僅一次）
function adjust(diff) {
  if (adjusted) {
    alert("⚠️ 本票已調整過");
    return;
  }

  if (!confirm(`確認手動微調人數 ${diff > 0 ? "+" : ""}${diff} 人？`)) return;

  // 這裡要傳送 type: "IN"，這樣才會累加進「入園人數」
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      type: "IN", 
      delta: diff,
      source: "驗票端微調",
      note: "票號:" + lastTicketId
    })
  })
  .then(() => {
    adjusted = true;
    adjustArea.style.display = "none";
    alert("✅ 人數微調已同步至試算表");
  });
}

</body>
</html>
