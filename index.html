<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌲 後慈湖驗票系統</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
    :root {
        --primary: #00d2ff;
        --accent: #d4af37;
        --success: #2ecc71;
        --error: #ff4757;
        --bg: #0f172a;
    }

    body {
        margin: 0;
        background: #020617;
        color: #f1f5f9;
        font-family: -apple-system, "Noto Sans TC", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    .header {
        width: 100%;
        padding: 20px 0;
        background: rgba(15, 23, 42, 0.9);
        text-align: center;
        border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    /* 掃描區 */
    .scanner-box {
        position: relative;
        width: 90%;
        max-width: 400px;
        margin: 20px 0;
        border-radius: 25px;
        overflow: hidden;
        border: 2px solid rgba(255,255,255,0.1);
    }

    #reader { width: 100% !important; border: none !important; }

    /* 主要卡片區 */
    .card {
        width: 90%;
        max-width: 400px;
        background: rgba(30, 41, 59, 0.7);
        border-radius: 30px;
        padding: 25px;
        box-sizing: border-box;
        text-align: center;
        border: 1px solid rgba(255,255,255,0.05);
    }

    #status-msg { font-size: 1.5rem; font-weight: 900; margin-bottom: 15px; }

    /* 人數顯示 */
    .counter-ui {
        display: flex;
        align-items: center;
        justify-content: space-around;
        margin-bottom: 25px;
    }

    .btn-adj {
        width: 65px; height: 65px;
        border-radius: 50%;
        border: none;
        background: #334155;
        color: white;
        font-size: 1.8rem;
        cursor: pointer;
    }

    #count-number { font-size: 4rem; font-weight: 200; color: var(--accent); }

    /* 🔢 關鍵修正：加大的微調區 */
    .adjust-panel {
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid rgba(255,255,255,0.1);
    }

    .adjust-row {
        display: flex;
        flex-direction: column; /* 改為垂直排列讓按鈕變大 */
        gap: 12px;
    }

    .large-input {
        width: 100%;
        height: 60px; /* 大框框 */
        background: rgba(0, 0, 0, 0.4);
        border: 2px solid var(--accent);
        border-radius: 15px;
        color: white;
        text-align: center;
        font-size: 1.8rem; /* 大字體 */
        font-weight: bold;
        outline: none;
        box-sizing: border-box;
    }

    .btn-large-apply {
        width: 100%;
        height: 60px; /* 大按鈕 */
        background: var(--accent);
        color: #000;
        border: none;
        border-radius: 15px;
        font-size: 1.3rem;
        font-weight: 900;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }

    .btn-large-apply:active { transform: scale(0.98); opacity: 0.9; }

    /* 狀態顏色 */
    .ok { color: var(--success); }
    .err { color: var(--error); }
</style>
</head>

<body>

<div class="header">
    <h2>🌲 LATER LAKE ACCESS</h2>
</div>

<div class="scanner-box">
    <div id="reader"></div>
</div>

<div class="card">
    <div id="status-msg">⏳ 準備就緒</div>

    <!-- ➕➖ 按鈕 -->
    <div class="counter-ui">
        <button class="btn-adj" onclick="changeCount(-1)">➖</button>
        <div id="count-number">0</div>
        <button class="btn-adj" onclick="changeCount(1)">➕</button>
    </div>

    <!-- 加大的套用區域 -->
    <div class="adjust-panel">
        <div class="adjust-row">
            <input type="number" id="quick-input" class="large-input" placeholder="🔢 0">
            <button class="btn-large-apply" onclick="quickApply()">
                <span>套用校正人數</span>
            </button>
        </div>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbw5VQi-dtLodRQbKTgzueGGXgMBBedA_Th93Skr_Dia3-JYbxtd00shnZ24axbznDY/exec";
    let html5QrCode;
    let count = 0;

    // 自動啟動
    window.onload = () => {
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "environment" },
            { fps: 20, qrbox: { width: 250, height: 250 } },
            onScanSuccess
        );
    };

    function onScanSuccess(decodedText) {
        let id = decodedText.includes("id=") ? decodedText.split("id=")[1].split("&")[0] : decodedText;
        updateUI("🔍 驗證中...", "");
        
        fetch(API, { method: "POST", body: JSON.stringify({ id: id, action: "verify" }) })
        .then(r => r.json())
        .then(res => {
            if (res.ok) {
                updateUI("✅ 驗證成功", "ok");
                count = res.current || (count + 1);
                document.getElementById("count-number").innerText = count;
            } else {
                updateUI("🚫 無效票券", "err");
            }
        });
    }

    function changeCount(n) {
        count = Math.max(0, count + n);
        document.getElementById("count-number").innerText = count;
        sync();
    }

    function quickApply() {
        let el = document.getElementById("quick-input");
        let val = parseInt(el.value);
        if (!isNaN(val)) {
            count = Math.max(0, count + val);
            document.getElementById("count-number").innerText = count;
            sync();
        }
        el.value = "";
        // 震動回饋
        if (navigator.vibrate) navigator.vibrate(50);
    }

    function updateUI(txt, cls) {
        const m = document.getElementById("status-msg");
        m.innerText = txt;
        m.className = cls;
    }

    function sync() {
        fetch(API, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "sync", count: count }) });
    }
</script>

</body>
</html>
